<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도구리 하와이 댄스 게임 - V9 (댄스 연출 추가)</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }

        /* 16:9 고정 해상도 컨테이너 */
        #game-container {
            width: 1280px;
            height: 720px;
            position: relative;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* 공통 화면 스타일 */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .screen.active { display: flex; }

        #main-logo {
            display: block;
            max-width: 90%;
            height: auto;
            margin-bottom: 40px;
        }

        /* 중심점이 중앙인 이미지 버튼 */
        .img-btn {
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            outline: none;
            display: block;
            transition: transform 0.1s ease;
            transform-origin: center center;
        }
        .img-btn:hover { transform: scale(1.05); }
        .img-btn.pressed { transform: scale(0.95); }

        .bottom-center-position {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .origin-size-btn img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .top-right-back {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 10;
        }
        .top-right-back img {
            display: block;
            height: 35px;
            width: auto;
        }

        /* 우측 하단 도감 및 초기화 버튼 그룹 */
        .bottom-right-group {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        .dummy-reset-btn {
            padding: 10px 20px;
            background: rgba(244, 67, 54, 0.6);
            color: white;
            border: 2px solid #fff;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .dummy-reset-btn:hover { background: rgba(244, 67, 54, 0.9); }

        /* 난이도 버튼 그룹 */
        .difficulty-group {
            display: flex;
            gap: 30px;
            margin-bottom: 50px;
        }
        .diff-btn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #fff;
            border-radius: 15px;
            background: rgba(0,0,0,0.6);
            color: white;
        }
        .diff-btn.selected {
            background: #ffeb3b;
            color: #000;
            border-color: #ffeb3b;
        }

        /* 상단 상태 판넬 */
        .game-status {
            position: absolute;
            top: 35px;
            left: 40px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            z-index: 5;
        }

        /* 왼쪽 아래 하트(라이프) 표시 영역 */
        .life-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 30px;
            display: flex;
            gap: 8px;
            font-size: 28px;
            z-index: 10;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .heart { color: #ff1744; text-shadow: 0 0 10px #ff1744; }
        .heart.empty { color: #444; text-shadow: none; }

        /* 무대 요소 */
        #game-table {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            height: auto;
            z-index: 1;
        }
        #doguri-char {
            position: absolute;
            bottom: 230px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: auto;
            z-index: 2;
        }

        /* 하단 리듬 제어 영역 */
        .rhythm-container {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 900px;
            z-index: 4;
        }

        /* 방향키 배치 상자 및 노드 타격 애니메이션 규격 */
        .arrow-sequence-box {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .arrow-icon-slot {
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.08s ease;
            transform-origin: center center;
        }
        .arrow-icon-slot.hit {
            transform: scale(1.25);
        }
        .arrow-icon-slot img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 5초 타이머 바 프로그레스 규격 */
        .timer-wrapper {
            width: 400px;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #fff;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background: #ffeb3b;
            box-shadow: 0 0 8px #ffeb3b;
        }

        #judgment-text {
            position: absolute;
            bottom: 210px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 34px;
            font-weight: bold;
            text-shadow: 0 3px 6px rgba(0,0,0,0.9);
            z-index: 4;
        }

        /* 도감 및 랜덤 보상 팝업 레이아웃 */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 600px;
        }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .book-item {
            border: 2px solid #ccc;
            padding: 15px;
            border-radius: 10px;
            background: #f9f9f9;
            font-weight: bold;
        }
        .book-item.unlocked {
            background: #e3f2fd;
            border-color: #2196f3;
            color: #1565c0;
        }
        .close-btn {
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #reward-popup {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.98);
            border: 4px solid #ffeb3b;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 25;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <!-- 1. 인트로 화면 -->
    <div id="screen-intro" class="screen active">
        <img id="main-logo" src="DD_Logo.png" alt="도구리 로고" onerror="this.style.display='none'; this.after('[DD_Logo]');">
        <div class="bottom-center-position">
            <button id="btn-main-start" class="img-btn origin-size-btn" onclick="goToGameStart()">
                <img src="DD_Main_Start_Button.png" alt="START" onerror="this.style.display='none'; this.after('[START 버튼]');">
            </button>
        </div>
    </div>

    <!-- 2. 게임 시작화면 -->
    <div id="screen-start" class="screen">
        <button id="btn-main-back" class="img-btn top-right-back" onclick="goToIntro()">
            <img src="DD_Main_Back_Button.png" alt="뒤로가기" onerror="this.style.display='none'; this.after('← 뒤로가기');">
        </button>

        <div class="difficulty-group">
            <button id="btn-easy" class="diff-btn selected" onclick="selectDifficulty('easy')">쉬움</button>
            <button id="btn-normal" class="diff-btn" onclick="selectDifficulty('normal')">보통</button>
            <button id="btn-hard" class="diff-btn" onclick="selectDifficulty('hard')">어려움</button>
        </div>

        <div class="bottom-center-position">
            <button id="btn-main-dance" class="img-btn origin-size-btn" onclick="startGameLoop()">
                <img src="DD_Main_Dance_Button.png" alt="DANCE" onerror="this.style.display='none'; this.after('[DANCE 버튼]');">
            </button>
        </div>

        <div class="bottom-right-group">
            <button class="dummy-reset-btn" onclick="alert('도감이 초기화되었습니다. (더미 기능)')">도감 초기화</button>
            <button id="btn-main-gift" class="img-btn origin-size-btn" onclick="openCollection()">
                <img src="DD_Main_Gift_Button.png" alt="도감" onerror="this.style.display='none'; this.after('[도감]');">
            </button>
        </div>
    </div>

    <!-- 3. 인게임 화면 -->
    <div id="screen-game" class="screen">
        <div class="game-status">
            <span id="txt-difficulty">난이도: 쉬움</span> | 
            <span id="txt-stage">스테이지: 1/3</span> | 
            <span id="txt-round">판수: 1/5</span>
        </div>

        <!-- 하트 표시 레이어 -->
        <div class="life-container" id="hearts-display"></div>

        <img id="game-table" src="DD_Game_Table.png" alt="단상" onerror="this.style.display='none';">
        
        <!-- 중앙 도구리 캐릭터 노드 -->
        <img id="doguri-char" src="doguri_image_base.png" alt="도구리" onerror="this.style.display='none'; this.after('[도구리]');">

        <div id="judgment-text"></div>

        <!-- 하단 리듬 제어 영역 -->
        <div class="rhythm-container" id="rhythm-ui">
            <div class="arrow-sequence-box" id="arrow-sequence-area"></div>
            <div class="timer-wrapper">
                <div id="timer-bar"></div>
            </div>
        </div>

        <!-- NEXT 버튼 전용 독립 컨테이너 -->
        <div id="next-btn-container" class="bottom-center-position" style="display: none;">
            <button id="btn-main-next" class="img-btn origin-size-btn" onclick="handleNextStageClick()">
                <img src="DD_Main_Next_Button.png" alt="NEXT" onerror="this.style.display='none'; this.after('[NEXT 스테이지]');">
            </button>
        </div>
    </div>

    <!-- 도감 보상 알림 팝업 -->
    <div id="reward-popup">
        <h2 style="color: #333; margin-top:0;">🌴 스테이지 클리어 보상 🌴</h2>
        <p style="font-size: 18px; color: #555;">랜덤 하와이 도감 아이템 증정 완료!</p>
        <div id="reward-item-name" style="font-size: 28px; font-weight: bold; color: #2196f3; margin: 20px 0;">[아이템]</div>
        <button class="close-btn" onclick="closeRewardPopup()">확인</button>
    </div>

    <!-- 도감 UI 레이어 -->
    <div id="collection-modal" class="modal">
        <div class="modal-content">
            <h2>🎒 도구리의 하와이 도감 (총 9종)</h2>
            <div class="book-grid" id="book-grid-container"></div>
            <button class="close-btn" onclick="closeCollection()">닫기</button>
        </div>
    </div>

</div>

<script>
    // --- 글로벌 게임 상태 관리 변수 ---
    let currentDifficulty = 'easy';
    let currentStage = 1;           
    let currentRound = 1;           
    let userLives = 5;              

    let targetArrowSequence = [];
    let currentArrowIndex = 0; 
    let isRoundFinished = false;
    let isStageClearedWait = false; 
    let isRewardGivenThisGame = false; 

    let roundTimerId = null;
    let timeLimit = 5000;           
    let timeRemaining = 5000;

    const collectionItems = [
        "🍍 하와이안 파인애플", "🌸 알로하 레이", "🕶️ 선글라스",
        "🏄 미니 서프보드", "🥥 코코넛 주스", "🎸 우쿨렐레",
        "🩴 비치 샌들", "👕 하와이안 셔츠", "🏖️ 도구리 튜브"
    ];
    let unlockedItems = new Set();

    const BG_MAIN = "DD_Main_Image.png";
    const DOGURI_BASE = "doguri_image_base.png";
    const DOGURI_UPGRADE = "doguri_image_upgrade.png";

    const arrowKeyCodes = ['ArrowLeft', 'ArrowRight', 'ArrowDown', 'ArrowUp'];
    const arrowNames = { 'ArrowLeft': 'Left', 'ArrowRight': 'Right', 'ArrowDown': 'Down', 'ArrowUp': 'Up' };

    window.onload = function() {
        document.getElementById('game-container').style.backgroundImage = `url('${BG_MAIN}')`;
        initCollectionUI();
        updateDoguriImage();
        setupButtonEffects();
    };

    function setupButtonEffects() {
        const btns = document.querySelectorAll('.img-btn');
        btns.forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('pressed'));
            btn.addEventListener('mouseup', () => btn.classList.remove('pressed'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('pressed'));
        });
    }

    function simulateBtnClick(btnId, callback) {
        let btn = document.getElementById(btnId);
        if (btn) {
            btn.classList.add('pressed');
            setTimeout(() => {
                btn.classList.remove('pressed');
                callback();
            }, 80);
        }
    }

    // --- 화면 네비게이션 함수군 ---
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // 캐릭터 이미지 업데이트 헬퍼 (대체 텍스트 예외처리 포함)
    function setCharacterImage(srcPath, fallbackText) {
        let charImg = document.getElementById('doguri-char');
        if (charImg) {
            charImg.src = srcPath;
            charImg.onerror = function() {
                this.style.display = 'none';
                this.after(`[${fallbackText}]`);
            };
        }
    }

    function goToGameStart() { showScreen('screen-start'); }
    function goToIntro() { 
        stopRoundTimer();
        showScreen('screen-intro'); 
    }

    function selectDifficulty(diff) {
        currentDifficulty = diff;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById(`btn-${diff}`).classList.add('selected');
    }

    function startGameLoop() {
        showScreen('screen-game');
        currentStage = 1;
        currentRound = 1;
        userLives = 5; 
        isRewardGivenThisGame = false; 
        updateHeartsUI();
        initRound();
    }

    function updateHeartsUI() {
        let container = document.getElementById('hearts-display');
        container.innerHTML = '';
        for(let i=1; i<=5; i++) {
            let heartSpan = document.createElement('span');
            if (i <= userLives) {
                heartSpan.className = 'heart';
                heartSpan.innerText = '❤️';
            } else {
                heartSpan.className = 'heart empty';
                heartSpan.innerText = '🖤';
            }
            container.appendChild(heartSpan);
        }
    }

    // --- 인게임 판 제어 시스템 ---
    function initRound() {
        isRoundFinished = false;
        isStageClearedWait = false;
        currentArrowIndex = 0;
        stopRoundTimer();
        
        // 새 판이 시작되면 무조건 기본 도구리 이미지로 초기화
        updateDoguriImage();
        
        let diffKo = currentDifficulty === 'easy' ? '쉬움' : currentDifficulty === 'normal' ? '보통' : '어려움';
        document.getElementById('txt-difficulty').innerText = `난이도: ${diffKo}`;
        document.getElementById('txt-stage').innerText = `스테이지: ${currentStage}/3`;
        document.getElementById('txt-round').innerText = `판수: ${currentRound}/5`;
        
        document.getElementById('judgment-text').innerText = '';
        document.getElementById('next-btn-container').style.display = 'none'; 
        document.getElementById('rhythm-ui').style.display = 'flex';
        
        let arrowCount = 2 + currentRound; 
        targetArrowSequence = [];
        
        let sequenceArea = document.getElementById('arrow-sequence-area');
        sequenceArea.innerHTML = '';

        for(let i=0; i<arrowCount; i++) {
            let randomKey = arrowKeyCodes[Math.floor(Math.random() * arrowKeyCodes.length)];
            targetArrowSequence.push(randomKey);

            let slot = document.createElement('div');
            slot.className = 'arrow-icon-slot';
            slot.id = `arrow-slot-${i}`;
            
            let img = document.createElement('img');
            img.src = `DD_${arrowNames[randomKey]}_Button_Normal.png`;
            img.id = `arrow-img-${i}`;
            img.alt = arrowNames[randomKey];
            
            img.onerror = function() {
                this.style.display = 'none';
                let sym = {'ArrowLeft':'←','ArrowRight':'→','ArrowDown':'↓','ArrowUp':'↑'};
                this.parentElement.innerText = sym[randomKey];
            };

            slot.appendChild(img);
            sequenceArea.appendChild(slot);
        }

        startRoundTimer();
    }

    function startRoundTimer() {
        timeRemaining = timeLimit;
        document.getElementById('timer-bar').style.width = '100%';

        roundTimerId = setInterval(() => {
            if (isRoundFinished || isStageClearedWait) {
                stopRoundTimer();
                return;
            }
            timeRemaining -= 50;
            let percent = (timeRemaining / timeLimit) * 100;
            document.getElementById('timer-bar').style.width = percent + '%';

            if (timeRemaining <= 0) {
                stopRoundTimer();
                handleRoundFailure("TIME OVER!");
            }
        }, 50);
    }

    function stopRoundTimer() {
        if (roundTimerId) {
            clearInterval(roundTimerId);
            roundTimerId = null;
        }
    }

    // --- 실패 공통 처리 (Fail 이미지 즉시 주입) ---
    function handleRoundFailure(reasonText) {
        userLives--;
        updateHeartsUI();

        // 실패하는 즉시 중앙 도구리를 DD_Dance_Fail 이미지로 변경
        setCharacterImage('DD_Dance_Fail.png', '도구리 실패 연출');

        if (userLives <= 0) {
            stopRoundTimer();
            setTimeout(() => {
                alert("GAME OVER! 모든 하트를 잃었습니다.");
                showScreen('screen-start');
            }, 100);
            return;
        }

        let jTxt = document.getElementById('judgment-text');
        jTxt.innerText = reasonText;
        jTxt.style.color = "#f44336";

        // 패널티 후 딜레이 없이 다음 판으로 즉시 세팅 (initRound에서 캐릭터가 다시 원상복구됩니다.)
        initRound();
    }

    // --- 키보드 리스너 ---
    window.addEventListener('keydown', function(e) {
        let introActive = document.getElementById('screen-intro').classList.contains('active');
        let startActive = document.getElementById('screen-start').classList.contains('active');
        let gameActive = document.getElementById('screen-game').classList.contains('active');
        
        let nextContainer = document.getElementById('next-btn-container');
        let nextBtnVisible = nextContainer && nextContainer.style.display === 'block';

        if (e.key === ' ' || e.key === 'Spacebar') {
            if (introActive) {
                e.preventDefault();
                simulateBtnClick('btn-main-start', goToGameStart);
                return;
            }
            if (startActive) {
                e.preventDefault();
                simulateBtnClick('btn-main-dance', startGameLoop);
                return;
            }
            if (gameActive && nextBtnVisible && isStageClearedWait) {
                e.preventDefault();
                simulateBtnClick('btn-main-next', handleNextStageClick);
                return;
            }
        }

        if (e.key === 'Escape' || e.key === 'Esc') {
            if (startActive) {
                simulateBtnClick('btn-main-back', goToIntro);
                return;
            }
        }

        if (!gameActive || isRoundFinished || isStageClearedWait) return;

        if (arrowKeyCodes.includes(e.key)) {
            let targetKey = targetArrowSequence[currentArrowIndex];
            let slotEl = document.getElementById(`arrow-slot-${currentArrowIndex}`);
            let imgEl = document.getElementById(`arrow-img-${currentArrowIndex}`);

            if(slotEl) {
                slotEl.classList.add('hit');
                setTimeout(() => slotEl.classList.remove('hit'), 80);
            }

            if (e.key === targetKey) {
                if(imgEl) imgEl.src = `DD_${arrowNames[targetKey]}_Button_Success.png`;
                currentArrowIndex++;

                // [추가 규칙] 방향키를 맞출 때마다 DD_Dance_1 ~ DD_Dance_4 이미지 무작위 출력
                let randomDanceNum = Math.floor(Math.random() * 4) + 1;
                setCharacterImage(`DD_Dance_${randomDanceNum}.png`, `도구리 댄스 ${randomDanceNum}`);

                if (currentArrowIndex >= targetArrowSequence.length) {
                    stopRoundTimer();
                    handleRoundSuccess();
                }
            } else {
                if(imgEl) imgEl.src = `DD_${arrowNames[targetKey]}_Button_Fail.png`;
                stopRoundTimer();
                handleRoundFailure("FAIL!");
            }
        }
    });

    function handleRoundSuccess() {
        if (currentRound >= 5) {
            isStageClearedWait = true;
            document.getElementById('rhythm-ui').style.display = 'none';
            document.getElementById('next-btn-container').style.display = 'block';
            
            let jTxt = document.getElementById('judgment-text');
            jTxt.innerText = "STAGE CLEAR!";
            jTxt.style.color = "#4caf50";
        } else {
            currentRound++;
            initRound();
        }
    }

    function handleNextStageClick() {
        if (currentStage < 3) {
            currentStage++;
            currentRound = 1;
            initRound();
        } else {
            giveRandomReward();
        }
    }

    // --- 하와이 도감 로직 시스템 ---
    function initCollectionUI() {
        let grid = document.getElementById('book-grid-container');
        grid.innerHTML = '';
        collectionItems.forEach((item, index) => {
            let box = document.createElement('div');
            box.id = `book-item-${index}`;
            box.className = `book-item ${unlockedItems.has(index) ? 'unlocked' : ''}`;
            box.innerText = unlockedItems.has(index) ? item : `🔒 미획득 (${index + 1})`;
            grid.appendChild(box);
        });
    }

    function updateDoguriImage() {
        // 도감을 9개 다 모았을 때와 그렇지 않을 때 기본 상태의 베이스 이미지를 결정
        if (unlockedItems.size === 9) {
            setCharacterImage(DOGURI_UPGRADE, '👑 하와이안 도구리 업그레이드 완료');
        } else {
            setCharacterImage(DOGURI_BASE, '도구리 기본 상태');
        }
    }

    function giveRandomReward() {
        if (isRewardGivenThisGame) return;
        isRewardGivenThisGame = true; 
        
        let randomIndex = Math.floor(Math.random() * collectionItems.length);
        unlockedItems.add(randomIndex);
        
        initCollectionUI();
        updateDoguriImage();

        document.getElementById('reward-item-name').innerText = collectionItems[randomIndex];
        document.getElementById('reward-popup').style.display = 'block';
    }

    function closeRewardPopup() {
        document.getElementById('reward-popup').style.display = 'none';
        goToGameStart();
    }

    // 도감 초기화 실제 작동 로직 연결 (더미 버튼에서 작동하도록 가볍게 연동 가능)
    function resetCollectionData() {
        unlockedItems.clear();
        isRewardGivenThisGame = false;
        initCollectionUI();
        updateDoguriImage();
        alert('도감이 초기화되었습니다.');
    }

    function openCollection() {
        initCollectionUI();
        document.getElementById('collection-modal').style.display = 'flex';
    }
    function closeCollection() {
        document.getElementById('collection-modal').style.display = 'none';
    }
</script>

</body>
</html>
