<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도구리 하와이 댄스 게임</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }

        /* 16:9 해상도 고정 컨테이너 */
        #game-container {
            width: 1280px;
            height: 720px;
            position: relative;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* 공통 화면 스타일 */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .screen.active { display: flex; }

        /* 공통 이미지 버튼 스타일 */
        .img-btn {
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            transition: transform 0.1s ease;
        }
        .img-btn:hover { transform: scale(1.05); }
        .img-btn:active { transform: scale(0.95); }

        /* UI 배치 */
        .bottom-center {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
        }

        .bottom-right {
            position: absolute;
            bottom: 40px;
            right: 40px;
        }

        .top-left {
            position: absolute;
            top: 40px;
            left: 40px;
        }

        /* 난이도 선택 버튼 */
        .difficulty-group {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }
        .diff-btn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #fff;
            border-radius: 15px;
            background: rgba(0,0,0,0.6);
            color: white;
        }
        .diff-btn.selected {
            background: #ffeb3b;
            color: #000;
            border-color: #ffeb3b;
        }

        /* 상단 상태 텍스트 (스테이지, 판수) */
        .game-status {
            position: absolute;
            top: 40px;
            right: 40px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        /* 게임 화면 구성요소 */
        #game-table {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: auto;
        }

        #doguri-char {
            position: absolute;
            bottom: 220px; /* 테이블 위에 안착되도록 조정 */
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: auto;
        }

        /* 춤 시퀀스 대용 숫자 출력 */
        #dance-sequence-text {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 120px;
            font-weight: bold;
            color: #ffeb3b;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: none;
        }

        /* 리듬 게임 핵심 UI */
        .rhythm-area {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 15px;
            width: 450px;
        }

        /* 방향키 아이콘 */
        #arrow-display {
            font-size: 48px;
            font-weight: bold;
            color: white;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.2);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #arrow-display.success { color: #4caf50; font-size: 54px; }

        /* 판정 게이지 바 */
        .gauge-container {
            width: 100%;
            height: 30px;
            background: #333;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            border: 2px solid #fff;
        }

        /* Perfect 영역 (정중앙 20% 범위) */
        .perfect-zone {
            position: absolute;
            left: 40%;
            width: 20%;
            height: 100%;
            background: rgba(255, 235, 59, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #fff;
            font-weight: bold;
        }

        /* 움직이는 커서 */
        #gauge-cursor {
            position: absolute;
            left: 0%;
            width: 8px;
            height: 100%;
            background: #ff1744;
            box-shadow: 0 0 8px #ff1744;
        }

        /* 판정 결과 텍스트 */
        #judgment-text {
            position: absolute;
            bottom: 170px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* 도감 모달 */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 600px;
        }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .book-item {
            border: 2px solid #ccc;
            padding: 15px;
            border-radius: 10px;
            background: #f9f9f9;
            font-weight: bold;
        }
        .book-item.unlocked {
            background: #e3f2fd;
            border-color: #2196f3;
            color: #1565c0;
        }
        .close-btn {
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* 획득 연출 팝업 */
        #reward-popup {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            border: 4px solid #ffeb3b;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <!-- 1. 인트로 화면 -->
    <div id="screen-intro" class="screen active">
        <!-- 배경 및 시작 버튼 -->
        <button class="img-btn bottom-center" onclick="goToGameStart()">
            <img src="DD_Main_Start_Button.png" alt="START" onerror="this.style.display='none'; this.after('[START 버튼 이미지]');">
        </button>
    </div>

    <!-- 2. 게임 시작화면 (난이도 선택 및 댄스 대기) -->
    <div id="screen-start" class="screen">
        <button class="img-btn top-left" onclick="goToIntro()">
            <img src="DD_Main_Back_Button.png" alt="뒤로가기" onerror="this.style.display='none'; this.after('← 뒤로가기');">
        </button>

        <div class="difficulty-group">
            <button id="btn-easy" class="diff-btn selected" onclick="selectDifficulty('easy')">쉬움</button>
            <button id="btn-normal" class="diff-btn" onclick="selectDifficulty('normal')">보통</button>
            <button id="btn-hard" class="diff-btn" onclick="selectDifficulty('hard')">어려움</button>
        </div>

        <button class="img-btn bottom-center" onclick="startGameLoop()">
            <img src="DD_Main_Dance_Button.png" alt="DANCE" onerror="this.style.display='none'; this.after('[DANCE 시작 버튼]');">
        </button>

        <button class="img-btn bottom-right" onclick="openCollection()">
            <img src="DD_Main_Gift_Button.png" alt="도감" onerror="this.style.display='none'; this.after('[도감 보기]');">
        </button>
    </div>

    <!-- 3. 실제 인게임 화면 -->
    <div id="screen-game" class="screen">
        <!-- 상단 현황판 -->
        <div class="game-status">
            <span id="txt-difficulty">난이도: 쉬움</span> | 
            <span id="txt-stage">스테이지: 1/5</span> | 
            <span id="txt-round">판수: 1/3</span>
        </div>

        <!-- 무대 단상 및 캐릭터 -->
        <img id="game-table" src="DD_Game_Table.png" alt="단상" onerror="this.style.display='none';">
        <img id="doguri-char" src="doguri_image_base.png" alt="도구리" onerror="this.style.display='none'; this.after('[도구리 캐릭터 이미지]');">

        <!-- 시퀀스 넘버 출력 레이어 (춤 이미지 대체) -->
        <div id="dance-sequence-text">1</div>

        <!-- 판정 글자 표시 -->
        <div id="judgment-text"></div>

        <!-- 하단 리듬 제어 영역 -->
        <div class="rhythm-area" id="rhythm-ui">
            <div id="arrow-display">↑</div>
            <div class="gauge-container">
                <div class="perfect-zone">PERFECT</div>
                <div id="gauge-cursor"></div>
            </div>
        </div>

        <!-- 스테이지 클리어 시 나타나는 다음 버튼 -->
        <button id="btn-next-stage" class="img-btn bottom-center" style="display: none;" onclick="nextStageOrRound()">
            <img src="DD_Main_Next_Button.png" alt="NEXT" onerror="this.style.display='none'; this.after('[NEXT 스테이지 버튼]');">
        </button>
    </div>

    <!-- 랜덤 보상 획득 팝업 -->
    <div id="reward-popup">
        <h2 style="color: #333; margin-top:0;">🌴 스테이지 전체 클리어 보상! 🌴</h2>
        <p style="font-size: 18px; color: #555;">하와이 기념품 아이템을 획득했습니다!</p>
        <div id="reward-item-name" style="font-size: 28px; font-weight: bold; color: #2196f3; margin: 20px 0;">[아이템 명]</div>
        <button class="close-btn" onclick="closeRewardPopup()">확인</button>
    </div>

    <!-- 도감 모달 창 -->
    <div id="collection-modal" class="modal">
        <div class="modal-content">
            <h2>🎒 도구리의 하와이 도감 (총 9종)</h2>
            <p style="font-size: 13px; color: #666;">9개 아이템을 모두 모으면 기본 도구리 이미지가 하와이안 도구리로 업그레이드됩니다!</p>
            <div class="book-grid" id="book-grid-container">
                <!-- 자바스크립트에서 동적 생성 -->
            </div>
            <button class="close-btn" onclick="closeCollection()">닫기</button>
        </div>
    </div>

</div>

<script>
    // --- 게임 상태 데이터 ---
    let currentDifficulty = 'easy'; // easy, normal, hard
    let currentStage = 1;           // 1 ~ 5
    let currentRound = 1;           // 1 ~ 3

    // 리듬 게임 제어 변수
    let cursorPosition = 0;
    let cursorDirection = 1;        // 1: 오른쪽, -1: 왼쪽
    let cursorSpeed = 2;            // 난이도별 조절될 기본 속도
    let gaugeAnimationId = null;
    
    let targetArrow = '';           // 현재 입력해야 하는 방향키 ('ArrowUp', 'ArrowDown' 등)
    let isArrowCleared = false;     // 방향키를 맞췄는지 여부
    let isRoundFinished = false;    // 해당 판(Round)이 끝났는지 여부

    // 도감 데이터 (총 9종)
    const collectionItems = [
        "🍍 하와이안 파인애플", "🌸 알로하 레이(꽃목걸이)", "🕶️ 선글라스",
        "🏄 미니 서프보드", "🥥 코코넛 주스", "🎸 우쿨렐레",
        "🩴 비치 샌들", "👕 하와이안 셔츠", "🏖️ 도구리 전용 튜브"
    ];
    // 유저가 획득한 아이템 인덱스 저장 (Set 구조로 중복 방지)
    let unlockedItems = new Set();

    // 이미지 경로 매핑 (질문해주신 파일명 기반)
    const BG_MAIN = "DD_Main_Image.png";
    const DOGURI_BASE = "doguri_image_base.png";
    const DOGURI_UPGRADE = "doguri_image_upgrade.png"; // 다 모았을 때 바뀔 이미지 파일명 가정

    // 방향키 매핑 텍스트
    const arrowMap = { 'ArrowUp': '↑', 'ArrowDown': '↓', 'ArrowLeft': '←', 'ArrowRight': '→' };
    const arrowKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];

    // 페이지 초기화
    window.onload = function() {
        // 전체 배경 설정
        document.getElementById('game-container').style.backgroundImage = `url('${BG_MAIN}')`;
        initCollectionUI();
        updateDoguriImage();
    };

    // --- 화면 네비게이션 ---
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function goToGameStart() { showScreen('screen-start'); }
    function goToIntro() { showScreen('screen-intro'); }

    // 난이도 선택 변경
    function selectDifficulty(diff) {
        currentDifficulty = diff;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
        if(diff === 'easy') {
            document.getElementById('btn-easy').classList.add('selected');
            cursorSpeed = 2;
        } else if(diff === 'normal') {
            document.getElementById('btn-normal').classList.add('selected');
            cursorSpeed = 4;
        } else if(diff === 'hard') {
            document.getElementById('btn-hard').classList.add('selected');
            cursorSpeed = 7;
        }
    }

    // --- 게임 루프 및 핵심 메커니즘 ---
    function startGameLoop() {
        showScreen('screen-game');
        currentStage = 1;
        currentRound = 1;
        initRound();
    }

    // 한 판(Round) 시작 초기화
    function initRound() {
        isArrowCleared = false;
        isRoundFinished = false;
        
        // UI 갱신
        let diffKo = currentDifficulty === 'easy' ? '쉬움' : currentDifficulty === 'normal' ? '보통' : '어려움';
        document.getElementById('txt-difficulty').innerText = `난이도: ${diffKo}`;
        document.getElementById('txt-stage').innerText = `스테이지: ${currentStage}/5`;
        document.getElementById('txt-round').innerText = `판수: ${currentRound}/3`;
        
        document.getElementById('judgment-text').innerText = '';
        document.getElementById('dance-sequence-text').style.display = 'none';
        document.getElementById('btn-next-stage').style.display = 'none';
        document.getElementById('rhythm-ui').style.display = 'flex';
        
        // 랜덤 방향키 지정
        targetArrow = arrowKeys[Math.floor(Math.random() * arrowKeys.length)];
        let arrowDisplay = document.getElementById('arrow-display');
        arrowDisplay.innerText = arrowMap[targetArrow];
        arrowDisplay.classList.remove('success');

        // 게이지 바 애니메이션 시작
        cursorPosition = 0;
        cursorDirection = 1;
        if(gaugeAnimationId) cancelAnimationFrame(gaugeAnimationId);
        updateGauge();
    }

    // 게이지 커서 왔다 갔다 움직이는 루프
    function updateGauge() {
        if (isRoundFinished) return;

        cursorPosition += (cursorSpeed * cursorDirection);
        
        // 벽 충돌 제어 (0% ~ 100%)
        if (cursorPosition >= 100) {
            cursorPosition = 100;
            cursorDirection = -1;
        } else if (cursorPosition <= 0) {
            cursorPosition = 0;
            cursorDirection = 1;
        }

        document.getElementById('gauge-cursor').style.left = cursorPosition + '%';
        gaugeAnimationId = requestAnimationFrame(updateGauge);
    }

    // 키보드 입력 감지 이벤트 공통 핸들러
    window.addEventListener('keydown', function(e) {
        // 인게임 화면이 아니거나 이미 끝났다면 무시
        if (!document.getElementById('screen-game').classList.contains('active') || isRoundFinished) return;

        // 1단계: 방향키 매칭 검증
        if (!isArrowCleared) {
            if (arrowKeys.includes(e.key)) {
                if (e.key === targetArrow) {
                    isArrowCleared = true;
                    let arrowDisplay = document.getElementById('arrow-display');
                    arrowDisplay.innerText = "SPACE!"; // 방향키 성공 시 스페이스 유도
                    arrowDisplay.classList.add('success');
                    showJudgment("Good! 이제 스페이스바!", "#ffeb3b");
                } else {
                    showJudgment("Miss! 방향키 틀림", "#f44336");
                    endRound(false);
                }
            }
            return; // 방향키 단계일 때는 스페이스 누르면 안 됨
        }

        // 2단계: 스페이스바 판정 (방향키 맞춘 상태)
        if (e.key === ' ' || e.key === 'Spacebar') {
            e.preventDefault(); // 스페이스바 스크롤 방지
            
            // Perfect 영역 판정 (중앙 40% ~ 60% 사이인지 체크)
            if (cursorPosition >= 40 && cursorPosition <= 60) {
                showJudgment("PERFECT!!!", "#4caf50");
                endRound(true);
            } else {
                showJudgment("MISS! 타이밍 실패", "#f44336");
                endRound(false);
            }
        }
    });

    // 판정 글씨 연출
    function showJudgment(text, color) {
        let jTxt = document.getElementById('judgment-text');
        jTxt.innerText = text;
        jTxt.style.color = color;
    }

    // 판(Round) 종료 처리
    function endRound(isSuccess) {
        isRoundFinished = true;
        if(gaugeAnimationId) cancelAnimationFrame(gaugeAnimationId);

        if (isSuccess) {
            // 성공 시 리듬 UI 숨기고 춤 시퀀스(숫자 1~9 무작위) 활성화
            document.getElementById('rhythm-ui').style.display = 'none';
            let seqDisplay = document.getElementById('dance-sequence-text');
            seqDisplay.innerText = Math.floor(Math.random() * 9) + 1;
            seqDisplay.style.display = 'block';
            
            // 승리 시 NEXT 버튼 표출
            document.getElementById('btn-next-stage').style.display = 'block';
        } else {
            // 실패 시 약간의 딜레이 후 해당 판 재도전
            setTimeout(() => {
                initRound();
            }, 1500);
        }
    }

    // NEXT 버튼 클릭 시 다음 진행 처리
    function nextStageOrRound() {
        if (currentRound < 3) {
            // 아직 3판을 안 채웠다면 다음 판으로
            currentRound++;
            initRound();
        } else {
            // 3판을 다 깼다면 스테이지 클리어
            if (currentStage < 5) {
                // 다음 스테이지로 진입
                currentStage++;
                currentRound = 1;
                initRound();
            } else {
                // 5스테이지의 3판까지 전부 클리어 ➔ 최종 완공! 보상 지급
                giveRandomReward();
            }
        }
    }

    // --- 도감 및 랜덤 보상 시스템 ---
    function initCollectionUI() {
        let grid = document.getElementById('book-grid-container');
        grid.innerHTML = '';
        collectionItems.forEach((item, index) => {
            let box = document.createElement('div');
            box.id = `book-item-${index}`;
            box.className = `book-item ${unlockedItems.has(index) ? 'unlocked' : ''}`;
            box.innerText = unlockedItems.has(index) ? item : `🔒 미획득 (${index + 1})`;
            grid.appendChild(box);
        });
    }

    function updateDoguriImage() {
        let charImg = document.getElementById('doguri-char');
        // 9개 다 모았으면 진화된 이미지, 아니면 기본 이미지
        if (unlockedItems.size === 9) {
            charImg.src = DOGURI_UPGRADE;
            charImg.onerror = function() {
                this.style.display = 'none';
                if(!this.nextSibling || this.nextSibling.textContent.indexOf('하와이안') === -1) {
                    this.after('[👑 알로하 도구리로 변경됨!]');
                }
            };
        } else {
            charImg.src = DOGURI_BASE;
        }
    }

    // 5스테이지 올클리어 시 아이템 랜덤 1개 증정
    function giveRandomReward() {
        // 0~8 중 랜덤 인덱스 추첨
        let randomIndex = Math.floor(Math.random() * collectionItems.length);
        unlockedItems.add(randomIndex); // 중복이어도 Set이므로 안전하게 저장됨
        
        // UI 반영
        initCollectionUI();
        updateDoguriImage();

        // 팝업 띄우기
        document.getElementById('reward-item-name').innerText = collectionItems[randomIndex];
        document.getElementById('reward-popup').style.display = 'block';
    }

    function closeRewardPopup() {
        document.getElementById('reward-popup').style.display = 'none';
        // 최종 클리어 후 다시 난이도 선택/준비화면으로 이동
        goToGameStart();
    }

    // 도감 열고 닫기
    function openCollection() {
        initCollectionUI();
        document.getElementById('collection-modal').style.display = 'flex';
    }
    function closeCollection() {
        document.getElementById('collection-modal').style.display = 'none';
    }
</script>

</body>
</html>
