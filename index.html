<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도구리 하와이 댄스 게임 - V3 (스피드 타이밍)</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }

        /* 16:9 고정 해상도 컨테이너 */
        #game-container {
            width: 1280px;
            height: 720px;
            position: relative;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* 공통 화면 스타일 */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .screen.active { display: flex; }

        /* 애니메이션이 포함된 범용 이미지 버튼 스타일 */
        .img-btn {
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            outline: none;
            transition: transform 0.1s ease;
            transform-origin: center;
        }
        .img-btn:hover { transform: scale(1.03); }
        .img-btn.pressed { transform: scale(0.92); }

        /* UI 배치 요소 및 스케일 조정 */
        .bottom-center {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
        }
        /* START, DANCE 버튼 크기 2배 확대 */
        .large-btn img {
            width: auto;
            height: 140px; 
        }

        /* BACK 버튼 우측 상단으로 이동 및 2배 축소 */
        .top-right-back {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 10;
        }
        .top-right-back img {
            width: auto;
            height: 35px; 
        }

        .bottom-right-gift {
            position: absolute;
            bottom: 40px;
            right: 40px;
        }

        /* 난이도 버튼 */
        .difficulty-group {
            display: flex;
            gap: 30px;
            margin-bottom: 50px;
        }
        .diff-btn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #fff;
            border-radius: 15px;
            background: rgba(0,0,0,0.6);
            color: white;
        }
        .diff-btn.selected {
            background: #ffeb3b;
            color: #000;
            border-color: #ffeb3b;
        }

        /* 상단 텍스트 */
        .game-status {
            position: absolute;
            top: 35px;
            left: 40px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        /* 무대 요소 */
        #game-table {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            height: auto;
        }
        #doguri-char {
            position: absolute;
            bottom: 230px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: auto;
        }

        #dance-sequence-text {
            position: absolute;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 130px;
            font-weight: bold;
            color: #ffeb3b;
            text-shadow: 0 0 25px rgba(0,0,0,0.9);
            display: none;
        }

        /* 하단 리듬 제어 영역 */
        .rhythm-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none; 
            border: none;
            padding: 0;
            width: 600px;
        }

        /* 방향키 배치 레이아웃 */
        .arrow-sequence-box {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            justify-content: center;
        }
        .arrow-icon-slot {
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .arrow-icon-slot img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 제한 시간 타이머 타임바 (디자인 변경) */
        .gauge-wrapper {
            width: 480px;
            height: 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 2px solid #fff;
        }
        /* 줄어드는 남은 시간 바 */
        #time-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            background: #ff1744;
            box-shadow: 0 0 10px #ff1744;
            transition: width 0.05s linear;
        }

        #judgment-text {
            position: absolute;
            bottom: 185px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 34px;
            font-weight: bold;
            text-shadow: 0 3px 6px rgba(0,0,0,0.9);
        }

        /* 도감 및 팝업 창 */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 600px;
        }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .book-item {
            border: 2px solid #ccc;
            padding: 15px;
            border-radius: 10px;
            background: #f9f9f9;
            font-weight: bold;
        }
        .book-item.unlocked {
            background: #e3f2fd;
            border-color: #2196f3;
            color: #1565c0;
        }
        .close-btn {
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #reward-popup {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.98);
            border: 4px solid #ffeb3b;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 25;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <!-- 1. 인트로 화면 -->
    <div id="screen-intro" class="screen active">
        <button id="btn-main-start" class="img-btn bottom-center large-btn">
            <img src="DD_Main_Start_Button.png" alt="START" onerror="this.style.display='none'; this.after('[START 버튼]');">
        </button>
    </div>

    <!-- 2. 게임 시작화면 (난이도 선택 및 댄스 대기) -->
    <div id="screen-start" class="screen">
        <button id="btn-main-back" class="img-btn top-right-back">
            <img src="DD_Main_Back_Button.png" alt="뒤로가기" onerror="this.style.display='none'; this.after('← 뒤로가기');">
        </button>

        <div class="difficulty-group">
            <button id="btn-easy" class="diff-btn selected" onclick="selectDifficulty('easy')">쉬움</button>
            <button id="btn-normal" class="diff-btn" onclick="selectDifficulty('normal')">보통</button>
            <button id="btn-hard" class="diff-btn" onclick="selectDifficulty('hard')">어려움</button>
        </div>

        <button id="btn-main-dance" class="img-btn bottom-center large-btn">
            <img src="DD_Main_Dance_Button.png" alt="DANCE" onerror="this.style.display='none'; this.after('[DANCE 버튼]');">
        </button>

        <button id="btn-main-gift" class="img-btn bottom-right-gift" onclick="openCollection()">
            <img src="DD_Main_Gift_Button.png" alt="도감" onerror="this.style.display='none'; this.after('[도감]');">
        </button>
    </div>

    <!-- 3. 인게임 화면 -->
    <div id="screen-game" class="screen">
        <div class="game-status">
            <span id="txt-difficulty">난이도: 쉬움</span> | 
            <span id="txt-stage">스테이지: 1/5</span> | 
            <span id="txt-round">판수: 1/3</span>
        </div>

        <img id="game-table" src="DD_Game_Table.png" alt="단상" onerror="this.style.display='none';">
        <img id="doguri-char" src="doguri_image_base.png" alt="도구리" onerror="this.style.display='none'; this.after('[도구리]');">

        <div id="dance-sequence-text">1</div>
        <div id="judgment-text"></div>

        <!-- 하단 리듬 영역 -->
        <div class="rhythm-container" id="rhythm-ui">
            <div class="arrow-sequence-box" id="arrow-sequence-area"></div>
            
            <!-- 시간 초 제한 타임 게이지 -->
            <div class="gauge-wrapper">
                <div id="time-bar"></div>
            </div>
        </div>

        <!-- NEXT 버튼 -->
        <button id="btn-main-next" class="img-btn bottom-center large-btn" style="display: none;">
            <img src="DD_Main_Next_Button.png" alt="NEXT" onerror="this.style.display='none'; this.after('[NEXT 스테이지]');">
        </button>
    </div>

    <!-- 도감 보상 알림 팝업 -->
    <div id="reward-popup">
        <h2 style="color: #333; margin-top:0;">🌴 스테이지 올 클리어 보상 🌴</h2>
        <p style="font-size: 18px; color: #555;">랜덤 하와이 도감 아이템 증정 완료!</p>
        <div id="reward-item-name" style="font-size: 28px; font-weight: bold; color: #2196f3; margin: 20px 0;">[아이템]</div>
        <button class="close-btn" onclick="closeRewardPopup()">확인</button>
    </div>

    <!-- 도감 UI 레이어 -->
    <div id="collection-modal" class="modal">
        <div class="modal-content">
            <h2>🎒 도구리의 하와이 도감 (총 9종)</h2>
            <div class="book-grid" id="book-grid-container"></div>
            <button class="close-btn" onclick="closeCollection()">닫기</button>
        </div>
    </div>

</div>

<script>
    // --- 글로벌 상태값 제어 ---
    let currentDifficulty = 'easy';
    let currentStage = 1;
    let currentRound = 1;

    // 타임아웃 제한 시간 제어 변수
    let timerIntervalId = null;
    let remainingTime = 100;         // 남은 시간 % (100 -> 0)
    let timeDecreaseRate = 1.5;     // 난이도 및 개수별로 계산될 초당 감소 폭
    let isTimerStarted = false;     // 방향키를 한 번이라도 누르면 타이머 작동

    let targetArrowSequence = [];
    let currentArrowIndex = 0; 
    let isRoundFinished = false;

    const collectionItems = [
        "🍍 하와이안 파인애플", "🌸 알로하 레이", "🕶️ 선글라스",
        "🏄 미니 서프보드", "🥥 코코넛 주스", "🎸 우쿨렐레",
        "🩴 비치 샌들", "👕 하와이안 셔츠", "🏖️ 도구리 튜브"
    ];
    let unlockedItems = new Set();

    const BG_MAIN = "DD_Main_Image.png";
    const DOGURI_BASE = "doguri_image_base.png";
    const DOGURI_UPGRADE = "doguri_image_upgrade.png";

    const arrowKeyCodes = ['ArrowLeft', 'ArrowRight', 'ArrowDown', 'ArrowUp'];
    const arrowNames = { 'ArrowLeft': 'Left', 'ArrowRight': 'Right', 'ArrowDown': 'Down', 'ArrowUp': 'Up' };

    window.onload = function() {
        document.getElementById('game-container').style.backgroundImage = `url('${BG_MAIN}')`;
        initCollectionUI();
        updateDoguriImage();
        setupButtonClickEvents();
    };

    // 마우스 물리 클릭 & 애니메이션 통합 리스너 세팅
    function setupButtonClickEvents() {
        const btnConfigs = [
            { id: 'btn-main-start', action: goToGameStart },
            { id: 'btn-main-dance', action: startGameLoop },
            { id: 'btn-main-back', action: goToIntro },
            { id: 'btn-main-next', action: nextStageOrRound }
        ];

        btnConfigs.forEach(cfg => {
            let btn = document.getElementById(cfg.id);
            if(btn) {
                btn.addEventListener('mousedown', () => btn.classList.add('pressed'));
                btn.addEventListener('mouseup', () => btn.classList.remove('pressed'));
                btn.addEventListener('mouseleave', () => btn.classList.remove('pressed'));
                btn.addEventListener('click', () => {
                    btn.classList.add('pressed');
                    setTimeout(() => {
                        btn.classList.remove('pressed');
                        cfg.action();
                    }, 100);
                });
            }
        });
    }

    // 단축키 작동 대리 트리거 
    function triggerActionById(btnId, actionFunction) {
        let btn = document.getElementById(btnId);
        if (btn && btn.offsetHeight > 0) { // 화면에 보이는 상태일 때만
            btn.classList.add('pressed');
            setTimeout(() => {
                btn.classList.remove('pressed');
                actionFunction();
            }, 100);
        }
    }

    // --- 화면 네비게이션 함수군 ---
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function goToGameStart() { showScreen('screen-start'); }
    function goToIntro() { showScreen('screen-intro'); }

    function selectDifficulty(diff) {
        currentDifficulty = diff;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById(`btn-${diff}`).classList.add('selected');
    }

    function startGameLoop() {
        showScreen('screen-game');
        currentStage = 1;
        currentRound = 1;
        initRound();
    }

    // --- 인게임 라운드 비즈니스 로직 ---
    function initRound() {
        isRoundFinished = false;
        currentArrowIndex = 0;
        isTimerStarted = false;
        remainingTime = 100;
        clearInterval(timerIntervalId);
        
        let diffKo = currentDifficulty === 'easy' ? '쉬움' : currentDifficulty === 'normal' ? '보통' : '어려움';
        document.getElementById('txt-difficulty').innerText = `난이도: ${diffKo}`;
        document.getElementById('txt-stage').innerText = `스테이지: ${currentStage}/5`;
        document.getElementById('txt-round').innerText = `판수: ${currentRound}/3`;
        
        document.getElementById('judgment-text').innerText = '';
        document.getElementById('dance-sequence-text').style.display = 'none';
        document.getElementById('btn-main-next').style.display = 'none';
        document.getElementById('rhythm-ui').style.display = 'flex';
        document.getElementById('time-bar').style.width = '100%';
        
        // 방향키 개수 산정 (최소 3개 시작, 스테이지당 +1)
        let arrowCount = 2 + currentStage; 
        targetArrowSequence = [];
        
        let sequenceArea = document.getElementById('arrow-sequence-area');
        sequenceArea.innerHTML = '';

        // 화살표 리스트 생성
        for(let i=0; i<arrowCount; i++) {
            let randomKey = arrowKeyCodes[Math.floor(Math.random() * arrowKeyCodes.length)];
            targetArrowSequence.push(randomKey);

            let slot = document.createElement('div');
            slot.className = 'arrow-icon-slot';
            
            let img = document.createElement('img');
            img.src = `DD_${arrowNames[randomKey]}_Button_Normal.png`;
            img.id = `arrow-img-${i}`;
            img.alt = arrowNames[randomKey];
            
            img.onerror = function() {
                this.style.display = 'none';
                let sym = {'ArrowLeft':'←','ArrowRight':'→','ArrowDown':'↓','ArrowUp':'↑'};
                this.parentElement.innerText = sym[randomKey];
            };

            slot.appendChild(img);
            sequenceArea.appendChild(slot);
        }

        // 난이도 및 키 개수 비례 감소율 설계 (개수가 많을수록, 보통/어려움일수록 시간이 빠르게 타이트해짐)
        let baseDiffFactor = currentDifficulty === 'easy' ? 0.8 : currentDifficulty === 'normal' ? 1.4 : 2.2;
        timeDecreaseRate = baseDiffFactor * (1 + (arrowCount * 0.1));
    }

    // 타임바 감소 실시간 루프
    function startTimer() {
        isTimerStarted = true;
        timerIntervalId = setInterval(() => {
            if (isRoundFinished) {
                clearInterval(timerIntervalId);
                return;
            }
            remainingTime -= timeDecreaseRate;
            if (remainingTime <= 0) {
                remainingTime = 0;
                document.getElementById('time-bar').style.width = '0%';
                clearInterval(timerIntervalId);
                
                // 타임아웃 실패 연출
                let currentTargetKey = targetArrowSequence[currentArrowIndex];
                let imgEl = document.getElementById(`arrow-img-${currentArrowIndex}`);
                if(imgEl) imgEl.src = `DD_${arrowNames[currentTargetKey]}_Button_Fail.png`;
                
                showJudgment("TIME OVER! 시간 초과", "#f44336");
                endRound(false);
            } else {
                document.getElementById('time-bar').style.width = remainingTime + '%';
            }
        }, 30); // 약 30ms 간격으로 갱신
    }

    // --- 키보드 입력 매니저 (단축키 및 실시간 화살표 입력 검증) ---
    window.addEventListener('keydown', function(e) {
        let introActive = document.getElementById('screen-intro').classList.contains('active');
        let startActive = document.getElementById('screen-start').classList.contains('active');
        let gameActive = document.getElementById('screen-game').classList.contains('active');
        let nextBtnVisible = document.getElementById('btn-main-next').style.display === 'block';

        // 1. 단축키 핸들러 (Space 및 ESC)
        if (e.key === ' ' || e.key === 'Spacebar') {
            if (introActive) {
                e.preventDefault();
                triggerActionById('btn-main-start', goToGameStart);
                return;
            }
            if (startActive) {
                e.preventDefault();
                triggerActionById('btn-main-dance', startGameLoop);
                return;
            }
            if (gameActive && nextBtnVisible) {
                e.preventDefault();
                triggerActionById('btn-main-next', nextStageOrRound);
                return;
            }
        }

        if (e.key === 'Escape' || e.key === 'Esc') {
            if (startActive) {
                triggerActionById('btn-main-back', goToIntro);
                return;
            }
        }

        // 2. 방향키 연속 타격 시스템
        if (!gameActive || isRoundFinished) return;

        if (arrowKeyCodes.includes(e.key)) {
            // 첫 방향키 입력 시점부터 촉박하게 제한 시간 작동 시작!
            if (!isTimerStarted) {
                startTimer();
            }

            let targetKey = targetArrowSequence[currentArrowIndex];
            let imgEl = document.getElementById(`arrow-img-${currentArrowIndex}`);

            if (e.key === targetKey) {
                // 단일 입력 매칭 완료 -> Success 이미지 변경
                if(imgEl) imgEl.src = `DD_${arrowNames[targetKey]}_Button_Success.png`;
                currentArrowIndex++;

                // 스페이스바 판정 없이, 마지막 방향키를 누르자마자 즉시 성공 판정!
                if (currentArrowIndex >= targetArrowSequence.length) {
                    clearInterval(timerIntervalId);
                    showJudgment("PERFECT!!!", "#4caf50");
                    endRound(true);
                }
            } else {
                // 방향키 타격 오류 -> 즉시 실패(Fail) 이미지 전환 및 패배 처리
                if(imgEl) imgEl.src = `DD_${arrowNames[targetKey]}_Button_Fail.png`;
                clearInterval(timerIntervalId);
                showJudgment("MISS! 틀린 방향키", "#f44336");
                endRound(false);
            }
        }
    });

    // 라운드 결과 세틀먼트
    function endRound(isSuccess) {
        isRoundFinished = true;

        if (isSuccess) {
            document.getElementById('rhythm-ui').style.display = 'none';
            let seqDisplay = document.getElementById('dance-sequence-text');
            seqDisplay.innerText = Math.floor(Math.random() * 9) + 1; 
            seqDisplay.style.display = 'block';
            
            // 승리 시 다음 버튼 표출
            document.getElementById('btn-main-next').style.display = 'block';
        } else {
            // 실패 시 1.2초 후 리트라이 초기화
            setTimeout(() => { initRound(); }, 1200);
        }
    }

    function nextStageOrRound() {
        if (currentRound < 3) {
            currentRound++;
            initRound();
        } else {
            if (currentStage < 5) {
                currentStage++;
                currentRound = 1;
                initRound();
            } else {
                giveRandomReward();
            }
        }
    }

    // --- 도감(Collection) 시스템 ---
    function initCollectionUI() {
        let grid = document.getElementById('book-grid-container');
        grid.innerHTML = '';
        collectionItems.forEach((item, index) => {
            let box = document.createElement('div');
            box.id = `book-item-${index}`;
            box.className = `book-item ${unlockedItems.has(index) ? 'unlocked' : ''}`;
            box.innerText = unlockedItems.has(index) ? item : `🔒 미획득 (${index + 1})`;
            grid.appendChild(box);
        });
    }

    function updateDoguriImage() {
        let charImg = document.getElementById('doguri-char');
        if (unlockedItems.size === 9) {
            charImg.src = DOGURI_UPGRADE;
            charImg.onerror = function() {
                this.style.display = 'none';
                if(!this.nextSibling || this.nextSibling.textContent.indexOf('하와이안') === -1) {
                    this.after('[👑 하와이안 도구리 업그레이드 완료]');
                }
            };
        } else {
            charImg.src = DOGURI_BASE;
        }
    }

    function giveRandomReward() {
        let randomIndex = Math.floor(Math.random() * collectionItems.length);
        unlockedItems.add(randomIndex);
        
        initCollectionUI();
        updateDoguriImage();

        document.getElementById('reward-item-name').innerText = collectionItems[randomIndex];
        document.getElementById('reward-popup').style.display = 'block';
    }

    function closeRewardPopup() {
        document.getElementById('reward-popup').style.display = 'none';
        goToGameStart();
    }

    function openCollection() {
        initCollectionUI();
        document.getElementById('collection-modal').style.display = 'flex';
    }
    function closeCollection() {
        document.getElementById('collection-modal').style.display = 'none';
    }
</script>

</body>
</html>
