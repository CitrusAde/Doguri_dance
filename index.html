<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도구리 댄스 (Doguri Dance) - 하와이 에디션 v4.1</title>
    <style>
        :root {
            --theme-border: #e17055;
            --theme-font: #4a3b32;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #f0e6d2;
            color: var(--theme-font);
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        
        #game-container {
            width: 1024px;
            height: 576px;
            max-width: 100%;
            aspect-ratio: 16 / 9;
            /* 전달해주신 단 하나의 메인 배경화면으로 완전 통일 */
            background: url('DD_Main_Image.jpg') no-repeat center center;
            background-size: cover;
            border: 8px solid var(--theme-border);
            box-shadow: 0 10px 30px rgba(74, 59, 50, 0.2);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (max-aspect-ratio: 1/1) {
            #game-container { width: 100%; height: auto; aspect-ratio: 9 / 16; max-height: 95vh; }
        }

        /* 기존의 모든 배경 스타일 요소를 완전히 지우고 투명화 */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; padding: 20px;
            background: transparent !important;
        }
        .hidden { display: none !important; }

        .title-logo {
            font-size: 44px; font-weight: bold; color: #d63031;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #fdcb6e; margin-bottom: 20px;
        }
        
        .btn-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .img-btn {
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent;
            border: none;
            cursor: pointer;
            transition: transform 0.05s;
        }
        .img-btn:active, .img-btn.pressed { transform: scale(0.95); }

        .start-btn-asset { width: 200px; height: 66px; background-image: url('DD_Main_Start_Button.png'); }
        .dance-btn-asset { width: 200px; height: 66px; background-image: url('DD_Main_Dance_Button.png'); }
        .gift-btn-asset { width: 160px; height: 53px; background-image: url('DD_Main_Gift_Button.png'); }
        .next-btn-asset { width: 200px; height: 66px; background-image: url('DD_Main_Next_Button.png'); }
        .back-btn-asset { width: 140px; height: 46px; background-image: url('DD_Main_Back_Button.png'); }

        .space-hint {
            font-size: 11px; color: #636e72; font-weight: bold;
            background: rgba(255,255,255,0.7); padding: 2px 6px; border-radius: 4px; border: 1px solid #b2bec3;
        }

        /* DD_Game_Table 단상 지정 */
        .hawaii-podium {
            width: 220px; 
            height: 73px; 
            background: url('DD_Game_Table.png') no-repeat center center;
            background-size: contain;
            position: relative; 
            margin-bottom: 20px;
        }
        
        .doguri-sprite {
            width: 90px; height: 90px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            position: absolute; 
            bottom: 52px; 
            left: 65px;
            animation: bounce 0.6s infinite alternate;
        }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-6px); } }

        .top-right-actions { position: absolute; top: 20px; right: 20px; z-index: 20; }
        .bottom-right-actions { position: absolute; bottom: 20px; right: 20px; z-index: 20; }

        .podium-container { display: flex; justify-content: center; width: 100%; gap: 25px; margin-top: -30px; }
        .difficulty-card {
            background: rgba(255, 255, 255, 0.8); border: 3px solid #4a3b32;
            border-radius: 15px; padding: 15px; width: 140px; display: flex; flex-direction: column; align-items: center;
            cursor: pointer; box-shadow: 0 4px 0 #4a3b32;
        }
        .difficulty-card.selected { background: #ffeaa7; border-color: #d63031; transform: scale(1.05); }
        .diff-title { font-size: 18px; font-weight: bold; }

        #game-hud {
            width: 100%; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.4); border-bottom: 3px solid #4a3b32; position: absolute; top: 0; left: 0;
        }
        .hud-block { font-size: 14px; font-weight: bold; background: #fff; padding: 6px 12px; border-radius: 8px; border: 2px solid #4a3b32; }
        
        .hud-heart-box {
            position: absolute; bottom: 20px; left: 20px; z-index: 15;
            background: rgba(255, 255, 255, 0.8); padding: 8px 12px; border-radius: 10px;
            border: 2px solid #4a3b32; display: flex; flex-direction: column; gap: 4px;
        }
        .heart-container { display: flex; gap: 4px; align-items: center; }
        .heart-icon { width: 22px; height: 22px; background-size: contain; background-repeat: no-repeat; }

        #play-zone { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        #dance-sequence-box {
            position: absolute; bottom: 75px; left: 50%; transform: translateX(-50%);
            font-size: 54px; font-weight: bold; color: #d63031; text-shadow: 2px 2px 0 #fff; display: none;
        }
        #dance-sequence-box.animating { display: block; animation: textDance 0.15s infinite alternate; }

        /* 방향키 및 게이지 하단 배치 가중치 유지 */
        #input-chain-area { 
            position: absolute;
            bottom: 95px;
            display: flex; gap: 12px; min-height: 60px; align-items: center; 
        }
        .arrow-item {
            width: 48px; height: 48px; border: 3px solid #4a3b32; border-radius: 8px; background: #fff;
            display: flex; justify-content: center; align-items: center; position: relative;
            background-size: 70% 70%; background-repeat: no-repeat; background-position: center;
        }
        .arrow-item.active { background-color: #ffeaa7; transform: scale(1.05); }
        .arrow-item.cleared { background-color: #2ecc71; transform: scale(0.9); background-image: none !important; }
        .arrow-item.cleared::after { content: '✓'; color: white; font-size: 20px; font-weight: bold; }
        .arrow-item.invisible-gimmick { opacity: 0 !important; }
        .double-tap-badge {
            position: absolute; bottom: -6px; right: -6px; background: #e74c3c; color: white;
            font-size: 9px; padding: 1px 3px; border-radius: 4px; border: 1px solid #4a3b32; font-weight: bold;
        }

        #spacebar-gauge { 
            position: absolute;
            bottom: 45px;
            width: 320px; height: 18px; background: #fff; border: 3px solid #4a3b32; border-radius: 9px; overflow: hidden; opacity: 0.3; 
        }
        #spacebar-gauge.active { opacity: 1; }
        
        #target-parry-zone { position: absolute; height: 100%; background: #ff7675; border-left: 2px solid #4a3b32; border-right: 2px solid #4a3b32; left: 75%; }
        #gauge-pin { position: absolute; height: 100%; width: 6px; background: #4a3b32; left: 0%; }

        #game-toast { font-size: 24px; font-weight: bold; color: #2ecc71; margin-top: 80px; height: 30px; }
        .gacha-item-box { font-size: 28px; font-weight: bold; color: #f1c40f; margin: 15px 0; padding: 10px 20px; background: #fff; border: 3px solid #4a3b32; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 1. 시작 화면 -->
        <div id="main-screen" class="screen">
            <div class="title-logo">도구리 댄스</div>
            <div class="hawaii-podium" style="margin-top: 20px;"><div class="doguri-sprite" id="lobby-doguri"></div></div>
            <div class="btn-wrapper">
                <button class="img-btn start-btn-asset" id="lobby-dance-btn"></button>
                <div class="space-hint" style="margin-top: 5px;">SPACE 키로 시작</div>
            </div>
        </div>

        <!-- 2. 난이도 선택 화면 -->
        <div id="select-screen" class="screen hidden">
            <div class="top-right-actions">
                <button class="img-btn back-btn-asset" id="select-back-btn"></button>
            </div>

            <div class="title-logo" style="font-size:32px; margin-bottom:40px;">난이도 선택</div>
            
            <div class="podium-container">
                <div class="difficulty-card card-easy selected" data-diff="easy" data-idx="0"><div class="diff-title">쉬움</div></div>
                <div class="difficulty-card card-normal" data-diff="normal" data-idx="1"><div class="diff-title">보통</div></div>
                <div class="difficulty-card card-hard" data-diff="hard" data-idx="2"><div class="diff-title">어려움</div></div>
            </div>
            
            <div class="btn-wrapper">
                <button class="img-btn dance-btn-asset" id="select-start-btn"></button>
                <div class="space-hint" style="margin-top: 5px;">SPACE 키로 시작 (방향키 이동)</div>
            </div>

            <div class="bottom-right-actions">
                <button class="img-btn gift-btn-asset" id="select-collection-btn" onclick="alert('도감 시스템 준비 중!')"></button>
            </div>
        </div>

        <!-- 3. 플레이 화면 (HTML 내 인라인 테그 배경 완전 제거) -->
        <div id="play-screen" class="screen hidden">
            <div id="game-hud">
                <div class="hud-block" id="hud-stage-name">EASY - STAGE 1 (1/3)</div>
                <div class="hud-block">남은 시간: <span id="hud-timer">15.0</span>s</div>
            </div>

            <div class="hud-heart-box">
                <div style="font-size: 11px; font-weight: bold; color: #e74c3c;">LIFE</div>
                <div class="heart-container" id="hud-hearts"></div>
            </div>

            <div id="play-zone">
                <div id="game-toast"></div>
                <div style="position: absolute; top: 130px; width: 100%; display:flex; justify-content:center;">
                    <div class="hawaii-podium">
                        <div class="doguri-sprite" id="game-doguri"></div>
                    </div>
                    <div id="dance-sequence-box">1</div>
                </div>
                
                <div id="input-chain-area"></div>
                
                <div id="spacebar-gauge">
                    <div id="target-parry-zone"></div>
                    <div id="gauge-pin"></div>
                </div>
            </div>
        </div>

        <!-- 4. 결과 및 라운드 클리어 화면 (HTML 내 인라인 테그 배경 완전 제거) -->
        <div id="result-screen" class="screen hidden">
            <div class="title-logo" id="result-header" style="font-size:36px; margin-top: -60px;">STAGE CLEAR</div>
            <p id="result-message" style="font-weight: bold; color:#636e72; margin-bottom: 20px;">축하합니다!</p>
            
            <div id="gacha-area" class="hidden">
                <div style="font-size:14px; font-weight:bold; color:#ff7675;">🎁 전체 난이도 완포 보상 획득!</div>
                <div class="gacha-item-box" id="gacha-item-name">일반 #3</div>
            </div>

            <div class="btn-wrapper">
                <button class="img-btn next-btn-asset" id="res-next-btn"></button>
                <div class="space-hint" style="margin-top: 5px;">SPACE 키 또는 마우스 클릭</div>
            </div>
        </div>
    </div>

    <script>
        const IMAGE_SOURCES = {
            doguri_default: 'doguri_image_base.png',
            heart: '', arrow_Left: '', arrow_Up: '', arrow_Right: '', arrow_Down: '',
            sequence: { 1: '', 2: '', 3: '', 4: '', 5: '', 6: '', 7: '', 8: '', 9: '' }
        };

        const STAGE_CONFIGS = {
            easy: [
                { stage: 1, keys: 2, invisible: false, doubleTap: false },
                { stage: 2, keys: 3, invisible: false, doubleTap: false },
                { stage: 3, keys: 3, invisible: false, doubleTap: false },
                { stage: 4, keys: 4, invisible: false, doubleTap: false },
                { stage: 5, keys: 5, invisible: true, doubleTap: false }
            ],
            normal: [
                { stage: 1, keys: 3, invisible: false, doubleTap: false },
                { stage: 2, keys: 4, invisible: false, doubleTap: false },
                { stage: 3, keys: 4, invisible: false, doubleTap: false },
                { stage: 4, keys: 4, invisible: true, doubleTap: false },
                { stage: 5, keys: 5, invisible: true, doubleTap: true }
            ],
            hard: [
                { stage: 1, keys: 3, invisible: false, doubleTap: false },
                { stage: 2, keys: 4, invisible: false, doubleTap: false },
                { stage: 3, keys: 4, invisible: false, doubleTap: false },
                { stage: 4, keys: 4, invisible: true, doubleTap: false },
                { stage: 5, keys: 5, invisible: true, doubleTap: true }
            ]
        };

        const KEY_CODES = { 'ArrowLeft': '←', 'ArrowUp': '↑', 'ArrowRight': '→', 'ArrowDown': '↓' };
        const DIRECTIONS = ['Left', 'Up', 'Right', 'Down'];
        const CONFIG_LOOKUP_SYM = { 'Left': '←', 'Up': '↑', 'Right': '→', 'Down': '↓' };

        let currentScreen = 'main-screen';
        let selectedDifficulty = 'easy';
        let diffMenuIndex = 0;
        let currentStageIndex = 0;
        let subRoundCounter = 1;
        
        const REQ_SUB_ROUNDS = 3;

        let gameLoopActive = false;
        let gameAnimationFrameId = null;
        let timeLeft = 15.0;
        let currentSequence = [];
        let currentArrowIndex = 0;
        let playPhase = 'INPUT';
        let hearts = 3;
        let perfectStreak = 0;
        let gaugePos = 0;

        const FIXED_GAUGE_SPEED = 0.7; 
        const BASE_GAUGE_WIDTH = 24;

        let sequenceFrameCounter = 1;
        let sequenceTimerId = null;

        function applyImageToElement(elementId, imgSrc, isCssBg = false, fallbackColor = '#ff9ebb') {
            const el = document.getElementById(elementId);
            if (!el) return;
            if (imgSrc) {
                if (isCssBg) el.style.backgroundImage = `url('${imgSrc}')`;
                else el.src = imgSrc;
            } else {
                if (isCssBg) el.style.backgroundColor = fallbackColor;
            }
        }

        applyImageToElement('lobby-doguri', IMAGE_SOURCES.doguri_default, true, 'transparent');
        applyImageToElement('game-doguri', IMAGE_SOURCES.doguri_default, true, 'transparent');

        function showScreen(screenId) {
            currentScreen = screenId;
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        function updateDiffSelectionUI() {
            const cards = document.querySelectorAll('.difficulty-card');
            cards.forEach((card, idx) => {
                if (idx === diffMenuIndex) {
                    card.classList.add('selected');
                    selectedDifficulty = card.getAttribute('data-diff');
                } else {
                    card.classList.remove('selected');
                }
            });
        }

        function drawHeartsUI() {
            const container = document.getElementById('hud-hearts');
            container.innerHTML = '';
            for (let i = 0; i < hearts; i++) {
                let h = document.createElement('div');
                h.className = 'heart-icon';
                if (IMAGE_SOURCES.heart) h.style.backgroundImage = `url('${IMAGE_SOURCES.heart}')`;
                else { h.style.backgroundColor = '#e74c3c'; h.style.borderRadius = '50%'; }
                container.appendChild(h);
            }
        }

        document.getElementById('lobby-dance-btn').addEventListener('click', () => {
            diffMenuIndex = 0; updateDiffSelectionUI(); showScreen('select-screen');
        });

        document.getElementById('select-back-btn').addEventListener('click', () => {
            showScreen('main-screen');
        });

        document.getElementById('select-start-btn').addEventListener('click', () => {
            currentStageIndex = 0; subRoundCounter = 1; hearts = 3; perfectStreak = 0;
            initGameplay();
        });

        document.getElementById('res-next-btn').addEventListener('click', () => {
            handleResultTransition();
        });

        document.querySelectorAll('.difficulty-card').forEach(card => {
            card.addEventListener('click', () => {
                diffMenuIndex = parseInt(card.getAttribute('data-idx'));
                updateDiffSelectionUI();
            });
        });

        window.addEventListener('keydown', (e) => {
            if (currentScreen === 'main-screen' && e.key === ' ') {
                e.preventDefault();
                document.getElementById('lobby-dance-btn').classList.add('pressed');
                setTimeout(() => {
                    document.getElementById('lobby-dance-btn').classList.remove('pressed');
                    document.getElementById('lobby-dance-btn').click();
                }, 100);
                return;
            }

            if (currentScreen === 'select-screen') {
                if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); diffMenuIndex = (diffMenuIndex - 1 + 3) % 3; updateDiffSelectionUI(); }
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); diffMenuIndex = (diffMenuIndex + 1) % 3; updateDiffSelectionUI(); }
                if (e.key === ' ') {
                    e.preventDefault();
                    document.getElementById('select-start-btn').classList.add('pressed');
                    setTimeout(() => {
                        document.getElementById('select-start-btn').classList.remove('pressed');
                        document.getElementById('select-start-btn').click();
                    }, 100);
                }
                return;
            }

            if (currentScreen === 'play-screen' && gameLoopActive) {
                if (playPhase === 'INPUT' && e.key in KEY_CODES) {
                    e.preventDefault();
                    let inputDir = KEY_CODES[e.key];
                    let currentTarget = currentSequence[currentArrowIndex];
                    let expectedDirSym = CONFIG_LOOKUP_SYM[currentTarget.dir];

                    if (inputDir === expectedDirSym) {
                        currentTarget.curTaps++;
                        if (currentTarget.curTaps >= currentTarget.reqTaps) {
                            let nodes = document.getElementById('input-chain-area').children;
                            nodes[currentArrowIndex].classList.remove('active');
                            nodes[currentArrowIndex].classList.add('cleared');
                            
                            currentArrowIndex++;
                            if (currentArrowIndex >= currentSequence.length) {
                                playPhase = 'SPACE';
                                document.getElementById('spacebar-gauge').classList.add('active');
                            } else { nodes[currentArrowIndex].classList.add('active'); }
                        }
                    } else { handleRoundFailure(); }
                } else if (playPhase === 'SPACE' && e.key === ' ') {
                    e.preventDefault();
                    let minPerfectRange = 75;
                    let maxPerfectRange = 75 + BASE_GAUGE_WIDTH;

                    if (gaugePos >= minPerfectRange && gaugePos <= maxPerfectRange) {
                        perfectStreak++;
                        if (perfectStreak >= 3) { hearts++; perfectStreak = 0; triggerFeedbackFlash('PERFECT x3! HP +1', '#2ecc71'); }
                        else { triggerFeedbackFlash('PERFECT!', '#2ecc71'); }
                        drawHeartsUI();
                        startDancePerformance();
                    } else { handleRoundFailure(); }
                }
                return;
            }

            if (currentScreen === 'result-screen' && e.key === ' ') {
                e.preventDefault();
                handleResultTransition();
            }
        });

        function handleResultTransition() {
            const wasStageClear = document.getElementById('result-header').innerText === "STAGE CLEAR";
            const wasGameOver = document.getElementById('result-header').innerText === "GAME OVER";
            
            if (wasGameOver) { showScreen('main-screen'); return; }
            if (wasStageClear) {
                currentStageIndex++;
                if (currentStageIndex >= 5) { showScreen('main-screen'); return; }
            }
            subRoundCounter = 1;
            initGameplay();
        }

        function handleRoundFailure() {
            perfectStreak = 0; hearts--; drawHeartsUI(); triggerFeedbackFlash('FAIL', '#e74c3c');
            if (hearts <= 0) { 
                gameLoopActive = false; 
                if (gameAnimationFrameId) { cancelAnimationFrame(gameAnimationFrameId); gameAnimationFrameId = null; }
                resolveStageEnd(false); 
            } else { buildNewSequenceChain(); }
        }

        function initGameplay() {
            if (gameAnimationFrameId) {
                cancelAnimationFrame(gameAnimationFrameId);
                gameAnimationFrameId = null;
            }

            showScreen('play-screen'); drawHeartsUI();
            const config = STAGE_CONFIGS[selectedDifficulty][currentStageIndex];
            
            document.getElementById('target-parry-zone').style.width = BASE_GAUGE_WIDTH + '%';
            document.getElementById('hud-stage-name').innerText = `${selectedDifficulty.toUpperCase()} - STAGE ${config.stage} (${subRoundCounter}/${REQ_SUB_ROUNDS}판)`;
            document.getElementById('game-toast').innerText = '';
            document.getElementById('game-doguri').classList.remove('hidden');
            document.getElementById('dance-sequence-box').classList.remove('animating');
            timeLeft = 15.0; document.getElementById('hud-timer').innerText = timeLeft.toFixed(1);
            
            clearInterval(sequenceTimerId); 
            buildNewSequenceChain();
            
            gameLoopActive = true; 
            gameAnimationFrameId = requestAnimationFrame(runGameFrame);
        }

        function buildNewSequenceChain() {
            const config = STAGE_CONFIGS[selectedDifficulty][currentStageIndex];
            currentArrowIndex = 0; playPhase = 'INPUT'; gaugePos = 0;
            document.getElementById('spacebar-gauge').classList.remove('active');
            document.getElementById('gauge-pin').style.left = '0%';
            let length = config.keys; currentSequence = [];
            for (let i = 0; i < length; i++) {
                let randomDir = DIRECTIONS[Math.floor(Math.random() * DIRECTIONS.length)];
                let requiresTwoClicks = config.doubleTap && (i === length - 1 || Math.random() > 0.5);
                currentSequence.push({ dir: randomDir, reqTaps: requiresTwoClicks ? 2 : 1, curTaps: 0 });
            }
            let invisibleIdx = config.invisible ? Math.floor(Math.random() * length) : -1;
            const chainArea = document.getElementById('input-chain-area'); chainArea.innerHTML = '';
            currentSequence.forEach((item, idx) => {
                let arrowNode = document.createElement('div'); arrowNode.className = 'arrow-item';
                if (idx === 0) arrowNode.classList.add('active');
                let customImg = IMAGE_SOURCES[`arrow_${item.dir}`];
                if (customImg) arrowNode.style.backgroundImage = `url('${customImg}')`;
                else arrowNode.innerText = CONFIG_LOOKUP_SYM[item.dir];
                if (item.reqTaps === 2) {
                    let badge = document.createElement('span'); badge.className = 'double-tap-badge'; badge.innerText = 'x2';
                    arrowNode.appendChild(badge);
                }
                if (idx === invisibleIdx) arrowNode.classList.add('invisible-gimmick');
                chainArea.appendChild(arrowNode);
            });
        }

        function triggerFeedbackFlash(txt, color) {
            const t = document.getElementById('game-toast'); t.innerText = txt; t.style.color = color;
            setTimeout(() => { if (t.innerText === txt) t.innerText = ''; }, 600);
        }

        function startDancePerformance() {
            playPhase = 'DANCE'; document.getElementById('game-doguri').classList.add('hidden');
            const danceDisplay = document.getElementById('dance-sequence-box');
            danceDisplay.classList.add('animating'); sequenceFrameCounter = 1; danceDisplay.innerText = sequenceFrameCounter;
            
            sequenceTimerId = setInterval(() => {
                sequenceFrameCounter++;
                if (sequenceFrameCounter > 9) {
                    clearInterval(sequenceTimerId);
                    if (subRoundCounter >= REQ_SUB_ROUNDS) {
                        gameLoopActive = false;
                        if (gameAnimationFrameId) { cancelAnimationFrame(gameAnimationFrameId); gameAnimationFrameId = null; }
                        resolveStageEnd(true);
                    } else { subRoundCounter++; initGameplay(); }
                } else { danceDisplay.innerText = sequenceFrameCounter; }
            }, 60);
        }

        function runGameFrame() {
            if (!gameLoopActive) return;
            timeLeft -= 1/60;
            if (timeLeft <= 0) { 
                timeLeft = 0; 
                document.getElementById('hud-timer').innerText = "0.0"; 
                handleRoundFailure(); 
                return; 
            }
            document.getElementById('hud-timer').innerText = timeLeft.toFixed(1);
            if (playPhase === 'SPACE') {
                gaugePos += FIXED_GAUGE_SPEED; 
                if (gaugePos > 100) gaugePos = 0;
                document.getElementById('gauge-pin').style.left = `${gaugePos}%`;
            }
            gameAnimationFrameId = requestAnimationFrame(runGameFrame);
        }

        function getRandomGachaReward() {
            let rand = Math.random() * 100;
            if (rand < 60) return `일반 도감 #${Math.floor(Math.random() * 4) + 1}`;
            else if (rand < 90) return `레어 도감 #${Math.floor(Math.random() * 3) + 5}`;
            else return `🔥 에픽 도감 #${Math.floor(Math.random() * 2) + 8}`;
        }

        function resolveStageEnd(isSuccess) {
            gameLoopActive = false; showScreen('result-screen');
            const header = document.getElementById('result-header'); const msg = document.getElementById('result-message');
            const btn = document.getElementById('res-next-btn'); const gachaArea = document.getElementById('gacha-area');
            
            if (isSuccess) {
                header.innerText = "STAGE CLEAR"; header.style.color = "#2ecc71";
                
                if (currentStageIndex === 4) { 
                    gachaArea.classList.remove('hidden');
                    document.getElementById('gacha-item-name').innerText = getRandomGachaReward();
                    msg.innerText = "축하합니다! 모든 스테이지를 돌파하여 난이도를 마스터하셨습니다!"; 
                } else { 
                    gachaArea.classList.add('hidden'); 
                    msg.innerText = `스테이지 ${currentStageIndex + 1} 돌파 완료!`; 
                }
            } else {
                header.innerText = "GAME OVER"; header.style.color = "#e74c3c"; gachaArea.classList.add('hidden');
                msg.innerText = "하트를 모두 잃어 무대 뒤로 쫓겨났습니다.";
            }
        }
    </script>
</body>
</html>
