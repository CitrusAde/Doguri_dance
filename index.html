<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도구리 하와이 댄스 게임 - V36</title>
    <style>
        /* 👑 커스텀 NPS 폰트 등록 */
        @font-face {
            font-family: 'NPSfont_bold';
            src: url('NPSfont_bold.woff2') format('woff2'),
                 url('NPSfont_bold.woff') format('woff'),
                 url('NPSfont_bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        * { 
            box-sizing: border-box; 
            user-select: none; 
            font-family: 'NPSfont_bold', 'LINESeedKR-Bd', 'Malgun Gothic', sans-serif; 
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 16:9 고정 해상도 컨테이너 */
        #game-container {
            width: 1280px;
            height: 720px;
            position: relative;
            background-image: url('DD_Main_Image.png');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: background-image 0.5s ease;
        }

        /* 공통 화면 스타일 */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .screen.active { display: flex; }

        /* 🔊 좌측 상단 소리 제어 패널 */
        .audio-controller-panel {
            position: absolute;
            top: 30px;
            left: 40px;
            background: url('DD_Nick_Bg.png') no-repeat center center;
            background-size: 100% 100%; 
            border-radius: 12px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .audio-toggle-btn {
            background: none;
            border: none;
            color: #000; 
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            transition: transform 0.1s ease;
        }
        .audio-toggle-btn:active { transform: scale(0.9); }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 85px;
            height: 6px;
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #000;
            cursor: pointer;
        }

        #main-logo {
            display: block;
            max-width: 90%;
            height: auto;
            margin-bottom: 30px;
            transform: translateY(30px);
        }

        /* 닉네임 입력 구역 레이아웃 */
        .nickname-area-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .nick-title-img {
            display: block;
            max-width: 100%;
            height: auto;
            margin-top: 15px;
            transform: translateY(20px);
        }
        .nick-input-wrapper {
            position: relative;
            width: auto;
            height: auto;
            display: inline-block;
            transform: scale(0.7);
            transform-origin: center center;
        }
        .nick-bg-img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .nick-input-field {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 60%;
            background: none;
            border: none;
            outline: none;
            color: #000;
            font-size: 26px; 
            font-weight: bold;
            text-align: center;
        }

        /* 버튼 가이드 세트 */
        .btn-with-guide-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .space-shortcut-guide {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
        }

        /* 이미지 버튼 지침 */
        .img-btn {
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            outline: none;
            display: block;
            transition: transform 0.1s ease;
            transform-origin: center center;
        }
        .img-btn:hover { transform: scale(1.05); }
        .img-btn.pressed { transform: scale(0.95); }

        .origin-size-btn img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        /* 👑 DANCE 버튼 20px 내림 (bottom 45px -> 25px) */
        .bottom-dance-position {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .top-right-back {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 10;
        }
        .top-right-back img {
            display: block;
            height: 35px;
            width: auto;
        }

        /* 우측 하단 레이아웃 제어 그룹 */
        .bottom-right-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
            z-index: 10;
        }
        .mini-btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
        }
        .dummy-reset-btn {
            padding: 8px 14px;
            background: rgba(244, 67, 54, 0.5);
            color: white;
            border: 2px solid #fff;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
        .dummy-reset-btn:hover { background: rgba(244, 67, 54, 0.8); }

        /* 연습 모드 영역 */
        #practice-ui {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }
        .practice-title {
            color: #fff;
            font-size: 20px;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        @keyframes floatSpecial {
            0%, 100% { margin-top: 0px; }
            50% { margin-top: -10px; }
        }
        #special-stage-btn {
            position: absolute;
            top: 50%;
            left: calc(50% + 280px);
            transform: translateY(-50%);
            cursor: pointer;
            z-index: 15;
            display: none;
            animation: floatSpecial 1s ease-in-out infinite;
        }
        #special-stage-btn:hover img { transform: scale(1.05); }
        #special-stage-btn:active img { transform: scale(0.95); }
        #special-stage-btn img {
            display: block;
            width: 150px; 
            height: auto;
            transition: transform 0.1s ease;
        }

        /* 난이도 이미지 버튼 그룹 */
        .difficulty-group {
            position: absolute;
            bottom: 110px; 
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px; 
            align-items: flex-start;
            justify-content: center;
            z-index: 10;
        }
        
        .diff-btn-slot {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px; 
            transition: transform 0.1s ease;
            transform-origin: center center;
        }
        .diff-btn-slot:hover { transform: scale(1.05); }
        .diff-btn-slot:active { transform: scale(0.95); }

        .diff-glow-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130%;
            height: 130%;
            object-fit: contain;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .diff-btn-slot.selected .diff-glow-layer { opacity: 1; }

        .diff-img-btn {
            position: relative;
            z-index: 2;
            display: block;
        }
        .diff-img-btn img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .game-status {
            position: absolute;
            top: 35px;
            left: 220px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            z-index: 5;
            display: flex;
            gap: 15px;
        }

        .life-container-wrapper {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 10;
            transform: scale(0.7);
            transform-origin: left bottom;
        }
        .life-bg-asset {
            display: block;
            max-width: none;
            height: auto;
        }
        .life-hearts-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            width: 85%;
            height: 100%;
        }
        .heart-img-slot {
            width: 45px;
            height: 45px;
            object-fit: contain;
            transition: opacity 0.1s ease;
        }
        .heart-img-slot.hidden-life {
            opacity: 0;
        }

        #game-table {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            height: auto;
            z-index: 1;
        }
        #doguri-char {
            position: absolute;
            bottom: 195px; 
            left: 50%;
            transform: translateX(-50%) scale(1);
            transform-origin: bottom center; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 180px;
            height: auto;
            z-index: 2;
        }

        .rhythm-container {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 900px;
            z-index: 4;
        }
        .arrow-sequence-box {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .arrow-icon-slot {
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.08s ease;
            transform-origin: center center;
        }
        .arrow-icon-slot.hit { transform: scale(1.25); }
        .arrow-icon-slot img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes blinkArrow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .blinking-arrow {
            animation: blinkArrow 0.4s infinite;
        }

        .timer-wrapper {
            width: 400px;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #fff;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to right, #f44336, #ffeb3b, #4caf50);
            background-size: 400px 10px;
            background-position: left center;
            background-repeat: no-repeat;
            box-shadow: 0 0 8px rgba(255,255,255,0.3);
            transition: width 0.05s linear;
        }

        #judgment-text {
            position: absolute;
            bottom: 210px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 34px;
            font-weight: bold;
            text-shadow: 0 3px 6px rgba(0,0,0,0.9);
            z-index: 4;
        }

        /* 팝업 공통 배경 모달 */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 120;
            flex-direction: column;
        }

        /* 가로형 보상 팝업 */
        .modal-content-horizontal {
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center center;
            width: 826px; height: 461px;
            transform: scale(0.85); 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .popup-safe-box-horizontal {
            width: 695px; height: 305px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #000;
        }

        /* 세로형 팝업 (도감, 랭킹) */
        .modal-content-vertical {
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center center;
            width: 688px; 
            height: 854px; 
            transform: scale(0.8); 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .popup-safe-box-vertical {
            width: 500px; 
            height: 640px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            color: #fff;
            padding-top: 20px;
        }

        /* 랭킹 탭 버튼 */
        .rank-tabs {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 25px;
            justify-content: center;
        }
        .rank-tab-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            color: #fff;
            padding: 8px 18px;
            font-size: 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
        }
        .rank-tab-btn.active {
            background: #ffeb3b;
            color: #000;
            border-color: #ffeb3b;
        }

        /* 랭킹 리스트 */
        .leaderboard-modal-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding-right: 10px;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        .leaderboard-row.my-row {
            color: #ffeb3b;
        }

        /* 도감 공통 배경 상자 */
        .square-item {
            aspect-ratio: 1 / 1;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .square-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            margin-top: 10px;
        }
        .square-grid .square-item {
            width: 100%;
            justify-content: flex-start;
            /* 👑 콘텐츠를 조금 더 중앙으로 모으기 위해 20px로 변경 */
            padding-top: 20px;
        }
        .square-grid .square-item img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        .modal-space-hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
        }

        /* 인게임 스테이지 클리어 */
        #in-game-clear-ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        /* 게임 오버 화면 */
        #game-over-popup {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); 
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        #game-over-popup .btn-with-guide-container {
            position: absolute;
            bottom: 80px; 
            transform: none;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, get, onValue, query, orderByChild, limitToFirst } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDL0ytMkp9lhXKNETfo_phU2mYybWSMLrc",
            authDomain: "doguridance.firebaseapp.com",
            databaseURL: "https://doguridance-default-rtdb.firebaseio.com",
            projectId: "doguridance",
            storageBucket: "doguridance.firebasestorage.app",
            messagingSenderId: "692785013428",
            appId: "1:692785013428:web:8d686d5ab3e669ed3d2de1",
            measurementId: "G-1STG643F4L"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        window.dbRef = ref;
        window.dbPush = push;
        window.dbSet = set;
        window.dbGet = get;
        window.dbOnValue = onValue;
        window.dbQuery = query;
        window.dbOrderBy = orderByChild;
        window.dbLimit = limitToFirst;
        window.firebaseDb = database;
        window.isFirebaseReady = true;
    </script>
</head>
<body>

<div id="game-container">

    <div class="audio-controller-panel">
        <button class="audio-toggle-btn" id="btn-audio-mute" onclick="toggleAudioMute()">🔊</button>
        <input type="range" class="volume-slider" id="slider-volume" min="0" max="100" value="50" oninput="changeVolumeValue(this.value)">
    </div>
    
    <div id="screen-intro" class="screen active">
        <img id="main-logo" src="DD_Logo.png" alt="도구리 로고" onerror="this.style.display='none'; this.after('[DD_Logo]');">
        
        <div class="nickname-area-container">
            <img class="nick-title-img" src="DD_Nick_Text.png" alt="플레이어 닉네임 입력" onerror="this.style.display='none'; this.after('플레이어 닉네임 입력');">
            <div class="nick-input-wrapper">
                <img class="nick-bg-img" src="DD_Nick_Bg.png" alt="닉네임 배경">
                <input type="text" id="user-name-input" class="nick-input-field" placeholder="닉네임 입력" maxlength="8" value="도구리">
            </div>
        </div>

        <!-- 👑 START 버튼 15px 위로 이동 -->
        <div class="btn-with-guide-container" style="transform: translateY(-15px);">
            <button id="btn-main-start" class="img-btn origin-size-btn" onclick="goToGameStart()">
                <img src="DD_Main_Start_Button.png" alt="START" onerror="this.style.display='none'; this.after('[START 버튼]');">
            </button>
            <span class="space-shortcut-guide">(space)</span>
        </div>
    </div>

    <div id="screen-start" class="screen">
        <button id="btn-main-back" class="img-btn top-right-back" onclick="goToIntro()">
            <img src="DD_Main_Back_Button.png" alt="뒤로가기" onerror="this.style.display='none'; this.after('← 뒤로가기');">
        </button>

        <div id="practice-ui">
            <div class="practice-title">🎮 연습 모드 (화살표를 눌러보세요)</div>
            <div class="arrow-sequence-box" id="practice-sequence-area"></div>
        </div>

        <div id="special-stage-btn" onclick="startSpecialStage()">
            <img src="DD_Special_Stage.png" alt="스페셜 스테이지" onerror="this.style.display='none'; this.after('[스페셜 스테이지]');">
        </div>

        <div class="difficulty-group">
            <div id="slot-easy" class="diff-btn-slot selected" onclick="selectDifficulty('easy')">
                <div style="position:relative;">
                    <img class="diff-glow-layer" src="DD_Easy_Button_Glow.png" alt="쉬움 글로우" onerror="this.style.display='none';">
                    <div class="diff-img-btn">
                        <img src="DD_Easy_Button.png" alt="쉬움" onerror="this.style.display='none'; this.after('쉬움');">
                    </div>
                </div>
                <div class="space-shortcut-guide">(1)</div>
            </div>
            <div id="slot-normal" class="diff-btn-slot" onclick="selectDifficulty('normal')">
                <div style="position:relative;">
                    <img class="diff-glow-layer" src="DD_Normal_Button_Glow.png" alt="보통 글로우" onerror="this.style.display='none';">
                    <div class="diff-img-btn">
                        <img src="DD_Normal_Button.png" alt="보통" onerror="this.style.display='none'; this.after('보통');">
                    </div>
                </div>
                <div class="space-shortcut-guide">(2)</div>
            </div>
            <div id="slot-hard" class="diff-btn-slot" onclick="selectDifficulty('hard')">
                <div style="position:relative;">
                    <img class="diff-glow-layer" src="DD_Hard_Button_Glow.png" alt="어려움 글로우" onerror="this.style.display='none';">
                    <div class="diff-img-btn">
                        <img src="DD_Hard_Button.png" alt="어려움" onerror="this.style.display='none'; this.after('어려움');">
                    </div>
                </div>
                <div class="space-shortcut-guide">(3)</div>
            </div>
        </div>

        <div class="bottom-dance-position btn-with-guide-container">
            <button id="btn-main-dance" class="img-btn origin-size-btn" onclick="startGameLoop()">
                <img src="DD_Main_Dance_Button.png" alt="DANCE" onerror="this.style.display='none'; this.after('[DANCE 버튼]');">
            </button>
            <span class="space-shortcut-guide">(space)</span>
        </div>

        <div class="bottom-right-container">
            <button id="btn-main-rank" class="img-btn origin-size-btn" onclick="openLeaderboardModal()">
                <img src="DD_Highscore.png" alt="HIGHSCORE" onerror="this.style.display='none'; this.after('[HIGHSCORE]');">
            </button>

</div>

<script>
    // --- 글로벌 상태 제어 변수 ---
    let currentDifficulty = 'easy';
    let currentStage = 1;            
    let currentRound = 1;            
    let userLives = 5;              
    let globalNickname = "도구리";

    let targetArrowSequence = [];
    let currentArrowIndex = 0; 
    let isRoundFinished = false;
    let isStageClearedWait = false; 
    let isRewardGivenThisGame = false; 

    // 연습모드 변수
    let practiceSequence = [];
    let practiceIndex = 0;
    let isPracticeProcessing = false;

    let roundTimerId = null;
    let timeLimit = 5000;            
    let timeRemaining = 5000;

    let totalStartTime = 0;          
    let totalElapsedTime = 0;        
    let stopwatchIntervalId = null; 

    // --- 🎵 오디오 제어 변수군 ---
    let audioCtx = null;
    let globalVolumeValue = 0.5;   
    let isAudioMuted = false;       
    let masterGainNode = null;      

    let bgmMusicTimeoutId = null;
    let isBgmPlaying = false;
    let oceanWaveNode = null;       

    // 랜덤 배경 이미지 목록
    const bgImages = [
        'DD_Main_Image.png', 
        'DD_Main_Image_PM4.png', 
        'DD_Main_Image_PM5.png', 
        'DD_Main_Image_PM6.png'
    ];

    // 👑 이모티콘 제거된 도감 아이템
    const collectionItems = [
        "하와이안 파인애플", "알로하 레이", "선글라스",
        "미니 서프보드", "코코넛 주스", "우쿨렐레",
        "비치 샌들", "하와이안 셔츠", "도구리 튜브"
    ];
    let unlockedItems = new Set();
    const STORAGE_KEY_ITEMS = "doguri_unlocked_items_firebase_v1";

    const DOGURI_BASE = "doguri_image_base.png";

    const arrowKeyCodes = ['ArrowLeft', 'ArrowRight', 'ArrowDown', 'ArrowUp'];
    const arrowNames = { 'ArrowLeft': 'Left', 'ArrowRight': 'Right', 'ArrowDown': 'Down', 'ArrowUp': 'Up' };

    window.onload = function() {
        loadLocalStorageData();
        initCollectionUI();
        updateDoguriImage();
        setupButtonEffects();
        setupModalOutsideClick();
        
        document.body.addEventListener('click', () => { initAudioContext(); }, { once: true });
        document.body.addEventListener('keydown', () => { initAudioContext(); }, { once: true });
    };

    function setupModalOutsideClick() {
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.style.display = 'none';
                    if(this.id === 'reward-popup') closeRewardPopup();
                    if(this.id === 'game-over-popup') closeGameOver();
                }
            });
        });
    }

    function initAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGainNode = audioCtx.createGain();
            updateMasterVolume();
            masterGainNode.connect(audioCtx.destination);
        }
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        if (!isBgmPlaying) {
            startHawaiiBgmEngine();
        }
    }

    function updateMasterVolume() {
        if (!masterGainNode) return;
        let targetVol = isAudioMuted ? 0 : globalVolumeValue;
        masterGainNode.gain.setValueAtTime(targetVol, audioCtx.currentTime);
    }

    function changeVolumeValue(val) {
        globalVolumeValue = val / 100;
        initAudioContext();
        updateMasterVolume();
        if (globalVolumeValue > 0 && isAudioMuted) {
            toggleAudioMute(); 
        }
    }

    function toggleAudioMute() {
        initAudioContext();
        isAudioMuted = !isAudioMuted;
        let btn = document.getElementById('btn-audio-mute');
        if (isAudioMuted) {
            btn.innerText = '🔇';
            btn.style.opacity = '0.5';
        } else {
            btn.innerText = '🔊';
            btn.style.opacity = '1';
        }
        updateMasterVolume();
    }

    function playDrumKick() {
        if (!audioCtx || isAudioMuted) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        
        let kickVol = 0.5 * globalVolumeValue;
        gain.gain.setValueAtTime(kickVol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        
        osc.connect(gain);
        gain.connect(masterGainNode);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
    }

    function createOceanWaveSound() {
        try {
            let bufferSize = audioCtx.sampleRate * 5; 
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            let noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = buffer;
            noiseSource.loop = true;

            let lowpassFilter = audioCtx.createBiquadFilter();
            lowpassFilter.type = 'lowpass';
            lowpassFilter.frequency.setValueAtTime(350, audioCtx.currentTime); 

            let waveGain = audioCtx.createGain();
            waveGain.gain.setValueAtTime(0.08, audioCtx.currentTime); 

            noiseSource.connect(lowpassFilter);
            lowpassFilter.connect(waveGain);
            waveGain.connect(masterGainNode);

            noiseSource.start();
            oceanWaveNode = { source: noiseSource, gain: waveGain };

            function waveLoop() {
                if (!isBgmPlaying) return;
                let now = audioCtx.currentTime;
                let isGame = document.getElementById('screen-game').classList.contains('active');
                let maxVol = isGame ? 0.03 : 0.1;

                waveGain.gain.linearRampToValueAtTime(maxVol, now + 2.0); 
                waveGain.gain.linearRampToValueAtTime(0.01, now + 4.5); 
                setTimeout(waveLoop, 4500);
            }
            waveLoop();
        } catch (e) { console.error("파도 생성 실패:", e); }
    }

    function startHawaiiBgmEngine() {
        isBgmPlaying = true;
        createOceanWaveSound(); 

        const introChords = [
            [261.63, 329.63, 392.00, 523.25], 
            [220.00, 261.63, 329.63, 440.00], 
            [174.61, 218.27, 261.63, 349.23], 
            [196.00, 246.94, 293.66, 392.00]  
        ];
        const gameChords = [
            [261.63, 392.00, 523.25, 659.25], 
            [261.63, 392.00, 523.25, 659.25], 
            [349.23, 440.00, 523.25, 698.46], 
            [196.00, 293.66, 392.00, 587.33]  
        ];

        let chordIndex = 0;
        let noteIndex = 0;

        function playNextBgmNote() {
            if (!isBgmPlaying) return;

            let isGameActive = document.getElementById('screen-game').classList.contains('active');
            let tempoMs = 180;
            let type = 'triangle';
            let currentChordsList = introChords;

            if (isGameActive) {
                currentChordsList = gameChords;
                if (currentDifficulty === 'easy') { tempoMs = 140; type = 'square'; }
                else if (currentDifficulty === 'normal') { tempoMs = 110; type = 'triangle'; }
                else if (currentDifficulty === 'hard') { tempoMs = 85; type = 'sawtooth'; }
                else if (currentDifficulty === 'special') { tempoMs = 105; type = 'sine'; currentChordsList = introChords; }
            }

            let currentChord = currentChordsList[chordIndex % currentChordsList.length];
            let noteFreq = currentChord[noteIndex];

            if (isGameActive && (noteIndex === 0 || noteIndex === 2)) {
                playDrumKick();
            }

            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();

            osc.type = type; 
            osc.frequency.setValueAtTime(noteFreq, audioCtx.currentTime);

            let noteVolume = isGameActive ? (0.07 * globalVolumeValue) : (0.12 * globalVolumeValue); 
            gainNode.gain.setValueAtTime(noteVolume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (isGameActive ? 0.2 : 0.4)); 

            osc.connect(gainNode);
            gainNode.connect(masterGainNode);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);

            noteIndex++;
            if (noteIndex >= 4) {
                noteIndex = 0;
                if (Math.random() > 0.3) { 
                    chordIndex++;
                }
            }
            bgmMusicTimeoutId = setTimeout(playNextBgmNote, tempoMs);
        }
        playNextBgmNote();
    }

    function playBeep(frequency, duration, type = 'square', customEndFreq = null) {
        try {
            initAudioContext();
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();

            osc.type = type; 
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            if (customEndFreq !== null) {
                osc.frequency.exponentialRampToValueAtTime(customEndFreq, audioCtx.currentTime + duration);
            }

            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

            osc.connect(gainNode);
            gainNode.connect(masterGainNode); 

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch (e) { console.error("사운드 에러:", e); }
    }

    function playHitSound(comboIndex) {
        if (currentDifficulty === 'special') {
            let targetFreq = 500 + (comboIndex * 40);
            playBeep(targetFreq, 0.1, 'sine');
        } else {
            let targetFreq = 320 + (comboIndex * 60);
            playBeep(targetFreq, 0.08, 'triangle'); 
        }
    }

    function playFailSound() {
        playBeep(220, 0.35, 'square', 80); 
    }

    function playSelectTickSound() {
        playBeep(440, 0.05, 'triangle');
    }

    function playStageClearSound() {
        playBeep(523.25, 0.1, 'square'); 
        setTimeout(() => { playBeep(659.25, 0.25, 'square'); }, 80);
    }

    function loadLocalStorageData() {
        try {
            let savedItems = localStorage.getItem(STORAGE_KEY_ITEMS);
            if(savedItems) unlockedItems = new Set(JSON.parse(savedItems));
        } catch(e) { console.error("로컬 세이브 오류:", e); }
    }

    function saveGameDataToStorage() {
        try {
            localStorage.setItem(STORAGE_KEY_ITEMS, JSON.stringify(Array.from(unlockedItems)));
        } catch(e) { console.error("로컬 세이브 저장 실패:", e); }
    }

    window.fetchServerLeaderboard = function(diffLevel) {
        if (!window.isFirebaseReady) return;
        
        document.querySelectorAll('.rank-tab-btn').forEach(btn => btn.classList.remove('active'));
        let targetDiff = diffLevel === 'special' ? 'normal' : diffLevel;
        let tabEl = document.getElementById(`tab-${targetDiff}`);
        if(tabEl) tabEl.classList.add('active');

        const scoreRef = window.dbRef(window.firebaseDb, `scores/${targetDiff}`);
        const rankQuery = window.dbQuery(scoreRef, window.dbOrderBy('playTime'), window.dbLimit(10));

        window.dbOnValue(rankQuery, (snapshot) => {
            let rowsContainer = document.getElementById('modal-rank-rows');
            rowsContainer.innerHTML = '';

            if (!snapshot.exists()) {
                rowsContainer.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.7); padding-top:40px;">등록된 기록이 없습니다.</div>';
                return;
            }

            let rankIndex = 1;
            snapshot.forEach((childSnapshot) => {
                let data = childSnapshot.val();
                let row = document.createElement('div');
                row.className = 'leaderboard-row';
                if(data.name === globalNickname) row.classList.add('my-row');

                let timeSec = (data.playTime / 1000).toFixed(2);
                row.innerHTML = `<span>${rankIndex}. ${data.name}</span> <span>${timeSec}s</span>`;
                rowsContainer.appendChild(row);
                rankIndex++;
            });
        });
    }

    function checkAndUploadScore(nickname, elapsedMs) {
        if (!window.isFirebaseReady || currentDifficulty === 'special') return;
        let statusText = document.getElementById('popup-firebase-status');
        statusText.innerText = "순위 연산 판독 중...";
        statusText.style.color = "#ffeb3b";

        const scoreRef = window.dbRef(window.firebaseDb, `scores/${currentDifficulty}`);
        const rankQuery = window.dbQuery(scoreRef, window.dbOrderBy('playTime'), window.dbLimit(10));

        window.dbGet(rankQuery).then((snapshot) => {
            let records = [];
            snapshot.forEach((child) => { records.push(child.val().playTime); });

            if (records.length < 10 || elapsedMs < records[records.length - 1]) {
                statusText.innerText = "⭐ TOP 10 랭크인 진입! 기록 업로드 중...";
                const scoreListRef = window.dbRef(window.firebaseDb, `scores/${currentDifficulty}`);
                const newScoreRef = window.dbPush(scoreListRef);

                window.dbSet(newScoreRef, {
                    name: nickname,
                    playTime: elapsedMs,
                    timestamp: Date.now()
                }).then(() => {
                    statusText.innerText = "✓ 글로벌 실시간 10위권 등록 성공!";
                    statusText.style.color = "#4caf50";
                }).catch(() => {
                    statusText.innerText = "서버 연결 지연";
                    statusText.style.color = "#f44336";
                });
            } else {
                statusText.innerText = "아쉽게도 아케이드 10위권 순위 내에 진입하지 못했습니다.";
                statusText.style.color = "#444";
            }
        }).catch(() => {
            statusText.innerText = "오프라인 모드 플레이 완료";
        });
    }

    function setupButtonEffects() {
        const btns = document.querySelectorAll('.img-btn, .rank-tab-btn');
        btns.forEach(btn => {
            btn.addEventListener('mousedown', () => {
                initAudioContext(); 
                btn.classList.add('pressed');
            });
            btn.addEventListener('mouseup', () => btn.classList.remove('pressed'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('pressed'));
        });
    }

    function simulateBtnClick(btnId, callback) {
        let btn = document.getElementById(btnId);
        if (btn) {
            btn.classList.add('pressed');
            setTimeout(() => {
                btn.classList.remove('pressed');
                callback();
            }, 80);
        }
    }

    function simulateSlotKeyClick(slotId, callback) {
        let slot = document.getElementById(slotId);
        if (slot) {
            slot.style.transform = "scale(0.95)";
            setTimeout(() => {
                slot.style.transform = "none";
                callback();
            }, 80);
        }
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'screen-start') {
            initPracticeMode();
            checkSpecialStageChance();
        }
    }
    
    function checkSpecialStageChance() {
        let btn = document.getElementById('special-stage-btn');
        if (Math.random() < 0.15) {
            btn.style.display = 'block';
        } else {
            btn.style.display = 'none';
        }
    }

    function setCharacterImage(srcPath, fallbackText) {
        let charImg = document.getElementById('doguri-char');
        if (charImg) {
            charImg.src = srcPath;
            charImg.onerror = function() {
                this.style.display = 'none';
                this.after(`[${fallbackText}]`);
            };
        }
    }

    function changeRandomBackground() {
        let randBg = bgImages[Math.floor(Math.random() * bgImages.length)];
        document.getElementById('game-container').style.backgroundImage = `url('${randBg}')`;
    }

    function initPracticeMode() {
        isPracticeProcessing = false;
        practiceIndex = 0;
        let count = Math.floor(Math.random() * 3) + 3; 
        practiceSequence = [];
        
        let area = document.getElementById('practice-sequence-area');
        if(!area) return;
        area.innerHTML = '';
        
        for(let i=0; i<count; i++) {
            let key = arrowKeyCodes[Math.floor(Math.random() * 4)];
            practiceSequence.push(key);
            
            let slot = document.createElement('div');
            slot.className = 'arrow-icon-slot';
            slot.id = `prac-slot-${i}`;
            
            let img = document.createElement('img');
            img.src = `DD_${arrowNames[key]}_Button_Normal.png`;
            img.id = `prac-img-${i}`;
            img.alt = arrowNames[key];
            
            img.onerror = function() {
                this.style.display = 'none';
                let sym = {'ArrowLeft':'←','ArrowRight':'→','ArrowDown':'↓','ArrowUp':'↑'};
                this.parentElement.innerText = sym[key];
            };
            
            slot.appendChild(img);
            area.appendChild(slot);
        }
    }

    function handlePracticeInput(key) {
        if(isPracticeProcessing) return;
        
        let targetKey = practiceSequence[practiceIndex];
        let slotEl = document.getElementById(`prac-slot-${practiceIndex}`);
        let imgEl = document.getElementById(`prac-img-${practiceIndex}`);
        
        if(slotEl) {
            slotEl.classList.add('hit');
            setTimeout(() => slotEl.classList.remove('hit'), 80);
        }

        if(key === targetKey) {
            if(imgEl) imgEl.src = `DD_${arrowNames[key]}_Button_Success.png`;
            playHitSound(practiceIndex);
            practiceIndex++;
            
            if(practiceIndex >= practiceSequence.length) {
                isPracticeProcessing = true;
                setTimeout(initPracticeMode, 500); 
            }
        } else {
            if(imgEl) imgEl.src = `DD_${arrowNames[targetKey]}_Button_Fail.png`;
            playFailSound();
            isPracticeProcessing = true;
            setTimeout(initPracticeMode, 500); 
        }
    }

    function goToGameStart() { 
        initAudioContext(); 
        let inputVal = document.getElementById('user-name-input').value.trim();
        globalNickname = inputVal ? inputVal : "도구리";
        
        selectDifficulty('easy');
        showScreen('screen-start'); 
    }

    function goToIntro() { 
        stopRoundTimer();
        stopStopwatch();
        showScreen('screen-intro'); 
    }

    function selectDifficulty(diff) {
        currentDifficulty = diff;
        document.querySelectorAll('.diff-btn-slot').forEach(b => b.classList.remove('selected'));
        if (diff !== 'special') {
            document.getElementById(`slot-${diff}`).classList.add('selected');
        }
        playSelectTickSound();
    }
    
    function startSpecialStage() {
        initAudioContext();
        currentDifficulty = 'special';
        document.querySelectorAll('.diff-btn-slot').forEach(b => b.classList.remove('selected'));
        playSelectTickSound();
        startGameLoop();
    }

    function startGameLoop() {
        initAudioContext();
        showScreen('screen-game');
        
        changeRandomBackground(); 

        currentStage = 1;
        currentRound = 1;
        userLives = 5; 
        isRewardGivenThisGame = false; 
        
        totalElapsedTime = 0;
        startStopwatch();

        updateHeartsUI();
        initRound();
    }

    function startStopwatch() {
        if(stopwatchIntervalId) clearInterval(stopwatchIntervalId);
        totalStartTime = Date.now() - totalElapsedTime;
        stopwatchIntervalId = setInterval(() => {
            if(isStageClearedWait || isRoundFinished) return;
            totalElapsedTime = Date.now() - totalStartTime;
            document.getElementById('txt-playtime').innerText = `시간: ${(totalElapsedTime / 1000).toFixed(2)}초`;
        }, 30);
    }

    function stopStopwatch() {
        if(stopwatchIntervalId) {
            clearInterval(stopwatchIntervalId);
            stopwatchIntervalId = null;
        }
    }

    function updateHeartsUI() {
        let container = document.getElementById('hearts-display-images');
        container.innerHTML = '';
        
        for(let i=1; i<=5; i++) {
            let heartImg = document.createElement('img');
            heartImg.src = "DD_Heart.png";
            heartImg.className = "heart-img-slot";
            heartImg.alt = "라이프 하트";
            
            heartImg.onerror = function() {
                this.style.display = 'none';
                let txt = document.createElement('span');
                txt.innerText = '❤️';
                txt.style.fontSize = '24px';
                if(i > userLives) txt.style.opacity = '0.2';
                this.parentElement.appendChild(txt);
            };

            if (i > userLives) heartImg.classList.add('hidden-life');
            container.appendChild(heartImg);
        }
    }

    function initRound() {
        isRoundFinished = false;
        isStageClearedWait = false;
        currentArrowIndex = 0;
        stopRoundTimer();
        
        if (currentDifficulty === 'easy' || currentDifficulty === 'special') {
            timeLimit = 5000;
        } else if (currentDifficulty === 'normal') {
            timeLimit = 4000;
        } else if (currentDifficulty === 'hard') {
            timeLimit = 3000;
        }

        updateDoguriImage();
        
        let diffKo = currentDifficulty === 'special' ? '스페셜' : (currentDifficulty === 'easy' ? '쉬움' : (currentDifficulty === 'normal' ? '보통' : '어려움'));
        let maxStages = currentDifficulty === 'special' ? 1 : 3;
        let maxRounds = currentDifficulty === 'special' ? 10 : 5;
        
        document.getElementById('txt-difficulty').innerText = `난이도: ${diffKo}`;
        document.getElementById('txt-stage').innerText = `스테이지: ${currentStage}/${maxStages}`;
        document.getElementById('txt-round').innerText = `판수: ${currentRound}/${maxRounds}`;
        
        document.getElementById('judgment-text').innerText = '';
        
        let sequenceArea = document.getElementById('arrow-sequence-area');
        sequenceArea.innerHTML = '';
        
        targetArrowSequence = [];
        
        if (currentDifficulty === 'special') {
            let arrowCount = Math.floor(Math.random() * 3) + 5;
            for (let i = 0; i < arrowCount; i++) {
                targetArrowSequence.push('Space');
            }
        } else {
            let maxArrows = 5;
            let spaceCount = 0;
            
            if (currentDifficulty === 'easy') {
                maxArrows = 5;
                if (currentStage === 3) spaceCount = 1;
            } else if (currentDifficulty === 'normal') {
                maxArrows = 6;
                if (currentStage === 2) spaceCount = 1;
                if (currentStage === 3) spaceCount = 2;
            } else if (currentDifficulty === 'hard') {
                maxArrows = 7;
                if (currentStage === 1) spaceCount = 1;
                if (currentStage === 2) spaceCount = 2;
                if (currentStage === 3) spaceCount = 3;
            }
            
            let arrowCount = Math.min(2 + currentRound, maxArrows);
            spaceCount = Math.min(spaceCount, arrowCount); 
            
            for (let i = 0; i < arrowCount - spaceCount; i++) {
                targetArrowSequence.push(arrowKeyCodes[Math.floor(Math.random() * arrowKeyCodes.length)]);
            }
            for (let i = 0; i < spaceCount; i++) {
                targetArrowSequence.push('Space');
            }
            
            for (let i = targetArrowSequence.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [targetArrowSequence[i], targetArrowSequence[j]] = [targetArrowSequence[j], targetArrowSequence[i]];
            }
        }

        let blinkingIndices = [];
        if (currentDifficulty === 'hard') {
            let blinkCount = 0;
            if (currentStage === 2) blinkCount = 1;
            if (currentStage === 3) blinkCount = 2;

            let available = [];
            for (let i = 0; i < targetArrowSequence.length; i++) available.push(i);

            for (let i = 0; i < blinkCount; i++) {
                if (available.length === 0) break;
                let rnd = Math.floor(Math.random() * available.length);
                blinkingIndices.push(available[rnd]);
                available.splice(rnd, 1);
            }
        }

        for(let i=0; i<targetArrowSequence.length; i++) {
            let key = targetArrowSequence[i];
            let assetName = currentDifficulty === 'special' ? 'Star' : (key === 'Space' ? 'Space' : arrowNames[key]);
            let normalImg = currentDifficulty === 'special' ? 'DD_Star_Button.png' : `DD_${assetName}_Button_Normal.png`;

            let slot = document.createElement('div');
            slot.className = 'arrow-icon-slot';
            slot.id = `arrow-slot-${i}`;

            if (blinkingIndices.includes(i)) {
                slot.classList.add('blinking-arrow');
            }
            
            let img = document.createElement('img');
            img.src = normalImg;
            img.id = `arrow-img-${i}`;
            img.alt = assetName;
            
            img.onerror = function() {
                this.style.display = 'none';
                let sym = {'ArrowLeft':'←','ArrowRight':'→','ArrowDown':'↓','ArrowUp':'↑', 'Space':'[Space]'};
                this.parentElement.innerText = (currentDifficulty === 'special') ? '★' : (sym[key] || key);
            };

            slot.appendChild(img);
            sequenceArea.appendChild(slot);
        }
        
        document.getElementById('rhythm-ui').style.display = 'flex';
        startRoundTimer();
    }

    function startRoundTimer() {
        timeRemaining = timeLimit;
        document.getElementById('timer-bar').style.width = '100%';

        roundTimerId = setInterval(() => {
            if (isRoundFinished || isStageClearedWait) {
                stopRoundTimer();
                return;
            }
            timeRemaining -= 50;
            let percent = (timeRemaining / timeLimit) * 100;
            document.getElementById('timer-bar').style.width = percent + '%';

            if (timeRemaining <= 0) {
                stopRoundTimer();
                playFailSound(); 
                handleRoundFailure("TIME OVER!");
            }
        }, 50);
    }

    function stopRoundTimer() {
        if (roundTimerId) {
            clearInterval(roundTimerId);
            roundTimerId = null;
        }
    }

    function handleRoundFailure(reasonText) {
        if (currentDifficulty === 'special') {
            let jTxt = document.getElementById('judgment-text');
            jTxt.innerText = "KEEP GOING!";
            jTxt.style.color = "#ffeb3b";
            initRound();
            return;
        }

        userLives--;
        updateHeartsUI();
        setCharacterImage('DD_Dance_Fail.png', '도구리 실패 연출');

        if (userLives <= 0) {
            stopRoundTimer();
            stopStopwatch();
            setTimeout(() => {
                document.getElementById('game-over-popup').style.display = 'flex';
            }, 100);
            return;
        }

        let jTxt = document.getElementById('judgment-text');
        jTxt.innerText = reasonText;
        jTxt.style.color = "#f44336";

        initRound();
    }

    function closeGameOver() {
        document.getElementById('game-over-popup').style.display = 'none';
        goToGameStart(); 
    }

    window.addEventListener('keydown', function(e) {
        let introActive = document.getElementById('screen-intro').classList.contains('active');
        let startActive = document.getElementById('screen-start').classList.contains('active');
        let gameActive = document.getElementById('screen-game').classList.contains('active');
        
        let rewardPopupVisible = document.getElementById('reward-popup').style.display === 'flex';
        let gameOverPopupVisible = document.getElementById('game-over-popup').style.display === 'flex';
        let leaderboardModalVisible = document.getElementById('leaderboard-modal').style.display === 'flex';
        let collectionModalVisible = document.getElementById('collection-modal').style.display === 'flex';
        let inGameClearUIVisible = document.getElementById('in-game-clear-ui').style.display === 'flex';

        if(document.activeElement === document.getElementById('user-name-input')) return;
        
        initAudioContext(); 

        if (e.key === 'Escape' || e.key === 'Esc') {
            if(leaderboardModalVisible) { e.preventDefault(); document.getElementById('leaderboard-modal').style.display = 'none'; return; }
            if(collectionModalVisible) { e.preventDefault(); document.getElementById('collection-modal').style.display = 'none'; return; }
            if (startActive) { simulateBtnClick('btn-main-back', goToIntro); return; }
        }

        if (rewardPopupVisible || gameOverPopupVisible || leaderboardModalVisible || collectionModalVisible || inGameClearUIVisible) {
            if (e.key !== ' ' && e.key !== 'Spacebar') return; 
        }

        if (e.key === ' ' || e.key === 'Spacebar') {
            if (leaderboardModalVisible) { e.preventDefault(); document.getElementById('leaderboard-modal').style.display = 'none'; return; }
            if (collectionModalVisible) { e.preventDefault(); document.getElementById('collection-modal').style.display = 'none'; return; }
            if (introActive) { e.preventDefault(); simulateBtnClick('btn-main-start', goToGameStart); return; }
            if (startActive) { e.preventDefault(); simulateBtnClick('btn-main-dance', startGameLoop); return; }
            if (inGameClearUIVisible) { e.preventDefault(); simulateBtnClick('btn-next-stage', goToNextStage); return; }
            if (rewardPopupVisible) { e.preventDefault(); simulateBtnClick('btn-reward-ok', closeRewardPopup); return; }
            if (gameOverPopupVisible) { e.preventDefault(); simulateBtnClick('btn-game-over', closeGameOver); return; }
        }

        if (startActive) {
            if (e.key === '1') { simulateSlotKeyClick('slot-easy', () => selectDifficulty('easy')); return; }
            if (e.key === '2') { simulateSlotKeyClick('slot-normal', () => selectDifficulty('normal')); return; }
            if (e.key === '3') { simulateSlotKeyClick('slot-hard', () => selectDifficulty('hard')); return; }
            if (arrowKeyCodes.includes(e.key)) {
                handlePracticeInput(e.key);
                return;
            }
        }

        if (!gameActive || isRoundFinished || isStageClearedWait) return;

        let validRhythmKeys = ['ArrowLeft', 'ArrowRight', 'ArrowDown', 'ArrowUp', ' ', 'Spacebar'];
        
        if (validRhythmKeys.includes(e.key)) {
            e.preventDefault(); 
            let pressedKey = (e.key === ' ' || e.key === 'Spacebar') ? 'Space' : e.key;
            
            let slotEl = document.getElementById(`arrow-slot-${currentArrowIndex}`);
            let imgEl = document.getElementById(`arrow-img-${currentArrowIndex}`);

            if(slotEl) {
                slotEl.classList.remove('blinking-arrow');
                slotEl.classList.add('hit');
                setTimeout(() => slotEl.classList.remove('hit'), 80);
            }
            
            if (currentDifficulty === 'special') {
                if(imgEl) imgEl.src = `DD_Star_Success.png`;
                playHitSound(currentArrowIndex);
                currentArrowIndex++;

                let randomDanceNum = Math.floor(Math.random() * 6) + 1;
                setCharacterImage(`DD_Special_Dance_${randomDanceNum}.png`, `스페셜 댄스 ${randomDanceNum}`);

                if (currentArrowIndex >= targetArrowSequence.length) {
                    stopRoundTimer();
                    handleRoundSuccess();
                }
                return;
            }

            let targetKey = targetArrowSequence[currentArrowIndex];
            
            if (pressedKey === targetKey) {
                let assetName = targetKey === 'Space' ? 'Space' : arrowNames[targetKey];
                if(imgEl) imgEl.src = `DD_${assetName}_Button_Success.png`;
                
                playHitSound(currentArrowIndex);
                currentArrowIndex++;

                let randomDanceNum = Math.floor(Math.random() * 4) + 1;
                setCharacterImage(`DD_Dance_${randomDanceNum}.png`, `도구리 댄스 ${randomDanceNum}`);

                if (currentArrowIndex >= targetArrowSequence.length) {
                    stopRoundTimer();
                    handleRoundSuccess();
                }
            } else {
                let targetAssetName = targetKey === 'Space' ? 'Space' : arrowNames[targetKey];
                if(imgEl) imgEl.src = `DD_${targetAssetName}_Button_Fail.png`;
                stopRoundTimer();
                playFailSound(); 
                handleRoundFailure("FAIL!");
            }
        }
    });

    function handleRoundSuccess() {
        let maxRounds = currentDifficulty === 'special' ? 10 : 5;
        let maxStages = currentDifficulty === 'special' ? 1 : 3;
        
        if (currentRound >= maxRounds) {
            isStageClearedWait = true;
            document.getElementById('rhythm-ui').style.display = 'none';
            playStageClearSound(); 
            
            if (currentStage < maxStages) {
                stopStopwatch();
                document.getElementById('in-game-clear-ui').style.display = 'flex';
            } else {
                stopStopwatch();
                giveRandomRewardAndRank();
            }

        } else {
            currentRound++;
            initRound();
        }
    }

    window.goToNextStage = function() {
        document.getElementById('in-game-clear-ui').style.display = 'none';
        currentStage++;
        currentRound = 1;
        changeRandomBackground(); 
        startStopwatch();
        initRound();
    }

    function giveRandomRewardAndRank() {
        if (isRewardGivenThisGame) return;
        isRewardGivenThisGame = true; 

        let finalTimeSec = totalElapsedTime / 1000;
        document.getElementById('popup-playtime-result').innerText = `최종 클리어 시간: ${finalTimeSec.toFixed(2)}초`;

        if (currentDifficulty !== 'special') {
            checkAndUploadScore(globalNickname, totalElapsedTime);
        } else {
            let statusText = document.getElementById('popup-firebase-status');
            statusText.innerText = "⭐ 스페셜 피버 타임 종료! ⭐";
            statusText.style.color = "#ffeb3b";
        }

        let randomIndex = Math.floor(Math.random() * collectionItems.length);
        unlockedItems.add(randomIndex);
        
        saveGameDataToStorage();
        initCollectionUI();
        updateDoguriImage();

        let rewardBox = document.getElementById('reward-item-name');
        rewardBox.innerHTML = '';
        let rewardImg = document.createElement('img');
        rewardImg.src = `DD_Item_${randomIndex}.png`;
        rewardImg.style.width = '80%';
        rewardImg.style.height = '80%';
        rewardImg.style.objectFit = 'contain';
        rewardImg.alt = collectionItems[randomIndex];
        rewardBox.appendChild(rewardImg);
        
        document.getElementById('reward-popup').style.display = 'flex';
    }

    function closeRewardPopup() {
        document.getElementById('reward-popup').style.display = 'none';
        goToGameStart();
    }

    function resetAllLocalData() {
        if (confirm("도감 데이터가 전면 초기화됩니다. 진행하시겠습니까?")) {
            unlockedItems.clear();
            isRewardGivenThisGame = false;
            saveGameDataToStorage();
            initCollectionUI();
            updateDoguriImage();
            alert('도감이 완전히 초기화되었습니다.');
        }
    }

    function initCollectionUI() {
        let grid = document.getElementById('book-grid-container');
        if (!grid) return;
        grid.innerHTML = '';
        
        for (let i = 0; i < 9; i++) {
            let box = document.createElement('div');
            box.className = 'square-item';
            
            let img = document.createElement('img');
            if (unlockedItems.has(i)) {
                img.src = `DD_Item_${i}.png`; 
                img.alt = collectionItems[i];
            } else {
                img.src = 'DD_Item_Locked.png'; 
                img.alt = '미획득 아이템';
                img.style.transform = 'scale(5)';
            }

            let nameTxt = document.createElement('div');
            nameTxt.style.fontSize = '14px';
            nameTxt.style.color = '#fff';
            nameTxt.style.marginTop = '8px';
            nameTxt.style.textAlign = 'center';
            nameTxt.style.textShadow = '0 1px 2px #000';
            nameTxt.innerText = unlockedItems.has(i) ? collectionItems[i] : '???';

            img.onerror = function() {
                this.style.display = 'none';
                let fallback = document.createElement('span');
                fallback.style.fontSize = unlockedItems.has(i) ? '14px' : '60px'; 
                fallback.style.fontWeight = 'bold';
                fallback.style.textAlign = 'center';
                fallback.innerText = unlockedItems.has(i) ? collectionItems[i] : '🔒';
                this.parentElement.insertBefore(fallback, nameTxt);
            }
            
            box.appendChild(img);
            box.appendChild(nameTxt);
            grid.appendChild(box);
        }
    }

    function updateDoguriImage() {
        if (currentDifficulty === 'special') {
            setCharacterImage('DD_Special_Dance_1.png', '스페셜 베이스 캐릭터');
        } else {
            setCharacterImage(DOGURI_BASE, '도구리 기본 상태');
        }
        
        let charImg = document.getElementById('doguri-char');
        if (charImg) {
            if (unlockedItems.size === 9) {
                charImg.style.transform = "translateX(-50%) scale(1.8)";
            } else {
                charImg.style.transform = "translateX(-50%) scale(1)";
            }
        }
    }

    function openLeaderboardModal() {
        fetchServerLeaderboard(currentDifficulty); 
        document.getElementById('leaderboard-modal').style.display = 'flex';
    }
    
    function openCollection() {
        initCollectionUI();
        document.getElementById('collection-modal').style.display = 'flex';
    }
</script>
