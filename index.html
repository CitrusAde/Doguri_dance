<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도구리 댄스 - 하와이 에디션</title>
    <style>
        /* CSS 스타일 최소화 및 테두리/그림자 완전 삭제 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        /* 1024x584 고정 화면 구성 */
        #game-container {
            width: 1024px;
            height: 584px;
            position: relative;
            overflow: hidden;
        }

        /* 레이어 구조 정의 (Z-Index) */
        .layer-bg { z-index: 1; position: absolute; width: 100%; height: 100%; }
        .layer-obj { z-index: 2; position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .layer-ui { z-index: 3; position: absolute; width: 100%; height: 100%; }

        /* 배경 이미지 레이어 */
        #bg-image { width: 100%; height: 100%; object-fit: cover; }

        /* 오브젝트 배치 */
        #game-table-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -20%);
            width: 400px; /* 이미지 규격에 맞게 조정 가능 */
            height: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #game-table { width: 100%; height: auto; display: block; }
        
        /* 단상 위에 배치되는 도구리 캐릭터 */
        #doguri {
            position: absolute;
            bottom: 40px; /* 단상(Table) 위에 자연스럽게 안착하도록 피팅 */
            width: 120px; /* 도구리 리소스 크기에 맞게 조절 */
            height: auto;
        }

        /* 화면 제어 */
        .screen { display: none; width: 100%; height: 100%; position: absolute; }
        .screen.active { display: block; }

        /* 공통 버튼 (기본 테두리/그림자 완전 삭제, 이미지 원본 사용) */
        .btn {
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            outline: none;
        }
        .btn img { display: block; max-width: 100%; height: auto; }

        /* ① 시작 화면 UI */
        #start-screen .start-btn-area {
            position: absolute;
            left: 50%;
            bottom: 80px;
            transform: translateX(-50%);
            width: 200px; /* 버튼 이미지 적정 크기 */
        }

        /* ② 난이도 선택 화면 UI */
        #difficulty-screen .title { 
            text-align: center; 
            margin-top: 40px; 
            font-size: 28px; 
            font-weight: bold; 
            color: #333; 
        }
        #difficulty-screen .card-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 80px;
        }
        .diff-card {
            width: 180px;
            height: 120px;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
        }
        /* 방향키 선택 시 시각 피드백 (기획서에 맞춰 깔끔한 라인만 추가) */
        .diff-card.selected {
            outline: 5px solid #ff4d4d;
        }
        
        .back-btn-area { position: absolute; right: 20px; top: 20px; width: 60px; }
        .gift-btn-area { position: absolute; right: 20px; bottom: 20px; width: 80px; }
        .dance-btn-area { position: absolute; left: 50%; bottom: 40px; transform: translateX(-50%); width: 180px; }

        /* ③ 플레이 화면 UI (정렬 다운 구조) */
        .hud-top { position: absolute; top: 20px; left: 40px; font-size: 20px; font-weight: bold; color: #333; }
        .timer-top { position: absolute; top: 20px; right: 40px; font-size: 20px; font-weight: bold; color: #333; }
        .life-area { position: absolute; left: 40px; bottom: 40px; font-size: 28px; display: flex; gap: 5px; }
        
        /* 기획: 상단 연출 공간 확보를 위해 대폭 하향 배치 */
        .input-chain-area {
            position: absolute;
            left: 50%;
            bottom: 110px;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 12px 40px;
            font-size: 26px;
            letter-spacing: 8px;
            border-radius: 30px;
        }
        .gauge-area {
            position: absolute;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            width: 450px;
            height: 24px;
            background: #e0e0e0;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        .gauge-bar {
            position: absolute;
            left: 38%; /* 중앙 부근 24% 영역 타겟 (100% - 24% = 76%의 절반인 38% 지점부터) */
            width: 24%; /* 기획: 판정 크기 24% 동결 */
            height: 100%;
            background: #4caf50;
        }
        .gauge-pin {
            position: absolute;
            left: 0%;
            width: 6px;
            height: 100%;
            background: #ff2a2a;
        }

        /* ④ 결과 및 클리어 팝업 (배경 상시 유지) */
        .popup-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .popup-content {
            background: #fff;
            padding: 40px;
            text-align: center;
            min-width: 360px;
            border-radius: 16px;
        }
        .next-btn-area { 
            margin-top: 25px; 
            display: flex;
            justify-content: center;
        }
        .next-btn-area .btn { width: 160px; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 최하단 레이어: 고정 배경 (기획: DD_Main_Image.png) -->
    <div class="layer-bg">
        <img id="bg-image" src="DD_Main_Image.png" alt="Background">
    </div>

    <!-- 중간 레이어: 단상 및 도구리 캐릭터 오브젝트 (기획: DD_Game_Table.png) -->
    <div class="layer-obj">
        <div id="game-table-container">
            <!-- 임시 텍스트를 빼고 도구리 캐릭터 이미지를 배치할 수 있도록 img 태그로 가공했습니다 -->
            <img id="doguri-char" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='120'><rect width='100' height='120' fill='%23ff9999'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-weight='bold'>도구리</text></svg>" id="doguri-sprite" alt="도구리">
            <img id="game-table" src="DD_Game_Table.png" alt="단상">
        </div>
    </div>

    <!-- 최상단 레이어: 각 화면별 UI 및 인터랙션 -->
    <div class="layer-ui">
        
        <!-- ① 시작 화면 -->
        <div id="start-screen" class="screen active">
            <div class="start-btn-area">
                <button class="btn" onclick="goToDifficulty()">
                    <img src="DD_Main_Start_Button.png" alt="시작하기">
                </button>
            </div>
        </div>

        <!-- ② 난이도 선택 화면 -->
        <div id="difficulty-screen" class="screen">
            <div class="title">난이도 선택</div>
            
            <div class="back-btn-area">
                <button class="btn" onclick="goToStart()">
                    <img src="DD_Main_Back_Button.png" alt="뒤로가기">
                </button>
            </div>
            
            <div class="card-container">
                <div class="diff-card selected" data-diff="easy">쉬움 (1)</div>
                <div class="diff-card" data-diff="normal">보통 (2)</div>
                <div class="diff-card" data-diff="hard">어려움 (3)</div>
            </div>
            
            <div class="dance-btn-area">
                <button class="btn" onclick="startGame()">
                    <img src="DD_Main_Dance_Button.png" alt="게임 시작">
                </button>
            </div>
            
            <div class="gift-btn-area">
                <button class="btn" onclick="alert('도감 완료 시 오픈 가능')">
                    <img src="DD_Main_Gift_Button.png" alt="도감">
                </button>
            </div>
        </div>

        <!-- ③ 플레이 화면 -->
        <div id="play-screen" class="screen">
            <div class="hud-top"><span id="hud-diff">EASY</span> - STAGE <span id="hud-stage">1</span> (<span id="hud-round">1</span>/3)</div>
            <div class="timer-top">TIME: <span id="hud-timer">30</span></div>
            
            <!-- 라이프 하트 표기 영역 -->
            <div id="life-container" class="life-area">❤️ ❤️ ❤️</div>
            
            <!-- 기획 반영: 대폭 하향 배치된 입력 영역 및 게이지 -->
            <div class="input-chain-area">← → ↑ ↓</div>
            
            <div class="gauge-area">
                <div class="gauge-bar"></div>
                <div id="gauge-pin" class="gauge-pin"></div>
            </div>
        </div>

        <!-- ④ 결과 및 라운드 클리어 팝업 (배경 상시 유지) -->
        <div id="result-popup" class="screen">
            <div class="popup-overlay">
                <div class="popup-content">
                    <h2 id="result-title">STAGE CLEAR!</h2>
                    <p id="result-desc">다음 라운드로 진행합니다.</p>
                    <div class="next-btn-area">
                        <button id="next-btn" class="btn" onclick="nextStage()">
                            <img src="DD_Main_Next_Button.png" alt="다음">
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // 시스템 제어 변수
    let currentScreen = 'start-screen';
    let currentDiffIdx = 0; 
    const diffs = ['EASY', 'NORMAL', 'HARD'];
    
    let currentStage = 1;
    let currentRound = 1; 
    const REQ_SUB_ROUNDS = 3;
    
    // 기획: 개발용 밸런스 데이터 동결 (속도 0.7, 판정 24%)
    const GAUGE_SPEED = 0.7; 
    let pinPosition = 0;
    let pinDirection = 1;
    let mainLoopId = null;

    // 키보드 핸들러 동기화
    window.addEventListener('keydown', (e) => {
        if (currentScreen === 'start-screen') {
            if (e.code === 'Space') { goToDifficulty(); }
        } 
        else if (currentScreen === 'difficulty-screen') {
            if (e.key === '1') { selectDifficulty(0); }
            else if (e.key === '2') { selectDifficulty(1); }
            else if (e.key === '3') { selectDifficulty(2); }
            else if (e.code === 'ArrowLeft') { selectDifficulty((currentDiffIdx + 2) % 3); }
            else if (e.code === 'ArrowRight') { selectDifficulty((currentDiffIdx + 1) % 3); }
            else if (e.code === 'Space') { startGame(); }
        }
        else if (currentScreen === 'play-screen') {
            if (e.code === 'Space') { handleSpaceInput(); }
        }
        else if (currentScreen === 'result-popup') {
            if (e.code === 'Space') { nextStage(); }
        }
    });

    function changeScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        currentScreen = screenId;
    }

    function goToDifficulty() { changeScreen('difficulty-screen'); updateCardVisual(); }
    function goToStart() { changeScreen('start-screen'); }
    function selectDifficulty(idx) { currentDiffIdx = idx; updateCardVisual(); }

    function updateCardVisual() {
        const cards = document.querySelectorAll('.diff-card');
        cards.forEach((c, i) => {
            if(i === currentDiffIdx) c.classList.add('selected');
            else c.classList.remove('selected');
        });
    }

    function startGame() {
        currentStage = 1;
        currentRound = 1;
        initRound();
    }

    function initRound() {
        changeScreen('play-screen');
        document.getElementById('hud-diff').innerText = diffs[currentDiffIdx];
        document.getElementById('hud-stage').innerText = currentStage;
        document.getElementById('hud-round').innerText = currentRound;
        
        // 기획 반영: 프레임 중첩 파괴 (cancelAnimationFrame)
        if (mainLoopId) {
            cancelAnimationFrame(mainLoopId);
            mainLoopId = null;
        }
        
        pinPosition = 0;
        pinDirection = 1;
        updateGauge();
    }

    function updateGauge() {
        pinPosition += GAUGE_SPEED * pinDirection * 4; 
        if (pinPosition >= 100) { pinPosition = 100; pinDirection = -1; }
        if (pinPosition <= 0) { pinPosition = 0; pinDirection = 1; }
        
        document.getElementById('gauge-pin').style.left = pinPosition + '%';
        mainLoopId = requestAnimationFrame(updateGauge);
    }

    function handleSpaceInput() {
        // 판정 범위 24% 고정 (38% ~ 62%)
        if (pinPosition >= 38 && pinPosition <= 62) {
            triggerDoguriDance();
        } else {
            alert("판정 실패!");
        }
    }

    // 기획: 커맨드 성공 시 정확히 9번만 춤추도록 로직 설계
    function triggerDoguriDance() {
        const doguriChar = document.getElementById('doguri-char');
        let danceCount = 0;
        cancelAnimationFrame(mainLoopId); // 게이지 정지
        
        const danceInterval = setInterval(() => {
            danceCount++;
            
            // [TIP] 실제 스프라이트 시트 나 이미지가 준비되면 파일명을 바꾸어 매핑할 수 있습니다.
            // 예: doguriChar.src = `doguri_dance_${danceCount}.png`;
            
            if (danceCount >= 9) {
                clearInterval(danceInterval);
                processRoundEnd();
            }
        }, 120); 
    }

    function processRoundEnd() {
        if (currentRound < REQ_SUB_ROUNDS) {
            currentRound++;
            initRound();
        } else {
            showResultPopup();
        }
    }

    function showResultPopup() {
        changeScreen('result-popup');
        const title = document.getElementById('result-title');
        const desc = document.getElementById('result-desc');
        const nextBtnImg = document.querySelector('#next-btn img');
        
        if (currentStage === 5) {
            title.innerText = "★최종 완포 스페셜 클리어!★";
            desc.innerText = "모든 스테이지를 정복하셨습니다! 하와이 에디션 도감 가차가 오픈됩니다.";
            // 완포 시 버튼 이미지 혹은 UI 변경 트리거 영역
        } else {
            title.innerText = `STAGE ${currentStage} CLEAR`;
            desc.innerText = "스페이스바 혹은 Next 버튼을 눌러 다음 단계로 진행하세요.";
        }
    }

    function nextStage() {
        if (currentStage === 5) {
            alert("🎉 도감 보상 가차 결과창 오픈! 한정판 도구리를 획득했습니다!");
            goToStart();
        } else {
            currentStage++;
            currentRound = 1;
            initRound();
        }
    }
</script>

</body>
</html>
