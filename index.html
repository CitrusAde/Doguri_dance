<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도구리 댄스 - 하와이 에디션</title>
    <style>
        /* CSS 스타일 최소화 및 테두리/그림자 완전 삭제 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        /* 1024x584 고정 화면 구성 */
        #game-container {
            width: 1024px;
            height: 584px;
            position: relative;
            overflow: hidden;
            background-color: #ffe066; /* DD_Main_Image.png 대체용 기본색 */
            /* background-image: url('DD_Main_Image.png'); */
            background-size: cover;
        }

        /* 레이어 구조 정의 (Z-Index) */
        .layer-bg { z-index: 1; position: absolute; width: 100%; height: 100%; }
        .layer-obj { z-index: 2; position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .layer-ui { z-index: 3; position: absolute; width: 100%; height: 100%; }

        /* 오브젝트 배치 */
        #game-table {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -20%);
            width: 300px;
            height: 120px;
            background: #8b5a2b; /* DD_Game_Table.png 대체용 */
            text-align: center;
            line-height: 120px;
            color: #fff;
        }
        #doguri {
            position: absolute;
            left: 50%;
            bottom: 80px;
            transform: translateX(-50%);
            width: 100px;
            height: 120px;
            background: #ff9999; /* 도구리 캐릭터 대체용 */
            text-align: center;
            line-height: 120px;
            font-weight: bold;
        }

        /* 화면 제어 */
        .screen { display: none; width: 100%; height: 100%; position: absolute; }
        .screen.active { display: block; }

        /* 공통 버튼 (기본 테두리/그림자 제거) */
        .btn {
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
        }
        .btn img { display: block; width: 100%; height: 100%; }
        
        /* 임시 텍스트 버튼 스타일 (리소스 없을 때 확인용) */
        .btn-temp { background: #333; color: #fff; padding: 10px 20px; font-weight: bold; }

        /* 1. 시작 화면 UI */
        #start-screen .start-btn-area {
            position: absolute;
            left: 50%;
            bottom: 80px;
            transform: translateX(-50%);
        }

        /* 2. 난이도 선택 화면 UI */
        #difficulty-screen .title { text-align: center; margin-top: 40px; font-size: 24px; font-weight: bold; }
        #difficulty-screen .card-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 100px;
        }
        .diff-card {
            width: 180px;
            height: 120px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }
        .diff-card.selected {
            outline: 5px solid #ff4d4d; /* 선택된 카드 표시 */
        }
        .back-btn-area { position: absolute; right: 20px; top: 20px; }
        .gift-btn-area { position: absolute; right: 20px; bottom: 20px; }
        .dance-btn-area { position: absolute; left: 50%; bottom: 40px; transform: translateX(-50%); }

        /* 3. 플레이 화면 UI (하단 정렬 구조) */
        .hud-top { position: absolute; top: 20px; left: 40px; font-size: 20px; font-weight: bold; }
        .timer-top { position: absolute; top: 20px; right: 40px; font-size: 20px; font-weight: bold; }
        .life-area { position: absolute; left: 40px; bottom: 40px; font-size: 24px; }
        
        /* 기획: 상단 연출 공간 확보를 위해 대폭 하향 배치 */
        .input-chain-area {
            position: absolute;
            left: 50%;
            bottom: 110px;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 10px 30px;
            font-size: 24px;
            letter-spacing: 5px;
        }
        .gauge-area {
            position: absolute;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            width: 400px;
            height: 30px;
            background: #ccc;
        }
        .gauge-bar {
            position: absolute;
            left: 38%; /* 중앙 부근 24% 영역 타겟 (100% - 24% = 76%의 절반) */
            width: 24%; /* 기획: 판정 크기 24% 동결 */
            height: 100%;
            background: #4caf50;
        }
        .gauge-pin {
            position: absolute;
            left: 0%;
            width: 8px;
            height: 100%;
            background: #ff0000;
        }

        /* 4. 결과 및 클리어 팝업 */
        .popup-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .popup-content {
            background: #fff;
            padding: 40px;
            text-align: center;
            min-width: 300px;
        }
        .next-btn-area { margin-top: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 최하단 레이어: 고정 배경 -->
    <div class="layer-bg"></div>

    <!-- 중간 레이어: 단상 및 도구리 캐릭터 오브젝트 -->
    <div class="layer-obj">
        <div id="game-table">단상 (DD_Game_Table.png)
            <div id="doguri">도구리</div>
        </div>
    </div>

    <!-- 최상단 레이어: 각 화면별 UI 및 인터랙션 -->
    <div class="layer-ui">
        
        <!-- ① 시작 화면 -->
        <div id="start-screen" class="screen active">
            <div class="start-btn-area">
                <button class="btn btn-temp" onclick="goToDifficulty()">시작 버튼 (DD_Main_Start_Button.png)</button>
            </div>
        </div>

        <!-- ② 난이도 선택 화면 -->
        <div id="difficulty-screen" class="screen">
            <div class="title">난이도 선택</div>
            <div class="back-btn-area">
                <button class="btn btn-temp" onclick="goToStart()">뒤로가기 (DD_Main_Back_Button.png)</button>
            </div>
            <div class="card-container">
                <div class="diff-card selected" data-diff="easy">쉬움 (1)</div>
                <div class="diff-card" data-diff="normal">보통 (2)</div>
                <div class="diff-card" data-diff="hard">어려움 (3)</div>
            </div>
            <div class="dance-btn-area">
                <button class="btn btn-temp" onclick="startGame()">게임 시작 (DD_Main_Dance_Button.png)</button>
            </div>
            <div class="gift-btn-area">
                <button class="btn btn-temp" onclick="alert('도감 완료 시 오픈 가능')">도감 (DD_Main_Gift_Button.png)</button>
            </div>
        </div>

        <!-- ③ 플레이 화면 -->
        <div id="play-screen" class="screen">
            <div class="hud-top"><span id="hud-diff">EASY</span> - STAGE <span id="hud-stage">1</span> (<span id="hud-round">1</span>/3)</div>
            <div class="timer-top">TIME: <span id="hud-timer">30</span></div>
            
            <div class="life-area">❤️ ❤️ ❤️</div>
            
            <!-- 기획 반영: 대폭 하향 배치된 입력 공간 -->
            <div class="input-chain-area">← → ↑ ↓</div>
            
            <div class="gauge-area">
                <div class="gauge-bar"></div>
                <div id="gauge-pin" class="gauge-pin"></div>
            </div>
        </div>

        <!-- ④ 결과 및 라운드 클리어 팝업 (배경 유지 상태로 노출) -->
        <div id="result-popup" class="screen">
            <div class="popup-overlay">
                <div class="popup-content">
                    <h2 id="result-title">STAGE CLEAR!</h2>
                    <p id="result-desc">다음 라운드로 진행합니다.</p>
                    <div class="next-btn-area">
                        <button id="next-btn" class="btn btn-temp" onclick="nextStage()">다음 (DD_Main_Next_Button.png)</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // 게임 상태 관리 시스템 변수
    let currentScreen = 'start-screen';
    let currentDiffIdx = 0; // 0: 쉬움, 1: 보통, 2: 어려움
    const diffs = ['EASY', 'NORMAL', 'HARD'];
    
    let currentStage = 1;
    let currentRound = 1; // REQ_SUB_ROUNDS 최대 3
    const REQ_SUB_ROUNDS = 3;
    
    // 기획: 개발용 밸런스 데이터 동결
    const GAUGE_SPEED = 0.7; // 핀 이동 속도
    let pinPosition = 0;
    let pinDirection = 1;
    
    // 애니메이션 루프 ID 관리 (버그 방지 핵심)
    let mainLoopId = null;

    // 키보드 매핑 인터랙션
    window.addEventListener('keydown', (e) => {
        if (currentScreen === 'start-screen') {
            if (e.code === 'Space') { goToDifficulty(); }
        } 
        else if (currentScreen === 'difficulty-screen') {
            if (e.key === '1') { selectDifficulty(0); }
            else if (e.key === '2') { selectDifficulty(1); }
            else if (e.key === '3') { selectDifficulty(2); }
            else if (e.code === 'ArrowLeft') { selectDifficulty((currentDiffIdx + 2) % 3); }
            else if (e.code === 'ArrowRight') { selectDifficulty((currentDiffIdx + 1) % 3); }
            else if (e.code === 'Space') { startGame(); }
        }
        else if (currentScreen === 'play-screen') {
            if (e.code === 'Space') {
                handleSpaceInput();
            }
        }
        else if (currentScreen === 'result-popup') {
            if (e.code === 'Space') {
                nextStage(); // 스페이스바와 마우스 클릭 이벤트 동기화
            }
        }
    });

    // 화면 전환 함수
    function changeScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        currentScreen = screenId;
    }

    function goToDifficulty() { changeScreen('difficulty-screen'); updateCardVisual(); }
    function goToStart() { changeScreen('start-screen'); }

    function selectDifficulty(idx) {
        currentDiffIdx = idx;
        updateCardVisual();
    }

    function updateCardVisual() {
        const cards = document.querySelectorAll('.diff-card');
        cards.forEach((c, i) => {
            if(i === currentDiffIdx) c.classList.add('selected');
            else c.classList.remove('selected');
        });
    }

    // ③ 게임 플레이 기동
    function startGame() {
        currentStage = 1;
        currentRound = 1;
        initRound();
    }

    function initRound() {
        changeScreen('play-screen');
        document.getElementById('hud-diff').innerText = diffs[currentDiffIdx];
        document.getElementById('hud-stage').innerText = currentStage;
        document.getElementById('hud-round').innerText = currentRound;
        
        // 기획 반영: 프레임 중첩 버그 방지를 위해 기존 루프 완전 파괴 후 재시작
        if (mainLoopId) {
            cancelAnimationFrame(mainLoopId);
            mainLoopId = null;
        }
        
        pinPosition = 0;
        pinDirection = 1;
        
        // 애니메이션 루프 구동
        updateGauge();
    }

    // 게이지 핀 이동 로직 (requestAnimationFrame 방식)
    function updateGauge() {
        pinPosition += GAUGE_SPEED * pinDirection * 4; // 속도 보정값
        if (pinPosition >= 100) { pinPosition = 100; pinDirection = -1; }
        if (pinPosition <= 0) { pinPosition = 0; pinDirection = 1; }
        
        document.getElementById('gauge-pin').style.left = pinPosition + '%';
        
        mainLoopId = requestAnimationFrame(updateGauge);
    }

    // 스페이스 판정 인터랙션
    function handleSpaceInput() {
        // 기획: 판정 범위 24% 고정 (중앙 38% ~ 62% 영역)
        if (pinPosition >= 38 && pinPosition <= 62) {
            triggerDoguriDance();
        } else {
            alert("판정 실패!");
            // 실패 루틴 처리 가능
        }
    }

    // 기획 반영: 성공 후 딱 9번(9장)까지만 춤추게 고정
    function triggerDoguriDance() {
        const doguri = document.getElementById('doguri');
        let danceCount = 0;
        
        // 게이지 잠시 정지
        cancelAnimationFrame(mainLoopId);
        
        const danceInterval = setInterval(() => {
            danceCount++;
            doguri.innerText = `💃 댄스 ${danceCount}`; // 실제 연출 프레임 9장 교체 지점
            
            if (danceCount >= 9) {
                clearInterval(danceInterval);
                doguri.innerText = "도구리";
                processRoundEnd();
            }
        }, 150); // 프레임 속도 연출
    }

    function processRoundEnd() {
        if (currentRound < REQ_SUB_ROUNDS) {
            currentRound++;
            initRound();
        } else {
            // 3판 다 채웠을 때 스테이지 클리어 팝업 노출 (배경 상시 유지)
            showResultPopup();
        }
    }

    function showResultPopup() {
        changeScreen('result-popup');
        const title = document.getElementById('result-title');
        const desc = document.getElementById('result-desc');
        
        if (currentStage === 5) {
            // 기획 반영: 스테이지 5 최종 완포 시에만 도감 보상 가차 결과창 연출
            title.innerText = "★최종 완포 스페셜 클리어!★";
            desc.innerText = "모든 스테이지를 정복하셨습니다! 하와이 에디션 한정 도감 보상 가차가 오픈됩니다!";
            document.getElementById('next-btn').innerText = "보상 가차 오픈 (DD_Main_Gift_Button)";
        } else {
            title.innerText = `STAGE ${currentStage} CLEAR`;
            desc.innerText = "다음 스테이지로 이동하려면 스페이스바나 다음 버튼을 누르세요.";
            document.getElementById('next-btn').innerText = "다음 단계 (DD_Main_Next_Button.png)";
        }
    }

    function nextStage() {
        if (currentStage === 5) {
            alert("🎉 도감 가차 결과: 하와이안 도구리 획득!");
            goToStart();
        } else {
            currentStage++;
            currentRound = 1;
            initRound();
        }
    }
</script>

</body>
</html>
