<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도구리 하와이 댄스 게임 - V28 (엔진 안정화 및 게임오버 팝업화)</title>
    <style>
        @font-face {
            font-family: 'NPSfont_bold';
            src: url('NPSfont_bold.woff2') format('woff2'),
                 url('NPSfont_bold.woff') format('woff'),
                 url('NPSfont_bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        * { box-sizing: border-box; user-select: none; font-family: 'NPSfont_bold', 'LINESeedKR-Bd', 'Malgun Gothic', sans-serif; }
        body { margin: 0; padding: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        #game-container { width: 1280px; height: 720px; position: relative; background-image: url('DD_Main_Image.png'); background-size: cover; background-position: center; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        .screen { position: absolute; width: 100%; height: 100%; top: 0; left: 0; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .screen.active { display: flex; }

        .audio-controller-panel { position: absolute; top: 30px; left: 40px; background: url('DD_Nick_Bg.png'); background-size: 100% 100%; border-radius: 12px; padding: 12px 18px; display: flex; align-items: center; gap: 12px; z-index: 100; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .audio-toggle-btn { background: none; border: none; color: #000; font-size: 20px; cursor: pointer; }
        .volume-slider { -webkit-appearance: none; width: 85px; height: 6px; background: rgba(0,0,0,0.2); border-radius: 3px; cursor: pointer; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; border: 2px solid #000; }

        .img-btn { cursor: pointer; border: none; background: none; padding: 0; outline: none; transition: transform 0.1s ease; }
        .img-btn:hover { transform: scale(1.05); }
        .img-btn.pressed { transform: scale(0.95); }

        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 120; }
        .modal-content { background: url('DD_Popup.png'); background-size: 100% 100%; width: 826px; height: 461px; display: flex; justify-content: center; align-items: center; }
        .popup-safe-box { width: 695px; height: 305px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; }
        
        #gameover-popup { z-index: 200; }
        .gameover-box { background: url('DD_GAMEOVER.png') no-repeat center center; background-size: contain; width: 826px; height: 461px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .rhythm-container { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; width: 900px; z-index: 4; }
        .arrow-sequence-box { display: flex; gap: 15px; margin-bottom: 20px; }
        .arrow-icon-slot { width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; }
        .arrow-icon-slot.hit { transform: scale(1.25); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="audio-controller-panel">
        <button class="audio-toggle-btn" id="btn-audio-mute" onclick="toggleAudioMute()">🔊</button>
        <input type="range" class="volume-slider" id="slider-volume" min="0" max="100" value="50" oninput="changeVolumeValue(this.value)">
    </div>
    
    <div id="screen-intro" class="screen active">
        <img id="main-logo" src="DD_Logo.png">
        <div class="nickname-area-container">
            <input type="text" id="user-name-input" value="도구리" maxlength="8">
        </div>
        <button id="btn-main-start" class="img-btn" onclick="goToGameStart()"><img src="DD_Main_Start_Button.png"></button>
    </div>

    <div id="gameover-popup" class="modal">
        <div class="gameover-box">
            <button id="btn-gameover-retry" class="img-btn" onclick="retryGame()" style="margin-top: 250px;">
                <img src="DD_Main_Start_Button.png" alt="RETRY" style="width: 150px;">
            </button>
        </div>
    </div>

    <div id="screen-start" class="screen">
        <button onclick="goToIntro()">뒤로가기</button>
        <button id="btn-main-dance" class="img-btn" onclick="startGameLoop()"><img src="DD_Main_Dance_Button.png"></button>
    </div>

    <div id="screen-game" class="screen">
        <div id="judgment-text"></div>
        <div class="rhythm-container" id="rhythm-ui">
            <div class="arrow-sequence-box" id="arrow-sequence-area"></div>
            <div id="timer-bar" style="width: 400px; height: 10px; background: #ffeb3b;"></div>
        </div>
        <div id="next-btn-container" style="display:none;">
            <button id="btn-main-next" class="img-btn" onclick="handleNextStageClick()"><img src="DD_Main_Next_Button.png"></button>
        </div>
    </div>

    <div id="reward-popup" class="modal">
        <div class="modal-content">
            <div class="popup-safe-box">
                <h2>스테이지 클리어!</h2>
                <div id="reward-item-name"></div>
                <button id="btn-reward-ok" class="img-btn" onclick="closeRewardPopup()">
                    <img src="DD_OK_Text.png" alt="확인">
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // ... [중략: 오디오 및 기본 로직 유지] ...
    
    function handleRoundFailure(reasonText) {
        userLives--;
        if (userLives <= 0) {
            stopRoundTimer();
            stopStopwatch();
            document.getElementById('gameover-popup').style.display = 'flex';
            return;
        }
        initRound();
    }

    function retryGame() {
        document.getElementById('gameover-popup').style.display = 'none';
        showScreen('screen-start');
    }

    function handleRoundSuccess() {
        if (currentRound >= 5) {
            if (currentStage < 3) {
                // 스테이지 1, 2 클리어 시에만 NEXT 버튼 노출
                isStageClearedWait = true;
                document.getElementById('rhythm-ui').style.display = 'none';
                document.getElementById('next-btn-container').style.display = 'block';
            } else {
                // 스테이지 3 최종 클리어 시 바로 보상창
                stopStopwatch();
                giveRandomRewardAndRank();
            }
        } else {
            currentRound++;
            initRound();
        }
    }

    // 키보드 핸들러
    window.addEventListener('keydown', function(e) {
        let rewardPopupVisible = document.getElementById('reward-popup').style.display === 'flex';
        let gameOverPopupVisible = document.getElementById('gameover-popup').style.display === 'flex';
        
        if (e.key === ' ' || e.key === 'Spacebar') {
            if (rewardPopupVisible) { e.preventDefault(); simulateBtnClick('btn-reward-ok', closeRewardPopup); return; }
            if (gameOverPopupVisible) { e.preventDefault(); simulateBtnClick('btn-gameover-retry', retryGame); return; }
            // ... 나머지 로직 ...
        }
    });

    // ... [나머지 함수 동일] ...
</script>
</body>
</html>
