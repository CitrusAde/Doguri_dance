<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도구리 하와이 댄스 게임 - V27 (엔진 안정화 및 NPS 폰트 완전 호환)</title>
    <style>
        /* 👑 커스텀 NPS 폰트 등록 (에러 방지를 위해 경로 및 포맷 구조 최적화) */
        @font-face {
            font-family: 'NPSfont_bold';
            src: url('NPSfont_bold.woff2') format('woff2'),
                 url('NPSfont_bold.woff') format('woff'),
                 url('NPSfont_bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        * { 
            box-sizing: border-box; 
            user-select: none; 
            /* 가독성 서체 순위 적용 */
            font-family: 'NPSfont_bold', 'LINESeedKR-Bd', 'Malgun Gothic', sans-serif; 
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 16:9 고정 해상도 컨테이너 및 배경 화면 복구 */
        #game-container {
            width: 1280px;
            height: 720px;
            position: relative;
            background-image: url('DD_Main_Image.png');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* 공통 화면 스타일 */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .screen.active { display: flex; }

        /* 🔊 좌측 상단 소리 제어 패널 */
        .audio-controller-panel {
            position: absolute;
            top: 30px;
            left: 40px;
            background: url('DD_Nick_Bg.png') no-repeat center center;
            background-size: 100% 100%; 
            border-radius: 12px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .audio-toggle-btn {
            background: none;
            border: none;
            color: #000; 
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            transition: transform 0.1s ease;
        }
        .audio-toggle-btn:active { transform: scale(0.9); }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 85px;
            height: 6px;
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #000;
            cursor: pointer;
        }

        #main-logo {
            display: block;
            max-width: 90%;
            height: auto;
            margin-bottom: 30px;
        }

        /* 닉네임 입력 구역 레이아웃 */
        .nickname-area-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .nick-title-img {
            display: block;
            max-width: 100%;
            height: auto;
            margin-top: 15px; 
        }
        .nick-input-wrapper {
            position: relative;
            width: auto;
            height: auto;
            display: inline-block;
            transform: scale(0.7);
            transform-origin: center center;
        }
        .nick-bg-img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .nick-input-field {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 60%;
            background: none;
            border: none;
            outline: none;
            color: #000;
            font-size: 26px; 
            font-weight: bold;
            text-align: center;
        }

        /* 버튼 가이드 세트 */
        .btn-with-guide-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .space-shortcut-guide {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
        }

        /* 이미지 버튼 지침 */
        .img-btn {
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            outline: none;
            display: block;
            transition: transform 0.1s ease;
            transform-origin: center center;
        }
        .img-btn:hover { transform: scale(1.05); }
        .img-btn.pressed { transform: scale(0.95); }

        .origin-size-btn img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .bottom-dance-position {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .top-right-back {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 10;
        }
        .top-right-back img {
            display: block;
            height: 35px;
            width: auto;
        }

        /* 우측 하단 레이아웃 제어 그룹 */
        .bottom-right-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
            z-index: 10;
        }
        .mini-btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
        }
        .dummy-reset-btn {
            padding: 8px 14px;
            background: rgba(244, 67, 54, 0.5);
            color: white;
            border: 2px solid #fff;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
        .dummy-reset-btn:hover { background: rgba(244, 67, 54, 0.8); }

        /* 난이도 이미지 버튼 그룹 */
        .difficulty-group {
            position: absolute;
            bottom: 100px; 
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px; 
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .diff-btn-slot {
            position: relative;
            display: inline-block;
            transition: transform 0.1s ease;
            transform-origin: center center;
        }
        .diff-btn-slot:hover { transform: scale(1.05); }
        .diff-btn-slot:active { transform: scale(0.95); }

        .diff-glow-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .diff-btn-slot.selected .diff-glow-layer { opacity: 1; }

        .diff-img-btn {
            position: relative;
            z-index: 2;
            display: block;
        }
        .diff-img-btn img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        /* 상단 상태 판넬 */
        .game-status {
            position: absolute;
            top: 35px;
            left: 200px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            z-index: 5;
            display: flex;
            gap: 15px;
        }

        /* 라이프 패널 */
        .life-container-wrapper {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 10;
            transform: scale(0.7);
            transform-origin: left bottom;
        }
        .life-bg-asset {
            display: block;
            max-width: none;
            height: auto;
        }
        .life-hearts-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            width: 85%;
            height: 100%;
        }
        .heart-img-slot {
            width: 45px;
            height: 45px;
            object-fit: contain;
            transition: opacity 0.1s ease;
        }
        .heart-img-slot.hidden-life {
            opacity: 0;
        }

        /* 인게임 무대 배치 */
        #game-table {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            height: auto;
            z-index: 1;
        }
        #doguri-char {
            position: absolute;
            bottom: 195px; 
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: auto;
            z-index: 2;
        }

        /* 리듬 시퀀스 박스 */
        .rhythm-container {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 900px;
            z-index: 4;
        }
        .arrow-sequence-box {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .arrow-icon-slot {
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.08s ease;
            transform-origin: center center;
        }
        .arrow-icon-slot.hit { transform: scale(1.25); }
        .arrow-icon-slot img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .timer-wrapper {
            width: 400px;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #fff;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background: #ffeb3b;
            box-shadow: 0 0 8px #ffeb3b;
        }

        #judgment-text {
            position: absolute;
            bottom: 210px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 34px;
            font-weight: bold;
            text-shadow: 0 3px 6px rgba(0,0,0,0.9);
            z-index: 4;
        }

        /* 팝업 UI 스타일 */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 120;
        }
        .modal-content {
            background: url('DD_Popup.png') no-repeat center center;
            background-size: 100% 100%;
            width: 826px; 
            height: 461px; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .popup-safe-box {
            width: 695px;
            height: 305px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            color: #000;
        }
        .popup-safe-box h2 {
            margin: 0 0 5px 0;
            font-size: 24px;
        }
        .popup-safe-box p {
            font-size: 14px;
            color: #333;
            margin: 0 0 5px 0;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 10px 0;
            width: 100%;
            max-height: 180px;
            overflow-y: auto;
        }
        .book-item {
            border: 2px solid #666;
            padding: 8px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            font-weight: bold;
            font-size: 13px;
        }
        .book-item.unlocked {
            background: #e3f2fd;
            border-color: #2196f3;
            color: #1565c0;
        }

        .leaderboard-modal-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #555;
            height: 180px;
            overflow-y: auto;
            width: 100%;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            padding: 3px 8px;
            border-bottom: 1px dashed #aaa;
        }
        .leaderboard-row.my-row {
            background: #ffeb3b;
            border-radius: 4px;
        }

        #next-btn-container {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }
        #reward-popup {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: url('DD_Popup.png') no-repeat center center;
            background-size: 100% 100%;
            width: 826px; height: 461px;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 150;
        }
        .rank-badge { font-size: 54px; font-weight: 900; }
        .rank-s { color: #ff1744; }
        .rank-a { color: #ff9100; }
        .rank-b { color: #00e676; }
        .close-btn {
            padding: 6px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, get, onValue, query, orderByChild, limitToFirst } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDL0ytMkp9lhXKNETfo_phU2mYybWSMLrc",
            authDomain: "doguridance.firebaseapp.com",
            databaseURL: "https://doguridance-default-rtdb.firebaseio.com",
            projectId: "doguridance",
            storageBucket: "doguridance.firebasestorage.app",
            messagingSenderId: "692785013428",
            appId: "1:692785013428:web:8d686d5ab3e669ed3d2de1",
            measurementId: "G-1STG643F4L"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        window.dbRef = ref;
        window.dbPush = push;
        window.dbSet = set;
        window.dbGet = get;
        window.dbOnValue = onValue;
        window.dbQuery = query;
        window.dbOrderBy = orderByChild;
        window.dbLimit = limitToFirst;
        window.firebaseDb = database;
        window.isFirebaseReady = true;
    </script>
</head>
<body>

<div id="game-container">

    <div class="audio-controller-panel">
        <button class="audio-toggle-btn" id="btn-audio-mute" onclick="toggleAudioMute()">🔊</button>
        <input type="range" class="volume-slider" id="slider-volume" min="0" max="100" value="50" oninput="changeVolumeValue(this.value)">
    </div>
    
    <div id="screen-intro" class="screen active">
        <img id="main-logo" src="DD_Logo.png" alt="도구리 로고" onerror="this.style.display='none'; this.after('[DD_Logo]');">
        
        <div class="nickname-area-container">
            <img class="nick-title-img" src="DD_Nick_Text.png" alt="플레이어 닉네임 입력" onerror="this.style.display='none'; this.after('플레이어 닉네임 입력');">
            <div class="nick-input-wrapper">
                <img class="nick-bg-img" src="DD_Nick_Bg.png" alt="닉네임 배경">
                <input type="text" id="user-name-input" class="nick-input-field" placeholder="닉네임 입력" maxlength="8" value="도구리">
            </div>
        </div>

        <div class="btn-with-guide-container">
            <button id="btn-main-start" class="img-btn origin-size-btn" onclick="goToGameStart()">
                <img src="DD_Main_Start_Button.png" alt="START" onerror="this.style.display='none'; this.after('[START 버튼]');">
            </button>
            <span class="space-shortcut-guide">(space)</span>
        </div>
    </div>

    <div id="screen-start" class="screen">
        <button id="btn-main-back" class="img-btn top-right-back" onclick="goToIntro()">
            <img src="DD_Main_Back_Button.png" alt="뒤로가기" onerror="this.style.display='none'; this.after('← 뒤로가기');">
        </button>

        <div class="difficulty-group">
            <div id="slot-easy" class="diff-btn-slot selected" onclick="selectDifficulty('easy')">
                <img class="diff-glow-layer" src="DD_Easy_Button_Glow.png" alt="쉬움 글로우" onerror="this.style.display='none';">
                <div class="diff-img-btn">
                    <img src="DD_Easy_Button.png" alt="쉬움" onerror="this.style.display='none'; this.after('쉬움');">
                </div>
            </div>
            <div id="slot-normal" class="diff-btn-slot" onclick="selectDifficulty('normal')">
                <img class="diff-glow-layer" src="DD_Normal_Button_Glow.png" alt="보통 글로우" onerror="this.style.display='none';">
                <div class="diff-img-btn">
                    <img src="DD_Normal_Button.png" alt="보통" onerror="this.style.display='none'; this.after('보통');">
                </div>
            </div>
            <div id="slot-hard" class="diff-btn-slot" onclick="selectDifficulty('hard')">
                <img class="diff-glow-layer" src="DD_Hard_Button_Glow.png" alt="어려움 글로우" onerror="this.style.display='none';">
                <div class="diff-img-btn">
                    <img src="DD_Hard_Button.png" alt="어려움" onerror="this.style.display='none'; this.after('어려움');">
                </div>
            </div>
        </div>

        <div class="bottom-dance-position btn-with-guide-container">
            <button id="btn-main-dance" class="img-btn origin-size-btn" onclick="startGameLoop()">
                <img src="DD_Main_Dance_Button.png" alt="DANCE" onerror="this.style.display='none'; this.after('[DANCE 버튼]');">
            </button>
            <span class="space-shortcut-guide">(space)</span>
        </div>

        <div class="bottom-right-container">
            <button id="btn-main-rank" class="img-btn origin-size-btn" onclick="openLeaderboardModal()">
                <img src="DD_Highscore.png" alt="HIGHSCORE" onerror="this.style.display='none'; this.after('[HIGHSCORE]');">
            </button>
            <button id="btn-main-gift" class="img-btn origin-size-btn" onclick="openCollection()">
                <img src="DD_Main_Gift_Button.png" alt="도감" onerror="this.style.display='none'; this.after('[도감]');">
            </button>
            <div class="mini-btn-group">
                <button class="dummy-reset-btn" onclick="resetAllLocalData()">도감 초기화</button>
            </div>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="game-status">
            <span id="txt-difficulty">난이도: 쉬움</span> | 
            <span id="txt-stage">스테이지: 1/3</span> | 
            <span id="txt-round">판수: 1/5</span> |
            <span id="txt-playtime" style="color: #ffeb3b;">시간: 0.00초</span>
        </div>

        <div class="life-container-wrapper">
            <img class="life-bg-asset" src="DD_Nick_Bg.png" alt="라이프 배경">
            <div class="life-hearts-overlay" id="hearts-display-images"></div>
        </div>

        <img id="game-table" src="DD_Game_Table.png" alt="단상" onerror="this.style.display='none';">
        <img id="doguri-char" src="doguri_image_base.png" alt="도구리" onerror="this.style.display='none'; this.after('[도구리]');">

        <div id="judgment-text"></div>

        <div class="rhythm-container" id="rhythm-ui">
            <div class="arrow-sequence-box" id="arrow-sequence-area"></div>
            <div class="timer-wrapper">
                <div id="timer-bar"></div>
            </div>
        </div>

        <div id="next-btn-container">
            <button id="btn-main-next" class="img-btn origin-size-btn" onclick="handleNextStageClick()">
                <img src="DD_Main_Next_Button.png" alt="NEXT" onerror="this.style.display='none'; this.after('[NEXT]');">
            </button>
        </div>
    </div>

    <div id="reward-popup">
        <div class="popup-safe-box">
            <h2>🌴 스테이지 클리어! 🌴</h2>
            <div id="popup-rank-badge" class="rank-badge rank-s">S</div>
            <p id="popup-playtime-result" style="font-weight: bold; margin: 0;">기록: 0.00초</p>
            <p id="popup-firebase-status" style="color: #ff1744; font-weight: bold; font-size:12px; margin:2px 0;">순위 판단 중...</p>
            <p style="margin: 3px 0 0 0; font-weight: bold; font-size:13px;">🎁 하와이 기념 도감 보상 🎁</p>
            <div id="reward-item-name" style="font-size: 20px; font-weight: bold; color: #1565c0; margin-bottom: 8px;">[아이템]</div>
            
            <button id="btn-reward-ok" class="img-btn origin-size-btn" onclick="closeRewardPopup()">
                <img src="DD_OK_Text.png" alt="확인" onerror="this.style.display='none'; this.after('[확인]');">
            </button>
        </div>
    </div>

    <div id="leaderboard-modal" class="modal">
        <div class="modal-content">
            <div class="popup-safe-box">
                <h2 id="modal-rank-title" style="font-size:22px;">🏆 글로벌 실시간 랭킹</h2>
                <p style="margin-bottom:6px;">현재 선택된 난이도의 TOP 10 기록입니다.</p>
                <div class="leaderboard-modal-list" id="modal-rank-rows"></div>
                <button class="close-btn" onclick="closeLeaderboardModal()">닫기</button>
            </div>
        </div>
    </div>

    <div id="collection-modal" class="modal">
        <div class="modal-content">
            <div class="popup-safe-box">
                <h2 style="font-size:22px;">🎒 도구리의 하와이 도감</h2>
                <p style="margin-bottom:6px;">총 9가지 기념품을 모두 모아보세요!</p>
                <div class="book-grid" id="book-grid-container"></div>
                <button class="close-btn" onclick="closeCollection()">닫기</button>
            </div>
        </div>
    </div>

</div>

<script>
    // --- 글로벌 상태 제어 변수 ---
    let currentDifficulty = 'easy';
    let currentStage = 1;            
    let currentRound = 1;            
    let userLives = 5;              
    let globalNickname = "도구리";

    let targetArrowSequence = [];
    let currentArrowIndex = 0; 
    let isRoundFinished = false;
    let isStageClearedWait = false; 
    let isRewardGivenThisGame = false; 

    let roundTimerId = null;
    let timeLimit = 5000;            
    let timeRemaining = 5000;

    let totalStartTime = 0;          
    let totalElapsedTime = 0;        
    let stopwatchIntervalId = null; 

    // --- 🎵 오디오 제어 변수군 ---
    let audioCtx = null;
    let globalVolumeValue = 0.5;   
    let isAudioMuted = false;       
    let masterGainNode = null;      

    let bgmMusicTimeoutId = null;
    let isBgmPlaying = false;
    let oceanWaveNode = null;       

    const collectionItems = [
        "🍍 하와이안 파인애플", "🌸 알로하 레이", "🕶️ 선글라스",
        "🏄 미니 서프보드", "🥥 코코넛 주스", "🎸 우쿨렐레",
        "🩴 비치 샌들", "👕 하와이안 셔츠", "🏖️ 도구리 튜브"
    ];
    let unlockedItems = new Set();
    const STORAGE_KEY_ITEMS = "doguri_unlocked_items_firebase_v1";

    const DOGURI_BASE = "doguri_image_base.png";
    const DOGURI_UPGRADE = "doguri_image_upgrade.png";

    const arrowKeyCodes = ['ArrowLeft', 'ArrowRight', 'ArrowDown', 'ArrowUp'];
    const arrowNames = { 'ArrowLeft': 'Left', 'ArrowRight': 'Right', 'ArrowDown': 'Down', 'ArrowUp': 'Up' };

    window.onload = function() {
        loadLocalStorageData();
        initCollectionUI();
        updateDoguriImage();
        setupButtonEffects();
        
        // 💡 브라우저 정책상 상호작용 후 사운드가 시작되므로 최초 클릭/키 핸들러 연동
        document.body.addEventListener('click', () => { initAudioContext(); }, { once: true });
        document.body.addEventListener('keydown', () => { initAudioContext(); }, { once: true });
    };

    function initAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGainNode = audioCtx.createGain();
            updateMasterVolume();
            masterGainNode.connect(audioCtx.destination);
        }
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        if (!isBgmPlaying) {
            startHawaiiBgmEngine();
        }
    }

    function updateMasterVolume() {
        if (!masterGainNode) return;
        let targetVol = isAudioMuted ? 0 : globalVolumeValue;
        masterGainNode.gain.setValueAtTime(targetVol, audioCtx.currentTime);
    }

    function changeVolumeValue(val) {
        globalVolumeValue = val / 100;
        initAudioContext();
        updateMasterVolume();
        if (globalVolumeValue > 0 && isAudioMuted) {
            toggleAudioMute(); 
        }
    }

    function toggleAudioMute() {
        initAudioContext();
        isAudioMuted = !isAudioMuted;
        let btn = document.getElementById('btn-audio-mute');
        if (isAudioMuted) {
            btn.innerText = '🔇';
            btn.style.opacity = '0.5';
        } else {
            btn.innerText = '🔊';
            btn.style.opacity = '1';
        }
        updateMasterVolume();
    }

    function createOceanWaveSound() {
        try {
            let bufferSize = audioCtx.sampleRate * 5; 
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            let noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = buffer;
            noiseSource.loop = true;

            let lowpassFilter = audioCtx.createBiquadFilter();
            lowpassFilter.type = 'lowpass';
            lowpassFilter.frequency.setValueAtTime(350, audioCtx.currentTime); 

            let waveGain = audioCtx.createGain();
            waveGain.gain.setValueAtTime(0.08, audioCtx.currentTime); 

            noiseSource.connect(lowpassFilter);
            lowpassFilter.connect(waveGain);
            waveGain.connect(masterGainNode);

            noiseSource.start();
            oceanWaveNode = { source: noiseSource, gain: waveGain };

            function waveLoop() {
                if (!isBgmPlaying) return;
                let now = audioCtx.currentTime;
                waveGain.gain.linearRampToValueAtTime(0.1, now + 2.0); 
                waveGain.gain.linearRampToValueAtTime(0.01, now + 4.5); 
                setTimeout(waveLoop, 4500);
            }
            waveLoop();
        } catch (e) { console.error("파도 생성 실패:", e); }
    }

    function startHawaiiBgmEngine() {
        isBgmPlaying = true;
        createOceanWaveSound(); 

        const chords = [
            [261.63, 329.63, 392.00, 523.25], 
            [220.00, 261.63, 329.63, 440.00], 
            [174.61, 218.27, 261.63, 349.23], 
            [196.00, 246.94, 293.66, 392.00]  
        ];

        let chordIndex = 0;
        let noteIndex = 0;
        let tempoMs = 180; 

        function playNextBgmNote() {
            if (!isBgmPlaying) return;

            let currentGameActive = document.getElementById('screen-game').classList.contains('active');
            let isRhythmUiVisible = document.getElementById('rhythm-ui').style.display !== 'none';
            let bgmVolumeScale = (currentGameActive && isRhythmUiVisible) ? 0.35 : 0.8;

            let currentChord = chords[chordIndex];
            let noteFreq = currentChord[noteIndex];

            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();

            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(noteFreq, audioCtx.currentTime);

            let noteVolume = 0.12 * globalVolumeValue * bgmVolumeScale; 
            gainNode.gain.setValueAtTime(noteVolume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4); 

            osc.connect(gainNode);
            gainNode.connect(masterGainNode);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);

            noteIndex++;
            if (noteIndex >= 4) {
                noteIndex = 0;
                if (Math.random() > 0.7) { 
                    chordIndex = (chordIndex + 1) % chords.length;
                }
            }
            
            bgmMusicTimeoutId = setTimeout(playNextBgmNote, tempoMs);
        }

        playNextBgmNote();
    }

    function playBeep(frequency, duration, type = 'square', customEndFreq = null) {
        try {
            initAudioContext();
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();

            osc.type = type; 
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            if (customEndFreq !== null) {
                osc.frequency.exponentialRampToValueAtTime(customEndFreq, audioCtx.currentTime + duration);
            }

            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

            osc.connect(gainNode);
            gainNode.connect(masterGainNode); 

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch (e) { console.error("사운드 에러:", e); }
    }

    function playHitSound(comboIndex) {
        let targetFreq = 320 + (comboIndex * 60);
        playBeep(targetFreq, 0.08, 'triangle'); 
    }

    function playFailSound() {
        playBeep(220, 0.35, 'square', 80); 
    }

    function playSelectTickSound() {
        playBeep(440, 0.05, 'triangle');
    }

    function playStageClearSound() {
        playBeep(523.25, 0.1, 'square'); 
        setTimeout(() => { playBeep(659.25, 0.25, 'square'); }, 80);
    }

    function loadLocalStorageData() {
        try {
            let savedItems = localStorage.getItem(STORAGE_KEY_ITEMS);
            if(savedItems) unlockedItems = new Set(JSON.parse(savedItems));
        } catch(e) { console.error("로컬 세이브 오류:", e); }
    }

    function saveGameDataToStorage() {
        try {
            localStorage.setItem(STORAGE_KEY_ITEMS, JSON.stringify(Array.from(unlockedItems)));
        } catch(e) { console.error("로컬 세이브 저장 실패:", e); }
    }

    function fetchServerLeaderboard() {
        if (!window.isFirebaseReady) return;
        let diffKo = currentDifficulty === 'easy' ? '쉬움' : currentDifficulty === 'normal' ? '보통' : '어려움';
        document.getElementById('modal-rank-title').innerText = `🏆 글로벌 실시간 TOP 10 (${diffKo})`;

        const scoreRef = window.dbRef(window.firebaseDb, `scores/${currentDifficulty}`);
        const rankQuery = window.dbQuery(scoreRef, window.dbOrderBy('playTime'), window.dbLimit(10));

        window.dbOnValue(rankQuery, (snapshot) => {
            let rowsContainer = document.getElementById('modal-rank-rows');
            rowsContainer.innerHTML = '';

            if (!snapshot.exists()) {
                rowsContainer.innerHTML = '<div style="text-align:center; color:#999; padding-top:40px;">등록된 기록이 없습니다. 최초의 명예를 얻으세요!</div>';
                return;
            }

            let rankIndex = 1;
            snapshot.forEach((childSnapshot) => {
                let data = childSnapshot.val();
                let row = document.createElement('div');
                row.className = 'leaderboard-row';
                if(data.name === globalNickname) row.classList.add('my-row');

                let timeSec = (data.playTime / 1000).toFixed(2);
                row.innerHTML = `<span>${rankIndex}등. ${data.name}</span> <span>${timeSec}초</span>`;
                rowsContainer.appendChild(row);
                rankIndex++;
            });
        });
    }

    function checkAndUploadScore(nickname, elapsedMs) {
        if (!window.isFirebaseReady) return;
        let statusText = document.getElementById('popup-firebase-status');
        statusText.innerText = "순위 연산 판독 중...";
        statusText.style.color = "#ffeb3b";

        const scoreRef = window.dbRef(window.firebaseDb, `scores/${currentDifficulty}`);
        const rankQuery = window.dbQuery(scoreRef, window.dbOrderBy('playTime'), window.dbLimit(10));

        window.dbGet(rankQuery).then((snapshot) => {
            let records = [];
            snapshot.forEach((child) => { records.push(child.val().playTime); });

            if (records.length < 10 || elapsedMs < records[records.length - 1]) {
                statusText.innerText = "⭐ TOP 10 랭크인 진입! 기록 업로드 중...";
                const scoreListRef = window.dbRef(window.firebaseDb, `scores/${currentDifficulty}`);
                const newScoreRef = window.dbPush(scoreListRef);

                window.dbSet(newScoreRef, {
                    name: nickname,
                    playTime: elapsedMs,
                    timestamp: Date.now()
                }).then(() => {
                    statusText.innerText = "✓ 글로벌 실시간 10위권 등록 성공!";
                    statusText.style.color = "#4caf50";
                }).catch(() => {
                    statusText.innerText = "서버 연결 지연";
                    statusText.style.color = "#f44336";
                });
            } else {
                statusText.innerText = "아쉽게도 아케이드 10위권 순위 내에 진입하지 못했습니다.";
                statusText.style.color = "#444";
            }
        }).catch(() => {
            statusText.innerText = "오프라인 모드 플레이 완료";
        });
    }

    function setupButtonEffects() {
        const btns = document.querySelectorAll('.img-btn');
        btns.forEach(btn => {
            btn.addEventListener('mousedown', () => {
                initAudioContext(); 
                btn.classList.add('pressed');
            });
            btn.addEventListener('mouseup', () => btn.classList.remove('pressed'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('pressed'));
        });
    }

    function simulateBtnClick(btnId, callback) {
        let btn = document.getElementById(btnId);
        if (btn) {
            btn.classList.add('pressed');
            setTimeout(() => {
                btn.classList.remove('pressed');
                callback();
            }, 80);
        }
    }

    function simulateSlotKeyClick(slotId, callback) {
        let slot = document.getElementById(slotId);
        if (slot) {
            slot.style.transform = "scale(0.95)";
            setTimeout(() => {
                slot.style.transform = "none";
                callback();
            }, 80);
        }
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function setCharacterImage(srcPath, fallbackText) {
        let charImg = document.getElementById('doguri-char');
        if (charImg) {
            charImg.src = srcPath;
            charImg.onerror = function() {
                this.style.display = 'none';
                this.after(`[${fallbackText}]`);
            };
        }
    }

    function goToGameStart() { 
        initAudioContext(); 
        let inputVal = document.getElementById('user-name-input').value.trim();
        globalNickname = inputVal ? inputVal : "도구리";
        showScreen('screen-start'); 
    }

    function goToIntro() { 
        stopRoundTimer();
        stopStopwatch();
        showScreen('screen-intro'); 
    }

    function selectDifficulty(diff) {
        currentDifficulty = diff;
        document.querySelectorAll('.diff-btn-slot').forEach(b => b.classList.remove('selected'));
        document.getElementById(`slot-${diff}`).classList.add('selected');
        playSelectTickSound();
    }

    function startGameLoop() {
        initAudioContext();
        showScreen('screen-game');
        currentStage = 1;
        currentRound = 1;
        userLives = 5; 
        isRewardGivenThisGame = false; 
        
        totalStartTime = Date.now();
        totalElapsedTime = 0;
        startStopwatch();

        updateHeartsUI();
        initRound();
    }

    function startStopwatch() {
        if(stopwatchIntervalId) clearInterval(stopwatchIntervalId);
        stopwatchIntervalId = setInterval(() => {
            if(isStageClearedWait || isRoundFinished) return;
            totalElapsedTime = Date.now() - totalStartTime;
            document.getElementById('txt-playtime').innerText = `시간: ${(totalElapsedTime / 1000).toFixed(2)}초`;
        }, 30);
    }

    function stopStopwatch() {
        if(stopwatchIntervalId) {
            clearInterval(stopwatchIntervalId);
            stopwatchIntervalId = null;
        }
    }

    function updateHeartsUI() {
        let container = document.getElementById('hearts-display-images');
        container.innerHTML = '';
        
        for(let i=1; i<=5; i++) {
            let heartImg = document.createElement('img');
            heartImg.src = "DD_Heart.png";
            heartImg.className = "heart-img-slot";
            heartImg.alt = "라이프 하트";
            
            heartImg.onerror = function() {
                this.style.display = 'none';
                let txt = document.createElement('span');
                txt.innerText = '❤️';
                txt.style.fontSize = '24px';
                if(i > userLives) txt.style.opacity = '0.2';
                this.parentElement.appendChild(txt);
            };

            if (i > userLives) heartImg.classList.add('hidden-life');
            container.appendChild(heartImg);
        }
    }

    function initRound() {
        isRoundFinished = false;
        isStageClearedWait = false;
        currentArrowIndex = 0;
        stopRoundTimer();
        
        updateDoguriImage();
        
        let diffKo = currentDifficulty === 'easy' ? '쉬움' : currentDifficulty === 'normal' ? '보통' : '어려움';
        document.getElementById('txt-difficulty').innerText = `난이도: ${diffKo}`;
        document.getElementById('txt-stage').innerText = `스테이지: ${currentStage}/3`;
        document.getElementById('txt-round').innerText = `판수: ${currentRound}/5`;
        
        document.getElementById('judgment-text').innerText = '';
        document.getElementById('next-btn-container').style.display = 'none'; 
        document.getElementById('rhythm-ui').style.display = 'flex';
        
        let arrowCount = 2 + currentRound; 
        targetArrowSequence = [];
        
        let sequenceArea = document.getElementById('arrow-sequence-area');
        sequenceArea.innerHTML = '';

        for(let i=0; i<arrowCount; i++) {
            let randomKey = arrowKeyCodes[Math.floor(Math.random() * arrowKeyCodes.length)];
            targetArrowSequence.push(randomKey);

            let slot = document.createElement('div');
            slot.className = 'arrow-icon-slot';
            slot.id = `arrow-slot-${i}`;
            
            let img = document.createElement('img');
            img.src = `DD_${arrowNames[randomKey]}_Button_Normal.png`;
            img.id = `arrow-img-${i}`;
            img.alt = arrowNames[randomKey];
            
            img.onerror = function() {
                this.style.display = 'none';
                let sym = {'ArrowLeft':'←','ArrowRight':'→','ArrowDown':'↓','ArrowUp':'↑'};
                this.parentElement.innerText = sym[randomKey];
            };

            slot.appendChild(img);
            sequenceArea.appendChild(slot);
        }

        startRoundTimer();
    }

    function startRoundTimer() {
        timeRemaining = timeLimit;
        document.getElementById('timer-bar').style.width = '100%';

        roundTimerId = setInterval(() => {
            if (isRoundFinished || isStageClearedWait) {
                stopRoundTimer();
                return;
            }
            timeRemaining -= 50;
            let percent = (timeRemaining / timeLimit) * 100;
            document.getElementById('timer-bar').style.width = percent + '%';

            if (timeRemaining <= 0) {
                stopRoundTimer();
                playFailSound(); 
                handleRoundFailure("TIME OVER!");
            }
        }, 50);
    }

    function stopRoundTimer() {
        if (roundTimerId) {
            clearInterval(roundTimerId);
            roundTimerId = null;
        }
    }

    function handleRoundFailure(reasonText) {
        userLives--;
        updateHeartsUI();
        setCharacterImage('DD_Dance_Fail.png', '도구리 실패 연출');

        if (userLives <= 0) {
            stopRoundTimer();
            stopStopwatch();
            setTimeout(() => {
                alert("GAME OVER! 모든 하트를 잃었습니다.");
                showScreen('screen-start');
            }, 100);
            return;
        }

        let jTxt = document.getElementById('judgment-text');
        jTxt.innerText = reasonText;
        jTxt.style.color = "#f44336";

        initRound();
    }

    // --- 키보드 이벤트 핸들러 ---
    window.addEventListener('keydown', function(e) {
        let introActive = document.getElementById('screen-intro').classList.contains('active');
        let startActive = document.getElementById('screen-start').classList.contains('active');
        let gameActive = document.getElementById('screen-game').classList.contains('active');
        
        let rewardPopupVisible = document.getElementById('reward-popup').style.display === 'flex';
        let nextContainer = document.getElementById('next-btn-container');
        let nextBtnVisible = nextContainer && nextContainer.style.display === 'block';

        if(document.activeElement === document.getElementById('user-name-input')) return;
        if(document.getElementById('leaderboard-modal').style.display === 'flex') return;
        if(document.getElementById('collection-modal').style.display === 'flex') return;

        initAudioContext(); 

        if (e.key === ' ' || e.key === 'Spacebar') {
            if (introActive) {
                e.preventDefault();
                simulateBtnClick('btn-main-start', goToGameStart);
                return;
            }
            if (startActive) {
                e.preventDefault();
                simulateBtnClick('btn-main-dance', startGameLoop);
                return;
            }
            if (gameActive && nextBtnVisible && isStageClearedWait) {
                e.preventDefault();
                simulateBtnClick('btn-main-next', handleNextStageClick);
                return;
            }
            // [수정된 부분] 보상 팝업에서 Space 키 대응
            if (rewardPopupVisible) {
                e.preventDefault();
                simulateBtnClick('btn-reward-ok', closeRewardPopup);
                return;
            }
        }

        if (e.key === 'Escape' || e.key === 'Esc') {
            if (startActive) {
                simulateBtnClick('btn-main-back', goToIntro);
                return;
            }
        }

        if (startActive) {
            if (e.key === '1') { simulateSlotKeyClick('slot-easy', () => selectDifficulty('easy')); return; }
            if (e.key === '2') { simulateSlotKeyClick('slot-normal', () => selectDifficulty('normal')); return; }
            if (e.key === '3') { simulateSlotKeyClick('slot-hard', () => selectDifficulty('hard')); return; }
        }

        if (!gameActive || isRoundFinished || isStageClearedWait) return;

        if (arrowKeyCodes.includes(e.key)) {
            let targetKey = targetArrowSequence[currentArrowIndex];
            let slotEl = document.getElementById(`arrow-slot-${currentArrowIndex}`);
            let imgEl = document.getElementById(`arrow-img-${currentArrowIndex}`);

            if(slotEl) {
                slotEl.classList.add('hit');
                setTimeout(() => slotEl.classList.remove('hit'), 80);
            }

            if (e.key === targetKey) {
                if(imgEl) imgEl.src = `DD_${arrowNames[targetKey]}_Button_Success.png`;
                
                // 🔊 타격음 정상 바인딩 및 화살표 인덱스 증가
                playHitSound(currentArrowIndex);
                currentArrowIndex++;

                let randomDanceNum = Math.floor(Math.random() * 4) + 1;
                setCharacterImage(`DD_Dance_${randomDanceNum}.png`, `도구리 댄스 ${randomDanceNum}`);

                if (currentArrowIndex >= targetArrowSequence.length) {
                    stopRoundTimer();
                    handleRoundSuccess();
                }
            } else {
                if(imgEl) imgEl.src = `DD_${arrowNames[targetKey]}_Button_Fail.png`;
                stopRoundTimer();
                playFailSound(); 
                handleRoundFailure("FAIL!");
            }
        }
    });

    function handleRoundSuccess() {
        if (currentRound >= 5) {
            isStageClearedWait = true;
            document.getElementById('rhythm-ui').style.display = 'none';
            document.getElementById('next-btn-container').style.display = 'block';
            
            let jTxt = document.getElementById('judgment-text');
            jTxt.innerText = "STAGE CLEAR!";
            jTxt.style.color = "#4caf50";
            
            playStageClearSound(); 
        } else {
            currentRound++;
            initRound();
        }
    }

    function handleNextStageClick() {
        if (currentStage < 3) {
            currentStage++;
            currentRound = 1;
            initRound();
        } else {
            stopStopwatch();
            giveRandomRewardAndRank();
        }
    }

    function giveRandomRewardAndRank() {
        if (isRewardGivenThisGame) return;
        isRewardGivenThisGame = true; 

        let finalTimeSec = totalElapsedTime / 1000;
        document.getElementById('popup-playtime-result').innerText = `최종 클리어 시간: ${finalTimeSec.toFixed(2)}초`;

        let rankLetter = 'B';
        let badgeEl = document.getElementById('popup-rank-badge');
        
        if (currentDifficulty === 'easy') {
            if (finalTimeSec <= 22) rankLetter = 'S';
            else if (finalTimeSec <= 32) rankLetter = 'A';
        } else if (currentDifficulty === 'normal') {
            if (finalTimeSec <= 26) rankLetter = 'S';
            else if (finalTimeSec <= 38) rankLetter = 'A';
        } else { 
            if (finalTimeSec <= 30) rankLetter = 'S';
            else if (finalTimeSec <= 45) rankLetter = 'A';
        }

        badgeEl.innerText = rankLetter;
        badgeEl.className = `rank-badge rank-${rankLetter.toLowerCase()}`;

        checkAndUploadScore(globalNickname, totalElapsedTime);

        let randomIndex = Math.floor(Math.random() * collectionItems.length);
        unlockedItems.add(randomIndex);
        
        saveGameDataToStorage();
        initCollectionUI();
        updateDoguriImage();

        document.getElementById('reward-item-name').innerText = collectionItems[randomIndex];
        document.getElementById('reward-popup').style.display = 'flex';
    }

    function closeRewardPopup() {
        document.getElementById('reward-popup').style.display = 'none';
        goToGameStart();
    }

    function resetAllLocalData() {
        if (confirm("도감 데이터가 전면 초기화됩니다. 진행하시겠습니까?")) {
            unlockedItems.clear();
            isRewardGivenThisGame = false;
            saveGameDataToStorage();
            initCollectionUI();
            updateDoguriImage();
            alert('도감이 완전히 초기화되었습니다.');
        }
    }

    function initCollectionUI() {
        let grid = document.getElementById('book-grid-container');
        if (!grid) return;
        grid.innerHTML = '';
        collectionItems.forEach((item, index) => {
            let box = document.createElement('div');
            box.id = `book-item-${index}`;
            box.className = `book-item ${unlockedItems.has(index) ? 'unlocked' : ''}`;
            box.innerText = unlockedItems.has(index) ? item : `🔒 미획득 (${index + 1})`;
            grid.appendChild(box);
        });
    }

    function updateDoguriImage() {
        if (unlockedItems.size === 9) {
            setCharacterImage(DOGURI_UPGRADE, '👑 하와이안 도구리 업그레이드 완료');
        } else {
            setCharacterImage(DOGURI_BASE, '도구리 기본 상태');
        }
    }

    function openLeaderboardModal() {
        fetchServerLeaderboard();
        document.getElementById('leaderboard-modal').style.display = 'flex';
    }
    function closeLeaderboardModal() {
        document.getElementById('leaderboard-modal').style.display = 'none';
    }

    function openCollection() {
        initCollectionUI();
        document.getElementById('collection-modal').style.display = 'flex';
    }
    function closeCollection() {
        document.getElementById('collection-modal').style.display = 'none';
    }
</script>

</body>
</html>
