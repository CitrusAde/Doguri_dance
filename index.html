<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도구리 하와이 댄스 게임 - V28 (완전판)</title>
    <style>
        @font-face { font-family: 'NPSfont_bold'; src: url('NPSfont_bold.woff2') format('woff2'); font-weight: bold; }
        * { box-sizing: border-box; user-select: none; font-family: 'NPSfont_bold', sans-serif; }
        body { margin: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { width: 1280px; height: 720px; position: relative; background-image: url('DD_Main_Image.png'); background-size: cover; overflow: hidden; }
        .screen { position: absolute; width: 100%; height: 100%; top: 0; left: 0; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .screen.active { display: flex; }
        .img-btn { cursor: pointer; border: none; background: none; transition: transform 0.1s ease; }
        .img-btn.pressed { transform: scale(0.95); }
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 120; }
        .modal-content { background: url('DD_Popup.png'); width: 826px; height: 461px; display: flex; justify-content: center; align-items: center; }
        .gameover-box { background: url('DD_GAMEOVER.png') no-repeat center center; background-size: contain; width: 826px; height: 461px; display: flex; flex-direction: column; align-items: center; }
        .rhythm-container { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 4; }
        .arrow-sequence-box { display: flex; gap: 15px; margin-bottom: 20px; }
        .arrow-icon-slot { width: 75px; height: 75px; transition: transform 0.08s; }
        .arrow-icon-slot.hit { transform: scale(1.25); }
    </style>
</head>
<body>
<div id="game-container">
    <div id="screen-intro" class="screen active">
        <button id="btn-main-start" class="img-btn" onclick="goToGameStart()"><img src="DD_Main_Start_Button.png"></button>
    </div>
    
    <div id="gameover-popup" class="modal">
        <div class="gameover-box">
            <button id="btn-gameover-retry" class="img-btn" onclick="retryGame()" style="margin-top: 250px;"><img src="DD_Main_Start_Button.png" style="width: 150px;"></button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div id="rhythm-ui" class="rhythm-container">
            <div class="arrow-sequence-box" id="arrow-sequence-area"></div>
            <div id="timer-bar" style="width: 400px; height: 10px; background: #ffeb3b;"></div>
        </div>
        <div id="next-btn-container" style="display:none;">
            <button id="btn-main-next" class="img-btn" onclick="handleNextStageClick()"><img src="DD_Main_Next_Button.png"></button>
        </div>
    </div>

    <div id="reward-popup" class="modal">
        <div class="modal-content">
            <button id="btn-reward-ok" class="img-btn" onclick="closeRewardPopup()"><img src="DD_OK_Text.png"></button>
        </div>
    </div>
</div>

<script>
    // 상태 및 로직
    let userLives = 5;
    let currentStage = 1;
    let currentRound = 1;
    let isStageClearedWait = false;

    function handleRoundFailure() {
        userLives--;
        if (userLives <= 0) {
            document.getElementById('gameover-popup').style.display = 'flex';
        } else {
            initRound();
        }
    }

    function retryGame() {
        document.getElementById('gameover-popup').style.display = 'none';
        location.reload(); // 간단한 초기화
    }

    function handleRoundSuccess() {
        if (currentRound >= 5) {
            if (currentStage < 3) {
                isStageClearedWait = true;
                document.getElementById('rhythm-ui').style.display = 'none';
                document.getElementById('next-btn-container').style.display = 'block';
            } else {
                giveRandomRewardAndRank();
            }
        } else {
            currentRound++;
            initRound();
        }
    }

    // 키보드 이벤트
    window.addEventListener('keydown', function(e) {
        let rewardPopupVisible = document.getElementById('reward-popup').style.display === 'flex';
        let gameOverPopupVisible = document.getElementById('gameover-popup').style.display === 'flex';
        
        if (e.key === ' ' || e.key === 'Spacebar') {
            if (rewardPopupVisible) { e.preventDefault(); simulateBtnClick('btn-reward-ok', closeRewardPopup); }
            else if (gameOverPopupVisible) { e.preventDefault(); simulateBtnClick('btn-gameover-retry', retryGame); }
            else if (isStageClearedWait) { e.preventDefault(); simulateBtnClick('btn-main-next', handleNextStageClick); }
        }
    });

    function simulateBtnClick(btnId, callback) {
        let btn = document.getElementById(btnId);
        btn.classList.add('pressed');
        setTimeout(() => { btn.classList.remove('pressed'); callback(); }, 100);
    }
    
    // ... [나머지 필수 로직(initRound, startGameLoop 등)은 이전과 동일하게 유지]
</script>
</body>
</html>
