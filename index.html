<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도구리 하와이 댄스 게임 - V12 (실제 서버 연동본)</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }

        /* 16:9 고정 해상도 컨테이너 */
        #game-container {
            width: 1280px;
            height: 720px;
            position: relative;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* 공통 화면 스타일 */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .screen.active { display: flex; }

        #main-logo {
            display: block;
            max-width: 90%;
            height: auto;
            margin-bottom: 40px;
        }

        /* 닉네임 입력란 */
        .nickname-box {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .nickname-box label {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
        }
        .nickname-box input {
            padding: 12px 20px;
            font-size: 20px;
            border: 3px solid #fff;
            border-radius: 10px;
            text-align: center;
            outline: none;
            width: 280px;
            font-weight: bold;
        }

        /* 중심점이 중앙인 이미지 버튼 */
        .img-btn {
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            outline: none;
            display: block;
            transition: transform 0.1s ease;
            transform-origin: center center;
        }
        .img-btn:hover { transform: scale(1.05); }
        .img-btn.pressed { transform: scale(0.95); }

        .bottom-center-position {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .origin-size-btn img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .top-right-back {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 10;
        }
        .top-right-back img {
            display: block;
            height: 35px;
            width: auto;
        }

        /* [구조 변경] 우측 하단 레이아웃 제어 그룹 (DANCE 우측 컴팩트 랭킹 배치) */
        .bottom-right-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            align-items: flex-end;
            gap: 20px;
            z-index: 10;
        }

        /* 미니 버튼 묶음 (도감, 초기화) */
        .mini-btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
        }
        .dummy-reset-btn {
            padding: 8px 16px;
            background: rgba(244, 67, 54, 0.6);
            color: white;
            border: 2px solid #fff;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }
        .dummy-reset-btn:hover { background: rgba(244, 67, 54, 0.9); }

        /* [요청 반영] DANCE 버튼 오른쪽 옆으로 컴팩트하게 이동한 랭킹 보드 패널 */
        .leaderboard-panel {
            width: 280px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffeb3b;
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            box-shadow: 0 0 15px rgba(255,235,59,0.2);
        }
        .leaderboard-panel h3 {
            margin: 0 0 10px 0;
            text-align: center;
            color: #ffeb3b;
            font-size: 15px;
            border-bottom: 1px solid rgba(255,235,59,0.3);
            padding-bottom: 6px;
        }
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 120px;
            overflow-y: auto;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
        }
        .leaderboard-item.top-user {
            color: #ffeb3b;
        }

        /* 난이도 버튼 그룹 */
        .difficulty-group {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }
        .diff-btn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #fff;
            border-radius: 15px;
            background: rgba(0,0,0,0.6);
            color: white;
        }
        .diff-btn.selected {
            background: #ffeb3b;
            color: #000;
            border-color: #ffeb3b;
        }

        /* 상단 상태 판넬 */
        .game-status {
            position: absolute;
            top: 35px;
            left: 40px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            z-index: 5;
            display: flex;
            gap: 15px;
        }

        /* 왼쪽 아래 하트 표시 영역 */
        .life-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 30px;
            display: flex;
            gap: 8px;
            font-size: 28px;
            z-index: 10;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .heart { color: #ff1744; text-shadow: 0 0 10px #ff1744; }
        .heart.empty { color: #444; text-shadow: none; }

        /* 무대 요소 */
        #game-table {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            height: auto;
            z-index: 1;
        }
        #doguri-char {
            position: absolute;
            bottom: 230px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: auto;
            z-index: 2;
        }

        /* 하단 리듬 제어 영역 */
        .rhythm-container {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 900px;
            z-index: 4;
        }

        .arrow-sequence-box {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .arrow-icon-slot {
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.08s ease;
            transform-origin: center center;
        }
        .arrow-icon-slot.hit { transform: scale(1.25); }
        .arrow-icon-slot img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .timer-wrapper {
            width: 400px;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #fff;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background: #ffeb3b;
            box-shadow: 0 0 8px #ffeb3b;
        }

        #judgment-text {
            position: absolute;
            bottom: 210px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 34px;
            font-weight: bold;
            text-shadow: 0 3px 6px rgba(0,0,0,0.9);
            z-index: 4;
        }

        .rank-badge {
            font-size: 64px;
            font-weight: 900;
            margin: 10px 0;
        }
        .rank-s { color: #ff1744; }
        .rank-a { color: #ff9100; }
        .rank-b { color: #00e676; }

        /* 도감 팝업 */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 600px;
        }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .book-item {
            border: 2px solid #ccc;
            padding: 15px;
            border-radius: 10px;
            background: #f9f9f9;
            font-weight: bold;
        }
        .book-item.unlocked {
            background: #e3f2fd;
            border-color: #2196f3;
            color: #1565c0;
        }
        .close-btn {
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #reward-popup {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.98);
            border: 4px solid #ffeb3b;
            padding: 45px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 25;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            width: 500px;
        }
    </style>

    <!-- 🚀 파이어베이스 실제 주소 기반 연동부 모듈화 장착 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, query, orderByChild, limitToFirst } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 입력해주신 실제 프로젝트 인증 정보 바인딩
        const firebaseConfig = {
            apiKey: "AIzaSyDL0ytMkp9lhXKNETfo_phU2mYybWSMLrc",
            authDomain: "doguridance.firebaseapp.com",
            databaseURL: "https://doguridance-default-rtdb.firebaseio.com",
            projectId: "doguridance",
            storageBucket: "doguridance.firebasestorage.app",
            messagingSenderId: "692785013428",
            appId: "1:692785013428:web:8d686d5ab3e669ed3d2de1",
            measurementId: "G-1STG643F4L"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        window.dbRef = ref;
        window.dbPush = push;
        window.dbSet = set;
        window.dbOnValue = onValue;
        window.dbQuery = query;
        window.dbOrderBy = orderByChild;
        window.dbLimit = limitToFirst;
        window.firebaseDb = database;
        window.isFirebaseReady = true;
    </script>
</head>
<body>

<div id="game-container">
    
    <!-- 1. 인트로 화면 -->
    <div id="screen-intro" class="screen active">
        <img id="main-logo" src="DD_Logo.png" alt="도구리 로고" onerror="this.style.display='none'; this.after('[DD_Logo]');">
        
        <div class="nickname-box">
            <label for="user-name-input">🌴 플레이어 닉네임 입력 🌴</label>
            <input type="text" id="user-name-input" placeholder="닉네임 (최대 8자)" maxlength="8" value="도구리">
        </div>

        <div class="bottom-center-position">
            <button id="btn-main-start" class="img-btn origin-size-btn" onclick="goToGameStart()">
                <img src="DD_Main_Start_Button.png" alt="START" onerror="this.style.display='none'; this.after('[START 버튼]');">
            </button>
        </div>
    </div>

    <!-- 2. 게임 시작화면 (DANCE 우측에 미니 랭킹보드 합본 배치) -->
    <div id="screen-start" class="screen">
        <button id="btn-main-back" class="img-btn top-right-back" onclick="goToIntro()">
            <img src="DD_Main_Back_Button.png" alt="뒤로가기" onerror="this.style.display='none'; this.after('← 뒤로가기');">
        </button>

        <div class="difficulty-group">
            <button id="btn-easy" class="diff-btn selected" onclick="selectDifficulty('easy')">쉬움</button>
            <button id="btn-normal" class="diff-btn" onclick="selectDifficulty('normal')">보통</button>
            <button id="btn-hard" class="diff-btn" onclick="selectDifficulty('hard')">어려움</button>
        </div>

        <div class="bottom-center-position">
            <button id="btn-main-dance" class="img-btn origin-size-btn" onclick="startGameLoop()">
                <img src="DD_Main_Dance_Button.png" alt="DANCE" onerror="this.style.display='none'; this.after('[DANCE 버튼]');">
            </button>
        </div>

        <!-- 🤝 [구조 개편] DANCE 오른쪽 그룹으로 정렬된 통합 패널 유닛 -->
        <div class="bottom-right-container">
            <!-- 🏆 실시간 글로벌 서버 TOP 10 랭킹 보드 (DANCE 우측 안착) -->
            <div class="leaderboard-panel">
                <h3 id="leaderboard-title">쉬움 TOP 10</h3>
                <div class="leaderboard-list" id="leaderboard-content">
                    <div style="text-align:center; color:#999; font-size:12px; padding:10px 0;">서버 연결 중...</div>
                </div>
            </div>

            <!-- 미니 컨트롤 버튼 세트 -->
            <div class="mini-btn-group">
                <button class="dummy-reset-btn" onclick="resetAllLocalData()">도감 초기화</button>
                <button id="btn-main-gift" class="img-btn origin-size-btn" onclick="openCollection()">
                    <img src="DD_Main_Gift_Button.png" alt="도감" onerror="this.style.display='none'; this.after('[도감]');">
                </button>
            </div>
        </div>
    </div>

    <!-- 3. 인게임 화면 -->
    <div id="screen-game" class="screen">
        <div class="game-status">
            <span id="txt-difficulty">난이도: 쉬움</span> | 
            <span id="txt-stage">스테이지: 1/3</span> | 
            <span id="txt-round">판수: 1/5</span> |
            <span id="txt-playtime" style="color: #ffeb3b;">시간: 0.00초</span>
        </div>

        <div class="life-container" id="hearts-display"></div>

        <img id="game-table" src="DD_Game_Table.png" alt="단상" onerror="this.style.display='none';">
        <img id="doguri-char" src="doguri_image_base.png" alt="도구리" onerror="this.style.display='none'; this.after('[도구리]');">

        <div id="judgment-text"></div>

        <div class="rhythm-container" id="rhythm-ui">
            <div class="arrow-sequence-box" id="arrow-sequence-area"></div>
            <div class="timer-wrapper">
                <div id="timer-bar"></div>
            </div>
        </div>

        <div id="next-btn-container" class="bottom-center-position" style="display: none;">
            <button id="btn-main-next" class="img-btn origin-size-btn" onclick="handleNextStageClick()">
                <img src="DD_Main_Next_Button.png" alt="NEXT" onerror="this.style.display='none'; this.after('[NEXT 스테이지]');">
            </button>
        </div>
    </div>

    <!-- 결산 팝업 보드 -->
    <div id="reward-popup">
        <h2 style="color: #333; margin-top:0; margin-bottom:5px;">🌴 스테이지 클리어! 🌴</h2>
        
        <div id="popup-rank-badge" class="rank-badge rank-s">S</div>
        <p id="popup-playtime-result" style="font-size: 16px; margin: 0; color: #666; font-weight: bold;">기록: 0.00초</p>
        <p id="popup-firebase-status" style="font-size: 13px; margin: 5px 0 15px 0; color: #4caf50; font-weight: bold;">서버에 순위 기록 업로드 중...</p>

        <hr style="border: 0; height: 1px; background: #eee; margin: 15px 0;">
        <p style="font-size: 16px; color: #555; margin-bottom: 5px;">🎁 하와이 기념 도감 보상 🎁</p>
        <div id="reward-item-name" style="font-size: 24px; font-weight: bold; color: #2196f3; margin-bottom: 25px;">[아이템]</div>
        
        <button class="close-btn" onclick="closeRewardPopup()">확인</button>
    </div>

    <!-- 도감 모달 -->
    <div id="collection-modal" class="modal">
        <div class="modal-content">
            <h2>🎒 도구리의 하와이 도감 (총 9종)</h2>
            <div class="book-grid" id="book-grid-container"></div>
            <button class="close-btn" onclick="closeCollection()">닫기</button>
        </div>
    </div>

</div>

<script>
    // --- 글로벌 상태 제어 변수 ---
    let currentDifficulty = 'easy';
    let currentStage = 1;           
    let currentRound = 1;           
    let userLives = 5;              
    let globalNickname = "도구리";

    let targetArrowSequence = [];
    let currentArrowIndex = 0; 
    let isRoundFinished = false;
    let isStageClearedWait = false; 
    let isRewardGivenThisGame = false; 

    let roundTimerId = null;
    let timeLimit = 5000;           
    let timeRemaining = 5000;

    let totalStartTime = 0;         
    let totalElapsedTime = 0;       
    let stopwatchIntervalId = null; 

    const collectionItems = [
        "🍍 하와이안 파인애플", "🌸 알로하 레이", "🕶️ 선글라스",
        "🏄 미니 서프보드", "🥥 코코넛 주스", "🎸 우쿨렐레",
        "🩴 비치 샌들", "👕 하와이안 셔츠", "🏖️ 도구리 튜브"
    ];
    let unlockedItems = new Set();
    const STORAGE_KEY_ITEMS = "doguri_unlocked_items_firebase_v1";

    const BG_MAIN = "DD_Main_Image.png";
    const DOGURI_BASE = "doguri_image_base.png";
    const DOGURI_UPGRADE = "doguri_image_upgrade.png";

    const arrowKeyCodes = ['ArrowLeft', 'ArrowRight', 'ArrowDown', 'ArrowUp'];
    const arrowNames = { 'ArrowLeft': 'Left', 'ArrowRight': 'Right', 'ArrowDown': 'Down', 'ArrowUp': 'Up' };

    window.onload = function() {
        document.getElementById('game-container').style.backgroundImage = `url('${BG_MAIN}')`;
        loadLocalStorageData();
        initCollectionUI();
        updateDoguriImage();
        setupButtonEffects();
        
        let checkFb = setInterval(() => {
            if (window.isFirebaseReady) {
                clearInterval(checkFb);
                loadFirebaseLeaderboard();
            }
        }, 100);
    };

    function loadLocalStorageData() {
        try {
            let savedItems = localStorage.getItem(STORAGE_KEY_ITEMS);
            if(savedItems) unlockedItems = new Set(JSON.parse(savedItems));
        } catch(e) { console.error("로컬 세이브 로드 실패:", e); }
    }

    function saveGameDataToStorage() {
        try {
            localStorage.setItem(STORAGE_KEY_ITEMS, JSON.stringify(Array.from(unlockedItems)));
        } catch(e) { console.error("로컬 세이브 저장 실패:", e); }
    }

    // --- 🏆 파이어베이스 서버 연동 실시간 오름차순 랭킹 리스너 ---
    function loadFirebaseLeaderboard() {
        if (!window.isFirebaseReady) return;
        
        let diffKo = currentDifficulty === 'easy' ? '쉬움' : currentDifficulty === 'normal' ? '보통' : '어려움';
        document.getElementById('leaderboard-title').innerText = `${diffKo} TOP 10`;

        const scoreRef = window.dbRef(window.firebaseDb, `scores/${currentDifficulty}`);
        const rankQuery = window.dbQuery(scoreRef, window.dbOrderBy('playTime'), window.dbLimit(10));

        window.dbOnValue(rankQuery, (snapshot) => {
            let listContainer = document.getElementById('leaderboard-content');
            listContainer.innerHTML = '';

            if (!snapshot.exists()) {
                listContainer.innerHTML = '<div style="text-align:center; color:#999; font-size:12px; padding:10px 0;">기록이 없습니다!</div>';
                return;
            }

            let rankIndex = 1;
            snapshot.forEach((childSnapshot) => {
                let data = childSnapshot.val();
                let item = document.createElement('div');
                item.className = 'leaderboard-item';
                
                if(data.name === globalNickname) {
                    item.classList.add('top-user');
                }

                let timeSec = (data.playTime / 1000).toFixed(2);
                item.innerHTML = `<span>${rankIndex}. ${data.name}</span> <span>${timeSec}초</span>`;
                listContainer.appendChild(item);
                rankIndex++;
            });
        });
    }

    function uploadScoreToServer(nickname, elapsedMs) {
        if (!window.isFirebaseReady) return;
        
        let statusText = document.getElementById('popup-firebase-status');
        statusText.innerText = "서버에 기록 저장 중...";
        statusText.style.color = "#ffeb3b";

        const scoreListRef = window.dbRef(window.firebaseDb, `scores/${currentDifficulty}`);
        const newScoreRef = window.dbPush(scoreListRef);

        window.dbSet(newScoreRef, {
            name: nickname,
            playTime: elapsedMs,
            timestamp: Date.now()
        }).then(() => {
            statusText.innerText = "✓ 글로벌 랭킹 등록 완료!";
            statusText.style.color = "#4caf50";
        }).catch((err) => {
            console.error("서버 오류:", err);
            statusText.innerText = "서버 연결 실패";
            statusText.style.color = "#f44336";
        });
    }

    function setupButtonEffects() {
        const btns = document.querySelectorAll('.img-btn');
        btns.forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('pressed'));
            btn.addEventListener('mouseup', () => btn.classList.remove('pressed'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('pressed'));
        });
    }

    function simulateBtnClick(btnId, callback) {
        let btn = document.getElementById(btnId);
        if (btn) {
            btn.classList.add('pressed');
            setTimeout(() => {
                btn.classList.remove('pressed');
                callback();
            }, 80);
        }
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function setCharacterImage(srcPath, fallbackText) {
        let charImg = document.getElementById('doguri-char');
        if (charImg) {
            charImg.src = srcPath;
            charImg.onerror = function() {
                this.style.display = 'none';
                this.after(`[${fallbackText}]`);
            };
        }
    }

    function goToGameStart() { 
        let inputVal = document.getElementById('user-name-input').value.trim();
        globalNickname = inputVal ? inputVal : "도구리";
        
        loadFirebaseLeaderboard();
        showScreen('screen-start'); 
    }

    function goToIntro() { 
        stopRoundTimer();
        stopStopwatch();
        showScreen('screen-intro'); 
    }

    // 난이도 클릭 시 파이어베이스 실시간 랭킹 즉각 갱신 연동
    function selectDifficulty(diff) {
        currentDifficulty = diff;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById(`btn-${diff}`).classList.add('selected');
        loadFirebaseLeaderboard();
    }

    function startGameLoop() {
        showScreen('screen-game');
        currentStage = 1;
        currentRound = 1;
        userLives = 5; 
        isRewardGivenThisGame = false; 
        
        totalStartTime = Date.now();
        totalElapsedTime = 0;
        startStopwatch();

        updateHeartsUI();
        initRound();
    }

    function startStopwatch() {
        if(stopwatchIntervalId) clearInterval(stopwatchIntervalId);
        stopwatchIntervalId = setInterval(() => {
            if(isStageClearedWait || isRoundFinished) return;
            totalElapsedTime = Date.now() - totalStartTime;
            document.getElementById('txt-playtime').innerText = `시간: ${(totalElapsedTime / 1000).toFixed(2)}초`;
        }, 30);
    }

    function stopStopwatch() {
        if(stopwatchIntervalId) {
            clearInterval(stopwatchIntervalId);
            stopwatchIntervalId = null;
        }
    }

    function updateHeartsUI() {
        let container = document.getElementById('hearts-display');
        container.innerHTML = '';
        for(let i=1; i<=5; i++) {
            let heartSpan = document.createElement('span');
            if (i <= userLives) {
                heartSpan.className = 'heart';
                heartSpan.innerText = '❤️';
            } else {
                heartSpan.className = 'heart empty';
                heartSpan.innerText = '🖤';
            }
            container.appendChild(heartSpan);
        }
    }

    function initRound() {
        isRoundFinished = false;
        isStageClearedWait = false;
        currentArrowIndex = 0;
        stopRoundTimer();
        updateDoguriImage();
        
        let diffKo = currentDifficulty === 'easy' ? '쉬움' : currentDifficulty === 'normal' ? '보통' : '어려움';
        document.getElementById('txt-difficulty').innerText = `난이도: ${diffKo}`;
        document.getElementById('txt-stage').innerText = `스테이지: ${currentStage}/3`;
        document.getElementById('txt-round').innerText = `판수: ${currentRound}/5`;
        
        document.getElementById('judgment-text').innerText = '';
        document.getElementById('next-btn-container').style.display = 'none'; 
        document.getElementById('rhythm-ui').style.display = 'flex';
        
        let arrowCount = 2 + currentRound; 
        targetArrowSequence = [];
        
        let sequenceArea = document.getElementById('arrow-sequence-area');
        sequenceArea.innerHTML = '';

        for(let i=0; i<arrowCount; i++) {
            let randomKey = arrowKeyCodes[Math.floor(Math.random() * arrowKeyCodes.length)];
            targetArrowSequence.push(randomKey);

            let slot = document.createElement('div');
            slot.className = 'arrow-icon-slot';
            slot.id = `arrow-slot-${i}`;
            
            let img = document.createElement('img');
            img.src = `DD_${arrowNames[randomKey]}_Button_Normal.png`;
            img.id = `arrow-img-${i}`;
            img.alt = arrowNames[randomKey];
            
            img.onerror = function() {
                this.style.display = 'none';
                let sym = {'ArrowLeft':'←','ArrowRight':'→','ArrowDown':'↓','ArrowUp':'↑'};
                this.parentElement.innerText = sym[randomKey];
            };

            slot.appendChild(img);
            sequenceArea.appendChild(slot);
        }

        startRoundTimer();
    }

    function startRoundTimer() {
        timeRemaining = timeLimit;
        document.getElementById('timer-bar').style.width = '100%';

        roundTimerId = setInterval(() => {
            if (isRoundFinished || isStageClearedWait) {
                stopRoundTimer();
                return;
            }
            timeRemaining -= 50;
            let percent = (timeRemaining / timeLimit) * 100;
            document.getElementById('timer-bar').style.width = percent + '%';

            if (timeRemaining <= 0) {
                stopRoundTimer();
                handleRoundFailure("TIME OVER!");
            }
        }, 50);
    }

    function stopRoundTimer() {
        if (roundTimerId) {
            clearInterval(roundTimerId);
            roundTimerId = null;
        }
    }

    function handleRoundFailure(reasonText) {
        userLives--;
        updateHeartsUI();
        setCharacterImage('DD_Dance_Fail.png', '도구리 실패 연출');

        if (userLives <= 0) {
            stopRoundTimer();
            stopStopwatch();
            setTimeout(() => {
                alert("GAME OVER! 모든 하트를 잃었습니다.");
                showScreen('screen-start');
            }, 100);
            return;
        }

        let jTxt = document.getElementById('judgment-text');
        jTxt.innerText = reasonText;
        jTxt.style.color = "#f44336";

        initRound();
    }

    window.addEventListener('keydown', function(e) {
        let introActive = document.getElementById('screen-intro').classList.contains('active');
        let startActive = document.getElementById('screen-start').classList.contains('active');
        let gameActive = document.getElementById('screen-game').classList.contains('active');
        
        let nextContainer = document.getElementById('next-btn-container');
        let nextBtnVisible = nextContainer && nextContainer.style.display === 'block';

        if(document.activeElement === document.getElementById('user-name-input')) return;

        if (e.key === ' ' || e.key === 'Spacebar') {
            if (introActive) {
                e.preventDefault();
                simulateBtnClick('btn-main-start', goToGameStart);
                return;
            }
            if (startActive) {
                e.preventDefault();
                simulateBtnClick('btn-main-dance', startGameLoop);
                return;
            }
            if (gameActive && nextBtnVisible && isStageClearedWait) {
                e.preventDefault();
                simulateBtnClick('btn-main-next', handleNextStageClick);
                return;
            }
        }

        if (e.key === 'Escape' || e.key === 'Esc') {
            if (startActive) {
                simulateBtnClick('btn-main-back', goToIntro);
                return;
            }
        }

        if (!gameActive || isRoundFinished || isStageClearedWait) return;

        if (arrowKeyCodes.includes(e.key)) {
            let targetKey = targetArrowSequence[currentArrowIndex];
            let slotEl = document.getElementById(`arrow-slot-${currentArrowIndex}`);
            let imgEl = document.getElementById(`arrow-img-${currentArrowIndex}`);

            if(slotEl) {
                slotEl.classList.add('hit');
                setTimeout(() => slotEl.classList.remove('hit'), 80);
            }

            if (e.key === targetKey) {
                if(imgEl) imgEl.src = `DD_${arrowNames[targetKey]}_Button_Success.png`;
                currentArrowIndex++;

                let randomDanceNum = Math.floor(Math.random() * 4) + 1;
                setCharacterImage(`DD_Dance_${randomDanceNum}.png`, `도구리 댄스 ${randomDanceNum}`);

                if (currentArrowIndex >= targetArrowSequence.length) {
                    stopRoundTimer();
                    handleRoundSuccess();
                }
            } else {
                if(imgEl) imgEl.src = `DD_${arrowNames[targetKey]}_Button_Fail.png`;
                stopRoundTimer();
                handleRoundFailure("FAIL!");
            }
        }
    });

    function handleRoundSuccess() {
        if (currentRound >= 5) {
            isStageClearedWait = true;
            document.getElementById('rhythm-ui').style.display = 'none';
            document.getElementById('next-btn-container').style.display = 'block';
            
            let jTxt = document.getElementById('judgment-text');
            jTxt.innerText = "STAGE CLEAR!";
            jTxt.style.color = "#4caf50";
        } else {
            currentRound++;
            initRound();
        }
    }

    function handleNextStageClick() {
        if (currentStage < 3) {
            currentStage++;
            currentRound = 1;
            initRound();
        } else {
            stopStopwatch();
            giveRandomRewardAndRank();
        }
    }

    function giveRandomRewardAndRank() {
        if (isRewardGivenThisGame) return;
        isRewardGivenThisGame = true; 

        let finalTimeSec = totalElapsedTime / 1000;
        document.getElementById('popup-playtime-result').innerText = `최종 클리어 시간: ${finalTimeSec.toFixed(2)}초`;

        let rankLetter = 'B';
        let badgeEl = document.getElementById('popup-rank-badge');
        
        if (currentDifficulty === 'easy') {
            if (finalTimeSec <= 22) rankLetter = 'S';
            else if (finalTimeSec <= 32) rankLetter = 'A';
        } else if (currentDifficulty === 'normal') {
            if (finalTimeSec <= 26) rankLetter = 'S';
            else if (finalTimeSec <= 38) rankLetter = 'A';
        } else { 
            if (finalTimeSec <= 30) rankLetter = 'S';
            else if (finalTimeSec <= 45) rankLetter = 'A';
        }

        badgeEl.innerText = rankLetter;
        badgeEl.className = `rank-badge rank-${rankLetter.toLowerCase()}`;

        // 🚀 파이어베이스 실시간 데이터베이스 연동 트리거
        uploadScoreToServer(globalNickname, totalElapsedTime);

        let randomIndex = Math.floor(Math.random() * collectionItems.length);
        unlockedItems.add(randomIndex);
        
        saveGameDataToStorage();
        initCollectionUI();
        updateDoguriImage();

        document.getElementById('reward-item-name').innerText = collectionItems[randomIndex];
        document.getElementById('reward-popup').style.display = 'block';
    }

    function closeRewardPopup() {
        document.getElementById('reward-popup').style.display = 'none';
        goToGameStart();
    }

    function resetAllLocalData() {
        if (confirm("도감 데이터가 전면 초기화됩니다. 진행하시겠습니까?")) {
            unlockedItems.clear();
            isRewardGivenThisGame = false;
            saveGameDataToStorage();
            initCollectionUI();
            updateDoguriImage();
            alert('도감이 완전히 초기화되었습니다.');
        }
    }

    function initCollectionUI() {
        let grid = document.getElementById('book-grid-container');
        grid.innerHTML = '';
        collectionItems.forEach((item, index) => {
            let box = document.createElement('div');
            box.id = `book-item-${index}`;
            box.className = `book-item ${unlockedItems.has(index) ? 'unlocked' : ''}`;
            box.innerText = unlockedItems.has(index) ? item : `🔒 미획득 (${index + 1})`;
            grid.appendChild(box);
        });
    }

    function updateDoguriImage() {
        if (unlockedItems.size === 9) {
            setCharacterImage(DOGURI_UPGRADE, '👑 하와이안 도구리 업그레이드 완료');
        } else {
            setCharacterImage(DOGURI_BASE, '도구리 기본 상태');
        }
    }

    // 도감 모달 열기/닫기
    function openCollection() {
        initCollectionUI();
        document.getElementById('collection-modal').style.display = 'flex';
    }
    function closeCollection() {
        document.getElementById('collection-modal').style.display = 'none';
    }
</script>

</body>
</html>
