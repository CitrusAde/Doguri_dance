<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도구리 하와이 댄스 게임 - V30 (사운드 복구 및 UI 축소)</title>
    <style>
        @font-face {
            font-family: 'NPSfont_bold';
            src: url('NPSfont_bold.woff2') format('woff2');
            font-weight: bold;
            font-style: normal;
        }

        * { box-sizing: border-box; user-select: none; font-family: 'NPSfont_bold', 'Malgun Gothic', sans-serif; }
        body { margin: 0; padding: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        #game-container {
            width: 1280px; height: 720px; position: relative;
            background-image: url('DD_Main_Image.png');
            background-size: cover; background-position: center; overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .screen { position: absolute; width: 100%; height: 100%; top: 0; left: 0; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .screen.active { display: flex; }

        /* 소리 제어 패널 */
        .audio-controller-panel {
            position: absolute; top: 30px; left: 40px;
            background: url('DD_Nick_Bg.png') no-repeat center center;
            background-size: 100% 100%; 
            border-radius: 12px; padding: 12px 18px;
            display: flex; align-items: center; gap: 12px; z-index: 100;
        }
        .audio-toggle-btn { background: none; border: none; color: #000; font-size: 20px; cursor: pointer; }
        .volume-slider { width: 85px; height: 6px; cursor: pointer; }

        /* 👑 요청 반영: 게임 상태 창 사이즈 70% 축소 */
        .game-status {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 10px 20px; border-radius: 10px;
            font-size: 14px; font-weight: bold; /* 폰트 사이즈 조정 */
            z-index: 5; display: flex; gap: 15px;
            transform: scale(0.7); transform-origin: top left;
        }

        /* 기타 스타일은 V29와 동일하게 유지 */
        .nickname-area-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 25px; }
        .nick-title-img { display: block; margin-top: 15px; }
        .nick-input-wrapper { position: relative; transform: scale(0.7); transform-origin: center center; }
        .nick-input-field { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 60%; background: none; border: none; outline: none; color: #000; font-size: 26px; font-weight: bold; text-align: center; }

        .btn-with-guide-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .space-shortcut-guide { color: rgba(255, 255, 255, 0.8); font-size: 16px; font-weight: bold; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6); }

        .img-btn { cursor: pointer; border: none; background: none; padding: 0; outline: none; display: block; transition: transform 0.1s ease; }
        .img-btn:hover { transform: scale(1.05); }
        .img-btn.pressed { transform: scale(0.95); }

        .bottom-dance-position { position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%); z-index: 10; }
        .top-right-back { position: absolute; top: 30px; right: 30px; z-index: 10; }
        .bottom-right-container { position: absolute; bottom: 40px; right: 40px; display: flex; align-items: flex-end; gap: 15px; z-index: 10; }
        .dummy-reset-btn { padding: 8px 14px; background: rgba(244, 67, 54, 0.5); color: white; border: 2px solid #fff; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
        
        .difficulty-group { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; align-items: center; justify-content: center; z-index: 10; }
        .diff-btn-slot { position: relative; display: inline-block; transition: transform 0.1s ease; }
        .diff-glow-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 1; opacity: 0; }
        .diff-btn-slot.selected .diff-glow-layer { opacity: 1; }
        .diff-img-btn { position: relative; z-index: 2; display: block; }

        .life-container-wrapper { position: absolute; bottom: 40px; left: 40px; z-index: 10; transform: scale(0.7); transform-origin: left bottom; }
        .heart-img-slot { width: 45px; height: 45px; object-fit: contain; transition: opacity 0.1s ease; }
        .heart-img-slot.hidden-life { opacity: 0; }

        #doguri-char { position: absolute; bottom: 195px; left: 50%; transform: translateX(-50%); width: 180px; z-index: 2; }
        .rhythm-container { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 4; }
        #next-btn-container { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 99; }
        
        #reward-popup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: url('DD_Popup.png') no-repeat center center; background-size: 100% 100%; width: 413px; height: 230px; display: none; justify-content: center; align-items: center; z-index: 150; }
        .clear-safe-box { width: 347px; height: 152px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ok-image-btn img { width: 100px; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 오디오 제어 패널 -->
        <div class="audio-controller-panel">
            <button class="audio-toggle-btn" id="btn-audio-mute" onclick="toggleAudioMute()">🔊</button>
            <input type="range" class="volume-slider" id="slider-volume" min="0" max="100" value="50" oninput="changeVolumeValue(this.value)">
        </div>

        <!-- 스크린 화면들은 생략(동일) -->
        <div id="screen-intro" class="screen active">
            <img id="main-logo" src="DD_Logo.png">
            <div class="nickname-area-container">
                <img class="nick-title-img" src="DD_Nick_Text.png">
                <div class="nick-input-wrapper">
                    <img class="nick-bg-img" src="DD_Nick_Bg.png">
                    <input type="text" id="user-name-input" class="nick-input-field" value="도구리">
                </div>
            </div>
            <div class="btn-with-guide-container">
                <button id="btn-intro-start" class="img-btn" onclick="goToGameStart()"><img src="DD_Main_Start_Button.png"></button>
                <span class="space-shortcut-guide">(space)</span>
            </div>
        </div>

        <div id="screen-start" class="screen">
            <div class="difficulty-group">
                <div id="slot-easy" class="diff-btn-slot selected" onclick="selectDifficulty('easy')"><img class="diff-glow-layer" src="DD_Easy_Button_Glow.png"><div class="diff-img-btn"><img src="DD_Easy_Button.png"></div></div>
                <div id="slot-normal" class="diff-btn-slot" onclick="selectDifficulty('normal')"><img class="diff-glow-layer" src="DD_Normal_Button_Glow.png"><div class="diff-img-btn"><img src="DD_Normal_Button.png"></div></div>
                <div id="slot-hard" class="diff-btn-slot" onclick="selectDifficulty('hard')"><img class="diff-glow-layer" src="DD_Hard_Button_Glow.png"><div class="diff-img-btn"><img src="DD_Hard_Button.png"></div></div>
            </div>
            <div class="bottom-dance-position btn-with-guide-container">
                <button id="btn-main-dance" class="img-btn" onclick="startGameLoop()"><img src="DD_Main_Dance_Button.png"></button>
                <span class="space-shortcut-guide">(space)</span>
            </div>
        </div>

        <div id="screen-game" class="screen">
            <div class="game-status">
                <span id="txt-difficulty">난이도: 쉬움</span> | <span id="txt-stage">스테이지: 1/3</span> | <span id="txt-round">판수: 1/5</span> | <span id="txt-playtime">시간: 0.00초</span>
            </div>
            <div class="life-container-wrapper">
                <img class="life-bg-asset" src="DD_Nick_Bg.png">
                <div class="life-hearts-overlay" id="hearts-display-images"></div>
            </div>
            <img id="doguri-char" src="doguri_image_base.png">
            <div id="judgment-text"></div>
            <div class="rhythm-container" id="rhythm-ui">
                <div class="arrow-sequence-box" id="arrow-sequence-area"></div>
                <div class="timer-wrapper"><div id="timer-bar"></div></div>
            </div>
            <div id="next-btn-container"><button class="img-btn" onclick="handleNextStageClick()"><img src="DD_Main_Next_Button.png"></button></div>
        </div>
    </div>

    <script type="module">
        // [중요] 모든 사운드 연동은 윈도우 스코프에서 관리
        window.audioCtx = null;
        window.masterGainNode = null;
        window.isAudioMuted = false;
        window.globalVolumeValue = 0.5;

        window.initAudioContext = function() {
            if (!window.audioCtx) {
                window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                window.masterGainNode = window.audioCtx.createGain();
                window.masterGainNode.connect(window.audioCtx.destination);
                updateMasterVolume();
            }
            if (window.audioCtx.state === 'suspended') window.audioCtx.resume();
        };

        window.playBeep = function(freq, dur, type='square', endFreq=null) {
            initAudioContext();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if(endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + dur);
            gain.gain.setValueAtTime(1.76 * globalVolumeValue, audioCtx.currentTime); // 증폭 적용
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            osc.connect(gain);
            gain.connect(masterGainNode);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        };

        window.playHitSound = (i) => playBeep(320 + (i*60), 0.08, 'triangle');
        window.playFailSound = () => playBeep(220, 0.35, 'square', 80);
        window.playSelectTickSound = () => playBeep(440, 0.05, 'triangle');
        window.playStageClearSound = () => { playBeep(523.25, 0.1, 'square'); setTimeout(()=>playBeep(659.25, 0.25, 'square'), 80); };
        
        // 기타 함수들... (기존과 동일하므로 생략)
    </script>
</body>
</html>
